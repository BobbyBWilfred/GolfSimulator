<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tee Sheet — Your Tour</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@500;600;700;800&family=Inter:wght@400;500;600;700&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --turf-900:#16241c;--turf-800:#1b3a2f;--turf-700:#234a3a;--turf-600:#3f7a4d;--turf-500:#5b9466;
  --sand-300:#d9c89a;--sand-200:#e9dfc2;--paper-100:#f3f0e6;--paper-50:#faf8f2;
  --ink-900:#16201a;--ink-700:#3a463d;--ink-500:#6b7868;
  --flag-red:#a8362a;--flag-red-dim:#c97167;--board-amber:#d9a13b;
  --line:#cdc4a8;--line-dark:#3a4f41;--board-black:#10180f;
  --shadow-soft:0 1px 2px rgba(16,24,15,0.08),0 8px 24px rgba(16,24,15,0.08);
  --radius-card:4px;
}
*{box-sizing:border-box;}html,body{margin:0;padding:0;}
body{background:var(--paper-100);background-image:radial-gradient(ellipse at top left,rgba(63,122,77,0.08),transparent 55%),radial-gradient(ellipse at bottom right,rgba(168,54,42,0.04),transparent 50%);color:var(--ink-900);font-family:'Inter',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased;}
@media(prefers-reduced-motion:reduce){*{animation-duration:0.001ms!important;transition-duration:0.001ms!important;}}
@media(max-width:880px){.topbar{flex-wrap:wrap;gap:10px;padding:12px 16px;}.nav-tabs{order:3;width:100%;overflow-x:auto;}.topbar-right{order:2;}main{padding:16px;}.play-grid-2col{grid-template-columns:1fr!important;}}
@media(max-width:520px){.brand-text h1{font-size:16px;}.season-pill{display:none;}}
h1,h2,h3,h4{font-family:'Oswald',sans-serif;margin:0;letter-spacing:0.01em;}
.num{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-variant-numeric:tabular-nums;}
a{color:inherit;}button{font-family:inherit;cursor:pointer;}
::selection{background:var(--board-amber);color:var(--board-black);}
.scrollbar-thin::-webkit-scrollbar{width:8px;height:8px;}.scrollbar-thin::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px;}
#app{min-height:100vh;display:flex;flex-direction:column;}
.topbar{background:linear-gradient(180deg,var(--turf-800),var(--turf-900));color:var(--paper-50);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 0 rgba(0,0,0,0.15),var(--shadow-soft);position:sticky;top:0;z-index:50;border-bottom:3px solid var(--board-amber);}
.brand{display:flex;align-items:center;gap:12px;}
.brand-mark{width:36px;height:36px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff 0 6%,transparent 7%),radial-gradient(circle at 60% 55%,#fff 0 5%,transparent 6%),radial-gradient(circle at 45% 70%,#fff 0 5%,transparent 6%),radial-gradient(circle at 70% 30%,#fff 0 4%,transparent 5%),var(--sand-200);border:2px solid var(--paper-50);flex-shrink:0;}
.brand-text h1{font-size:19px;color:var(--paper-50);text-transform:uppercase;letter-spacing:0.06em;}
.brand-text .sub{font-size:11px;color:var(--sand-300);letter-spacing:0.12em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}
.season-pill{font-family:'Barlow Condensed',sans-serif;font-weight:700;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.18);padding:6px 14px;border-radius:20px;font-size:13px;letter-spacing:0.04em;color:var(--sand-200);}
.nav-tabs{display:flex;gap:4px;}
.nav-tab{background:none;border:none;color:var(--sand-200);padding:8px 16px;font-size:13px;letter-spacing:0.05em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;font-weight:600;border-radius:3px 3px 0 0;opacity:0.65;border-bottom:2px solid transparent;transition:opacity .15s,background .15s;}
.nav-tab:hover{opacity:0.9;background:rgba(255,255,255,0.06);}
.nav-tab.active{opacity:1;color:#fff;border-bottom-color:var(--board-amber);}
.topbar-right{display:flex;align-items:center;gap:14px;}
.restart-btn{background:var(--flag-red);color:#fff;border:none;padding:8px 14px;border-radius:3px;font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;box-shadow:0 1px 0 rgba(0,0,0,0.3);transition:filter .15s,transform .1s;}
.restart-btn:hover{filter:brightness(1.12);}.restart-btn:active{transform:translateY(1px);}
main{flex:1;padding:28px;max-width:1380px;margin:0 auto;width:100%;}
.view{display:none;}.view.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
.section-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:18px;padding-bottom:10px;border-bottom:2px solid var(--line-dark);flex-wrap:wrap;gap:10px;}
.section-head h2{font-size:24px;color:var(--turf-900);text-transform:uppercase;letter-spacing:0.02em;}
.section-head .eyebrow{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:0.16em;text-transform:uppercase;color:var(--turf-600);font-weight:700;display:block;margin-bottom:2px;}
.btn{border:1px solid var(--turf-800);background:var(--turf-800);color:#fff;padding:9px 16px;border-radius:3px;font-size:13px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;transition:transform .1s,filter .15s;}
.btn:hover{filter:brightness(1.15);}.btn:active{transform:translateY(1px);}
.btn.ghost{background:transparent;color:var(--turf-800);}.btn.ghost:hover{background:rgba(27,58,47,0.06);}
.btn.amber{background:var(--board-amber);border-color:var(--board-amber);color:var(--board-black);}
.btn.danger{background:var(--flag-red);border-color:var(--flag-red);}
.btn:disabled{opacity:0.4;cursor:not-allowed;filter:none!important;}
.btn-sm{padding:5px 10px;font-size:11px;}
.card{background:var(--paper-50);border:1px solid var(--line);border-radius:var(--radius-card);box-shadow:var(--shadow-soft);}
.empty-state{border:1px dashed var(--line-dark);border-radius:4px;padding:40px 24px;text-align:center;color:var(--ink-500);background:rgba(255,255,255,0.4);}
.empty-state h3{color:var(--ink-700);margin-bottom:6px;font-size:17px;}
.empty-state p{font-size:13px;max-width:420px;margin:0 auto 14px;line-height:1.5;}
#toast-wrap{position:fixed;bottom:18px;right:18px;display:flex;flex-direction:column;gap:8px;z-index:200;}
.toast{background:var(--turf-900);color:#fff;padding:10px 16px;border-radius:4px;font-size:13px;box-shadow:var(--shadow-soft);border-left:4px solid var(--board-amber);animation:toastin .2s ease;max-width:320px;}
.toast.bad{border-left-color:var(--flag-red);}
@keyframes toastin{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:none;}}
.modal-overlay{position:fixed;inset:0;background:rgba(16,24,15,0.55);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadein .15s ease;}
.modal-overlay.hidden{display:none;}
.modal{background:var(--paper-50);border-radius:6px;max-width:520px;width:100%;max-height:88vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.35);border-top:5px solid var(--board-amber);}
.modal-pad{padding:24px 26px;}
.modal h3{font-size:20px;color:var(--turf-900);margin-bottom:4px;text-transform:uppercase;}
.modal .modal-sub{font-size:12px;color:var(--ink-500);margin-bottom:18px;}
label.field-label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:0.07em;color:var(--ink-500);font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-bottom:5px;margin-top:14px;}
input[type=text],input[type=number],select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:3px;background:#fff;font-size:14px;font-family:'Inter',sans-serif;color:var(--ink-900);}
input[type=text]:focus,input[type=number]:focus,select:focus{outline:2px solid var(--turf-600);outline-offset:1px;border-color:var(--turf-600);}
input[type=range]{width:100%;accent-color:var(--turf-600);}
.attr-row{display:grid;grid-template-columns:110px 1fr 38px;align-items:center;gap:10px;margin-top:10px;}
.attr-row .attr-name{font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:600;color:var(--ink-700);}
.attr-row .attr-val{font-size:14px;text-align:right;font-family:'Barlow Condensed',sans-serif;font-weight:700;color:var(--turf-700);}
.modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:22px;}
/* Fantasy team colors */
.team-badge{display:inline-flex;align-items:center;justify-content:center;border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.05em;}
footer{text-align:center;padding:18px;font-size:11px;color:var(--ink-500);letter-spacing:0.06em;text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;}
/* Prize money badge */
.prize-badge{display:inline-block;background:rgba(217,161,59,0.15);border:1px solid rgba(217,161,59,0.4);color:#7a5a0a;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:0.04em;}
.earnings-bar{height:4px;background:var(--line);border-radius:2px;overflow:hidden;margin-top:4px;}
.earnings-bar-fill{height:100%;background:linear-gradient(90deg,var(--board-amber),var(--turf-600));border-radius:2px;transition:width .4s ease;}
</style>
</head>
<body>
<div id="app">
  <header class="topbar">
    <div class="brand">
      <div class="brand-mark"></div>
      <div class="brand-text">
        <h1>Tee Sheet Tour</h1>
        <span class="sub" id="season-label-top">Season 1 · Week 0 of 20</span>
      </div>
    </div>
    <nav class="nav-tabs" id="nav-tabs">
      <button class="nav-tab active" data-view="schedule">Schedule</button>
      <button class="nav-tab" data-view="roster">Roster</button>
      <button class="nav-tab" data-view="standings">Tour Standings</button>
      <button class="nav-tab" data-view="rydercup">🏆 Ryder Cup</button>
      <button class="nav-tab" data-view="news">📰 News</button>
      <button class="nav-tab" data-view="tournament" id="tab-tournament" style="display:none;">This Week</button>
    </nav>
    <div class="topbar-right">
      <span class="season-pill" id="points-leader-pill">No points yet</span>
      <button class="restart-btn" id="restart-season-btn" title="Wipes roster, career stats, and everything else — starts a brand new tour">Restart Tour</button>
    </div>
  </header>
  <main id="main-content">
    <section class="view" id="view-schedule"></section>
    <section class="view" id="view-roster"></section>
    <section class="view" id="view-standings"></section>
    <section class="view" id="view-rydercup"></section>
    <section class="view" id="view-news"></section>
    <section class="view" id="view-tournament"></section>
  </main>
  <footer>Local simulation &middot; saved to your tour server (MongoDB)</footer>
</div>
<div id="toast-wrap"></div>
<div id="modal-root"></div>

<script>
(function(){
"use strict";

/* ===== CONSTANTS ===== */
const ATTRS=[
  {key:'power',label:'Driving Power',desc:'Distance off the tee'},
  {key:'accuracy',label:'Driving Accuracy',desc:'Keeping tee shots in play'},
  {key:'irons',label:'Iron Play',desc:'Approach shot precision'},
  {key:'short',label:'Short Game',desc:'Chipping & bunker recovery'},
  {key:'putting',label:'Putting',desc:'Touch and read on the green'},
  {key:'clutch',label:'Mental / Clutch',desc:'Composure under pressure'},
];

// Prize money distribution as % of purse (positions 1-20, rest share minimum)
const PRIZE_PCT=[18,10.8,6.8,4.8,4,3.6,3.35,3.1,2.9,2.7,2.5,2.3,2.1,1.95,1.8,1.7,1.6,1.5,1.4,1.3];

const BASE_POINTS=[500,300,190,135,110,100,90,85,80,75,70,65,60,55,50,48,46,44,42,40,38,36,34,32,30,28,26,24,22,20];


function defaultAttrs(level){level=level||70;const o={};ATTRS.forEach(a=>o[a.key]=level);return o;}

function makeHoles(parsArr,yardBase){
  return parsArr.map((par,i)=>{const base=par===3?165:par===5?540:410;const variance=((i*37)%60)-30;return{hole:i+1,par,yards:Math.max(120,base+variance+(yardBase||0))};});
}
const STD_PARS=[4,4,3,5,4,4,3,4,5,4,3,4,5,4,4,3,5,4];
function courseVariant(seedShift,yardBase){
  const arr=STD_PARS.slice();
  if(seedShift%3===1){arr[2]=5;arr[16]=3;}
  if(seedShift%4===2){arr[8]=4;arr[12]=5;}
  return makeHoles(arr,yardBase);
}

const TOURNAMENT_SEEDS=[
  {name:"The Sentry",course:"Kapalua Plantation Course",loc:"Kapalua, HI",major:false,purse:20,seed:1,yard:0},
  {name:"Sony Open in Hawaii",course:"Waialae Country Club",loc:"Honolulu, HI",major:false,purse:8.3,seed:2,yard:-10},
  {name:"AT&T Pebble Beach Pro-Am",course:"Pebble Beach Golf Links",loc:"Pebble Beach, CA",major:false,purse:20,seed:3,yard:-5},
  {name:"Arnold Palmer Invitational",course:"Bay Hill Club",loc:"Orlando, FL",major:false,purse:20,seed:4,yard:10},
  {name:"THE PLAYERS Championship",course:"TPC Sawgrass (Stadium)",loc:"Ponte Vedra Beach, FL",major:false,purse:25,seed:5,yard:5},
  {name:"Masters Tournament",course:"Augusta National Golf Club",loc:"Augusta, GA",major:true,purse:20,seed:6,yard:15},
  {name:"RBC Heritage",course:"Harbour Town Golf Links",loc:"Hilton Head, SC",major:false,purse:20,seed:7,yard:-20},
  {name:"PGA Championship",course:"Quail Hollow Club",loc:"Charlotte, NC",major:true,purse:18.5,seed:8,yard:20},
  {name:"Charles Schwab Challenge",course:"Colonial Country Club",loc:"Fort Worth, TX",major:false,purse:9.7,seed:9,yard:-15},
  {name:"the Memorial Tournament",course:"Muirfield Village GC",loc:"Dublin, OH",major:false,purse:20,seed:10,yard:8},
  {name:"U.S. Open",course:"Oakmont Country Club",loc:"Oakmont, PA",major:true,purse:21.5,seed:11,yard:18},
  {name:"Travelers Championship",course:"TPC River Highlands",loc:"Cromwell, CT",major:false,purse:20,seed:12,yard:-12},
  {name:"John Deere Classic",course:"TPC Deere Run",loc:"Silvis, IL",major:false,purse:7.5,seed:13,yard:-18},
  // Team Event — fantasy teams compete directly
  {name:"The Open Championship",course:"St Andrews (Old Course)",loc:"St Andrews, Scotland",major:true,purse:17,seed:14,yard:0,teamEvent:false},
  {name:"FedEx St. Jude Championship",course:"TPC Southwind",loc:"Memphis, TN",major:false,purse:20,seed:16,yard:6,playoff:true},
  {name:"BMW Championship",course:"Castle Pines GC",loc:"Castle Rock, CO",major:false,purse:20,seed:17,yard:22,playoff:true},
  {name:"TOUR Championship",course:"East Lake Golf Club",loc:"Atlanta, GA",major:false,purse:75,seed:18,yard:4,playoff:true},
  {name:"Ryder Cup",course:"Various",loc:"International",major:false,purse:0,seed:15,yard:0,rydercup:true},
  {name:"Procore Championship",course:"Silverado Resort (North)",loc:"Napa, CA",major:false,purse:8.4,seed:19,yard:-6},
  {name:"Shriners Children's Open",course:"TPC Summerlin",loc:"Las Vegas, NV",major:false,purse:8.6,seed:20,yard:-9},
];

function buildTournamentDefs(){
  return TOURNAMENT_SEEDS.map((t,idx)=>({
    id:'trn_'+idx,order:idx,name:t.name,course:t.course,location:t.loc,
    major:t.major,teamEvent:!!t.teamEvent,playoff:!!t.playoff,bigPurse:!!t.bigPurse,rydercup:!!t.rydercup,purseM:t.purse,rounds:t.major?4:2,
    holes:courseVariant(t.seed,t.yard),fieldSize:t.major?20:16,
  }));
}

function pointsForPosition(pos,isMajor){
  const idx=pos-1;
  let base=idx<BASE_POINTS.length?BASE_POINTS[idx]:Math.max(2,20-(idx-BASE_POINTS.length));
  if(isMajor)base=Math.round(base*1.6);
  return base;
}

function prizeForPosition(pos,purseM,fieldSize){
  const idx=pos-1;
  const pct=idx<PRIZE_PCT.length?PRIZE_PCT[idx]:Math.max(0.3,1.0-(idx-PRIZE_PCT.length)*0.05);
  return Math.round(purseM*1000000*pct/100);
}

/* ===== STORAGE =====
   Game state now lives in MongoDB via the companion Express API (see server.js).
   On load we fetch the saved profile from the server; on every change we push
   the full state back up (debounced so rapid actions don't spam the network).
   If the API can't be reached at all (e.g. you're just opening this HTML file
   directly, with no server running), we fall back to localStorage so the app
   still works standalone — you'll see a small notice when that happens. */
const STORAGE_KEY='teeSheetTour_save_v3';
const SAVE_VERSION=3;

// Point this at wherever server.js is running. Override by setting
// window.TEE_SHEET_API_BASE before this script runs, e.g. from a different port/host.
const API_BASE =
  window.TEE_SHEET_API_BASE ||
  "/api";
const PROFILE_ID=(function(){
  // One save slot per browser by default — change this if you want multiple
  // independent tours against the same server (e.g. multiple users).
  let id=null;
  try{id=window.localStorage.getItem('teeSheetTour_profileId');}catch(e){}
  if(!id){id='profile_'+Math.random().toString(36).slice(2,10);try{window.localStorage.setItem('teeSheetTour_profileId',id);}catch(e){}}
  return id;
})();

let USING_MEMORY_FALLBACK=false;
let USING_LOCAL_FALLBACK=false;
let LOCAL_BACKEND=(function(){
  try{const real=window.localStorage;real.setItem('__probe__','1');real.removeItem('__probe__');return real;}
  catch(e){USING_MEMORY_FALLBACK=true;const mem={};return{getItem:k=>k in mem?mem[k]:null,setItem:(k,v)=>{mem[k]=String(v);},removeItem:k=>{delete mem[k];}};}
})();

function freshState(){
  return{
    version:SAVE_VERSION,seasonNumber:1,
    players:[],
    tournamentDefs:buildTournamentDefs(),
    schedule:[],
    currentWeekIndex:0,
    standings:{},           // playerId -> {points, earnings, wins, events, history:[{trnName,pos,pts,prize}]}
    history:[],
    activeTournamentId:null,
    fedexStandings:{},      // playerId -> {points, earnings} — playoff events only, not counted for tour standings
    majorChampions:{},      // trnId -> [{season, playerId, toPar, strokes}]
    news:[],                // [{id,season,trnId,type,icon,headline,body,ts,clutch}]
    awards:[],              // [{season,playerOfYear,fedexWinner,mostImproved}]
    rydercup:null,          // active ryder cup state, null when not in progress
    worldRanking:{},        // playerId -> {pts, history:[{trnId,trnName,pts,season,week,major,playoff}]}
    rydercupHistory:[],    // [{season, winner:'USA'|'Europe', usaPlayers:[], europePlayers:[], score:{usa,europe}}]
  };
}

function normalizeState(p){
  if(!p||p.version!==SAVE_VERSION)return freshState();
  p.players=p.players||[];
  p.players.forEach(pl=>{if(!pl.career)pl.career={points:0,earnings:0,wins:0,events:0,seasons:0,history:[]};});
  p.tournamentDefs=buildTournamentDefs(); // always rebuild so new fields (e.g. playoff) are present
  p.schedule=p.schedule||[];p.standings=p.standings||{};p.history=p.history||[];p.fedexStandings=p.fedexStandings||{};p.majorChampions=p.majorChampions||{};p.news=p.news||[];p.awards=p.awards||[];if(p.rydercup===undefined)p.rydercup=null;p.worldRanking=p.worldRanking||{};
  if(!p.rydercupHistory)p.rydercupHistory=[];
  return p;
}

function loadStateLocal(){
  try{
    const raw=LOCAL_BACKEND.getItem(STORAGE_KEY);
    if(!raw)return freshState();
    return normalizeState(JSON.parse(raw));
  }catch(e){return freshState();}
}

function saveStateLocal(state){
  try{LOCAL_BACKEND.setItem(STORAGE_KEY,JSON.stringify(state));}
  catch(e){showToast('Could not save locally — storage may be full.',true);}
}

// Tries the Mongo-backed API first; falls back to localStorage if the server
// isn't reachable at all (network error / CORS / not running).
async function loadStateRemote(){
  try{
    const res=await fetch(`${API_BASE}/state/${PROFILE_ID}`);
    if(res.status===404)return freshState(); // no save yet for this profile
    if(!res.ok)throw new Error('Bad response '+res.status);
    const data=await res.json();
    USING_LOCAL_FALLBACK=false;
    return normalizeState(data.state);
  }catch(e){
    USING_LOCAL_FALLBACK=true;
    return loadStateLocal();
  }
}

let SAVE_IN_FLIGHT=false,SAVE_QUEUED=false,SAVE_DEBOUNCE_TIMER=null;
function saveState(){
  if(USING_LOCAL_FALLBACK)return; // no server to push to
  clearTimeout(SAVE_DEBOUNCE_TIMER);
  SAVE_DEBOUNCE_TIMER=setTimeout(pushStateToServer,400);
}

async function pushStateToServer(){
  if(SAVE_IN_FLIGHT){SAVE_QUEUED=true;return;}
  SAVE_IN_FLIGHT=true;
  try{
    const res=await fetch(`${API_BASE}/state/${PROFILE_ID}`,{
      method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({state:STATE})
    });
    if(!res.ok)throw new Error('Bad response '+res.status);
  }catch(e){
    USING_LOCAL_FALLBACK=true;
    showToast("Lost connection to the server — saving locally in this browser for now.",true);
  }finally{
    SAVE_IN_FLIGHT=false;
    if(SAVE_QUEUED){SAVE_QUEUED=false;pushStateToServer();}
  }
}

let STATE=freshState(); // placeholder until the async load below resolves

/* ===== HELPERS ===== */
function uid(p){return p+'_'+Math.random().toString(36).slice(2,10)+Date.now().toString(36).slice(-4);}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}
function overallOf(attrs){
  const w={power:0.16,accuracy:0.18,irons:0.22,short:0.18,putting:0.18,clutch:0.08};
  let s=0;ATTRS.forEach(a=>s+=attrs[a.key]*w[a.key]);return Math.round(s);
}

/* ===== DYNAMIC FORM (hot/cold streaks) =====
   Looks at a player's last 5 tournament results (toPar relative to field average
   that week, so it's not skewed by easy/hard courses) and turns that into a
   temporary form rating. Hot form buffs effective attributes, cold form nerfs them.
   This never touches the player's base attrs — it's only applied at simulation time. */
const FORM_WINDOW=5;
const FORM_MAX_SWING=3; // max +/- points applied to each attribute at full hot/cold

function playerFormScore(playerId){
  const st=STATE.standings[playerId];if(!st||!st.history||!st.history.length)return 0;
  const recent=st.history.slice(-FORM_WINDOW);
  let weighted=0,totalWeight=0;
  recent.forEach((h,i)=>{
    // missed cuts count as a notably cold result; relative-to-field already baked into toPar
    const rel=h.pos==='MC'?6:-(h.fieldRelToPar!=null?h.fieldRelToPar:0);
    // more recent results count slightly more
    const weight=1+i*0.15;
    weighted+=rel*weight;totalWeight+=weight;
  });
  const avg=totalWeight?weighted/totalWeight:0;
  // squash into roughly -1 (ice cold) .. +1 (red hot)
  return clamp(avg/4,-1,1);
}

function formLabel(score){
  if(score>=0.55)return{label:'🔥 Red Hot',color:'var(--flag-red)'};
  if(score>=0.2)return{label:'On Form',color:'var(--turf-600)'};
  if(score<=-0.55)return{label:'🧊 Ice Cold',color:'var(--ink-500)'};
  if(score<=-0.2)return{label:'Off Form',color:'var(--ink-500)'};
  return{label:'Steady',color:'var(--ink-700)'};
}

// Effective attrs used for simulation = base attrs + form-driven swing
function effectiveAttrs(player){
  const form=playerFormScore(player.id);
  if(form===0)return player.attrs;
  const out={};
  ATTRS.forEach(a=>{out[a.key]=clamp(Math.round(player.attrs[a.key]+form*FORM_MAX_SWING),1,99);});
  return out;
}
function gaussian(mean,sd){
  let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();
  return mean+Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)*sd;
}
function ensureScheduleForSeason(){
  if(STATE.schedule&&STATE.schedule.length===STATE.tournamentDefs.length)return;
  STATE.schedule=STATE.tournamentDefs.map(def=>makeTournamentInstance(def));
}
function makeTournamentInstance(def){
  return{defId:def.id,status:'scheduled',field:[],rounds:[],cutLine:null,leaderboardCache:null,winnerId:null,completedAt:null,cutPlayers:null,cutAppliedAfterRound:null};
}
function getDef(defId){return STATE.tournamentDefs.find(d=>d.id===defId);}
function getInstance(defId){return STATE.schedule.find(s=>s.defId===defId);}
function getPlayer(id){return STATE.players.find(p=>p.id===id);}
function topPlayersByPoints(n){

}

function initialsOf(name){return name.split(' ').filter(Boolean).map(w=>w[0]).slice(0,2).join('').toUpperCase();}

/* ===== SIMULATION ENGINE ===== */
function newHoleState(holeDef){
  return{hole:holeDef.hole,par:holeDef.par,totalYards:holeDef.yards,remaining:holeDef.yards,
    lie:'tee',strokes:0,holedOut:false,log:[],puttDistanceFt:null,eagles:0,birdies:0,bogeys:0,doubles:0};
}
function skillFactor(skill){return 0.55+(skill/99)*0.9;}
function chooseShotType(hs){
  if(hs.lie==='green')return 'putt';
  if(hs.lie==='sand')return hs.remaining<=40?'bunker':'approach';
  if(hs.remaining>230)return hs.lie==='tee'?'tee_long':'long_approach';
  if(hs.remaining>100)return 'approach';
  if(hs.remaining>0)return 'chip';
  return 'putt';
}

function resolveFullSwing(hs,attrs,shotType){
  const{power,accuracy,irons,clutch}=attrs;let res={};
  if(shotType==='tee_long'){
    const distPotential=250+(power/99)*100;const distActual=clamp(gaussian(distPotential,14),190,380);
    const accRoll=Math.random()*100;const missThreshold=30+(accuracy/99)*55;
    let newLie='fairway';
    if(accRoll>missThreshold+15)newLie='rough';if(accRoll>missThreshold+38)newLie='recovery';
    hs.remaining=clamp(hs.remaining-distActual,0,9999);hs.lie=hs.remaining<=0?'green':newLie;
    res.text=`Drive ${Math.round(distActual)}y — ${newLie==='fairway'?'finds the fairway':newLie==='rough'?'drifts into the rough':'leaks into trouble'}.`;
  } else {
    const lieMult=hs.lie==='fairway'?1.0:hs.lie==='rough'?0.85:hs.lie==='recovery'?0.6:0.9;
    const skillP=(irons/99)*lieMult;
    const distPotential=hs.remaining*(0.93+skillP*0.1);
    const distActual=clamp(gaussian(distPotential,18+(1-skillP)*22),hs.remaining*0.55,hs.remaining*1.08);
    const leftover=clamp(hs.remaining-distActual,0,9999);hs.remaining=leftover;
    const qualityRoll=Math.random()*100+(irons-50)*0.5+(clutch-50)*0.15;
    let newLie;
    if(leftover<=0)newLie='green';
    else if(qualityRoll>70)newLie='fairway';else if(qualityRoll>40)newLie='rough';
    else if(qualityRoll>25)newLie='sand';else newLie='recovery';
    hs.lie=newLie;
    if(leftover<=0){
      const closeness=clamp(gaussian(28-skillP*20,12),2,90);hs.puttDistanceFt=Math.round(closeness);hs.lie='green';
      res.text=`Approach finds the green, ${hs.puttDistanceFt} ft from the pin.`;
    }else res.text=`Shot covers ${Math.round(distActual)}y, ${Math.round(leftover)}y remaining, into the ${newLie}.`;
  }
  return res;
}

function resolveChip(hs,attrs){
  const skillP=attrs.short/99;const dist=hs.remaining;
  const closenessBase=clamp(14-skillP*10,1.5,16);const closeness=clamp(gaussian(closenessBase+dist*0.04,6),0.5,45);
  const chipInChance=dist<25?(0.05+skillP*0.12):0.01;
  if(Math.random()<chipInChance){hs.holedOut=true;hs.lie='hole';return{text:'Chips it in! 🎯',holed:true};}
  hs.remaining=0;hs.lie='green';hs.puttDistanceFt=Math.round(closeness);
  return{text:`Chips on, ${hs.puttDistanceFt} ft for the putt.`};
}

function resolveBunker(hs,attrs){
  const skillP=attrs.short/99;const closeness=clamp(gaussian(16-skillP*10,7),1,40);
  if(Math.random()<0.04+(1-skillP)*0.05){hs.remaining=clamp(hs.remaining*0.4,5,60);return{text:'Leaves it in the sand — still in the bunker.'};}
  hs.remaining=0;hs.lie='green';hs.puttDistanceFt=Math.round(closeness);return{text:`Splashes out to ${hs.puttDistanceFt} ft.`};
}

function resolvePutt(hs,attrs){
  const skillP=attrs.putting/99;const clutchP=attrs.clutch/99;const distFt=hs.puttDistanceFt;
  let makeChance;
  if(distFt<=2)makeChance=0.93+skillP*0.06;
  else if(distFt<=5)makeChance=0.55+skillP*0.35;
  else if(distFt<=10)makeChance=0.25+skillP*0.4;
  else if(distFt<=20)makeChance=0.08+skillP*0.27;
  else if(distFt<=35)makeChance=0.02+skillP*0.12;
  else makeChance=0.01+skillP*0.05;
  makeChance+=((clutchP-0.5)*0.05);makeChance=clamp(makeChance,0.01,0.97);
  if(Math.random()<makeChance){
    hs.holedOut=true;hs.lie='hole';
    const flavor=distFt>20?'Bomb from distance — in the cup!':distFt>8?'Rolls in!':'Good putt, in the heart.';
    return{text:flavor,holed:true};
  }
  const leaveBase=distFt>20?distFt*0.22:distFt>8?distFt*0.28:distFt*0.35;
  const leave=clamp(gaussian(leaveBase,leaveBase*0.4+0.5),0.3,distFt*0.9);
  hs.puttDistanceFt=Math.round(leave*10)/10;
  return{text:`Just slides by, ${hs.puttDistanceFt} ft left.`};
}

function playShot(hs,attrs){
  hs.strokes+=1;const shotType=chooseShotType(hs);let res;
  if(shotType==='tee_long')res=resolveFullSwing(hs,attrs,'tee_long');
  else if(shotType==='approach'||shotType==='long_approach')res=resolveFullSwing(hs,attrs,shotType);
  else if(shotType==='chip')res=resolveChip(hs,attrs);
  else if(shotType==='bunker')res=resolveBunker(hs,attrs);
  else res=resolvePutt(hs,attrs);
  res.shotType=shotType;res.strokeNum=hs.strokes;hs.log.push(res.text);
  if(hs.strokes>=12&&!hs.holedOut){hs.holedOut=true;hs.forcedPickup=true;res.text+=' Picks up — max score.';}
  return res;
}

// Play a complete hole automatically for a player (used in batch/simulate-all mode)
function simulateFullHole(holeDef,attrs){
  const hs=newHoleState(holeDef);
  while(!hs.holedOut)playShot(hs,attrs);
  return hs;
}

/* ===== TOURNAMENT LIFECYCLE ===== */
function startTournament(defId,fieldPlayerIds){
  const inst=getInstance(defId);const def=getDef(defId);
  if(!inst||!def)return;if(fieldPlayerIds.length<2){showToast('Pick at least 2 players.',true);return;}
  inst.field=fieldPlayerIds.slice();inst.status='in_progress';inst.rounds=[];
  for(let r=1;r<=def.rounds;r++){
    const scores={};fieldPlayerIds.forEach(pid=>scores[pid]=new Array(18).fill(null));
    inst.rounds.push({roundNum:r,scores,complete:false});
  }
  inst.cutAppliedAfterRound=def.rounds===4?2:null;inst.cutPlayers=null;
  STATE.activeTournamentId=defId;saveState();
}

function computeLeaderboard(defId){
  const inst=getInstance(defId);const def=getDef(defId);if(!inst)return[];
  const rows=inst.field.map(pid=>{
    let strokes=0,holesPlayed=0,parPlayed=0;
    const cutOut=inst.cutPlayers&&!inst.cutPlayers.has(pid);
    for(let r=0;r<inst.rounds.length;r++){
      const rd=inst.rounds[r];const arr=rd.scores[pid]||[];
      for(let h=0;h<18;h++){if(arr[h]!=null){strokes+=arr[h];holesPlayed++;parPlayed+=def.holes[h].par;}}
    }
    return{playerId:pid,strokes,toPar:strokes-parPlayed,holesPlayed,
      thru:holesPlayed%18===0&&holesPlayed>0?18:holesPlayed%18,
      roundsComplete:Math.floor(holesPlayed/18),cut:!!cutOut,
      finished:holesPlayed>=18*inst.rounds.length||cutOut};
  });
  rows.sort((a,b)=>a.cut!==b.cut?a.cut?1:-1:a.toPar-b.toPar);
  let pos=0,lastTP=null,lastCut=false;
  rows.forEach((row,i)=>{
    if(row.holesPlayed===0){row.position=null;return;}
    if(row.toPar!==lastTP||row.cut!==lastCut)pos=i+1;
    row.position=pos;lastTP=row.toPar;lastCut=row.cut;
  });
  return rows;
}

function applyCutIfNeeded(defId){
  const inst=getInstance(defId);const def=getDef(defId);
  if(!def||def.rounds!==4)return;if(inst.cutPlayers)return;
  const ar=inst.cutAppliedAfterRound;
  const allDone=inst.rounds.slice(0,ar).every(r=>inst.field.every(pid=>r.scores[pid].every(v=>v!=null)));
  if(!allDone)return;
  const lb=computeLeaderboard(defId);const cutSize=Math.max(2,Math.min(10,Math.ceil(inst.field.length*0.65)));
  const sorted=lb.slice().sort((a,b)=>a.toPar-b.toPar);const made=new Set();
  if(sorted.length){const cutTP=sorted[Math.min(cutSize,sorted.length)-1].toPar;sorted.forEach(r=>{if(r.toPar<=cutTP)made.add(r.playerId);});}
  inst.cutPlayers=made;saveState();
}

function isRoundComplete(inst,roundIdx){
  const rd=inst.rounds[roundIdx];
  return inst.field.every(pid=>{
    if(inst.cutPlayers&&!inst.cutPlayers.has(pid)&&roundIdx>=inst.cutAppliedAfterRound)return true;
    return rd.scores[pid].every(v=>v!=null);
  });
}

function finishTournamentIfDone(defId){
  const inst=getInstance(defId);const def=getDef(defId);
  if(inst.status==='complete')return false;
  const lastIdx=inst.rounds.length-1;if(!isRoundComplete(inst,lastIdx))return false;
  inst.status='complete';inst.completedAt=Date.now();
  const lb=computeLeaderboard(defId);
  const finishers=lb.filter(r=>!r.cut);
  inst.leaderboardCache=lb;

  const playedRows=lb.filter(r=>r.holesPlayed>0);
  const fieldAvgToPar=playedRows.length?playedRows.reduce((s,r)=>s+r.toPar,0)/playedRows.length:0;
  inst._fieldAvgToPar=fieldAvgToPar; // stash for resolvePlayoffHoleIfComplete

  // ── Tie for 1st: go to playoff BEFORE awarding anything ──
  if(finishers.length>=2&&finishers[0].toPar===finishers[1].toPar){
    const tiedPids=finishers.filter(r=>r.toPar===finishers[0].toPar).map(r=>r.playerId);
    inst.status='playoff_pending';
    inst.tiedPids=tiedPids;
    inst.playoffHole={
      holeNum:1,scores:{},currentHole:1,
      eliminated:[],remainingPids:tiedPids.slice(),done:false,winnerId:null,
    };
    tiedPids.forEach(pid=>inst.playoffHole.scores[pid]=[]);
    if(STATE.activeTournamentId===defId)STATE.activeTournamentId=null;
    saveState();return false; // nothing awarded yet — wait for playoff
  }

  // ── No tie: award everything now ──
  if(finishers.length)inst.winnerId=finishers[0].playerId;
  finishers.forEach(row=>{
    const pts=pointsForPosition(row.position,def.major);
    const prize=prizeForPosition(row.position,def.purseM,finishers.length);
    if(!STATE.standings[row.playerId])STATE.standings[row.playerId]={points:0,earnings:0,wins:0,events:0,history:[]};
    const st=STATE.standings[row.playerId];
    if(def.playoff){
      if(!STATE.fedexStandings[row.playerId])STATE.fedexStandings[row.playerId]={points:0,earnings:0};
      STATE.fedexStandings[row.playerId].points+=pts;
      STATE.fedexStandings[row.playerId].earnings+=prize;
    } else { st.points+=pts; }
    st.earnings+=prize;st.events++;
    if(row.position===1)st.wins++;
    st.history.push({trnId:def.id,trnName:def.name,pos:row.position,pts:def.playoff?0:pts,prize,toPar:row.toPar,strokes:row.strokes,season:STATE.seasonNumber,fieldRelToPar:row.toPar-fieldAvgToPar,fedex:!!def.playoff});
  });
  if(def.major&&finishers.length){
    if(!STATE.majorChampions[def.id])STATE.majorChampions[def.id]=[];
    STATE.majorChampions[def.id].push({season:STATE.seasonNumber,playerId:finishers[0].playerId,toPar:finishers[0].toPar,strokes:finishers[0].strokes});
  }
  lb.filter(r=>r.cut).forEach(row=>{
    if(!STATE.standings[row.playerId])STATE.standings[row.playerId]={points:0,earnings:0,wins:0,events:0,history:[]};
    STATE.standings[row.playerId].events++;
    STATE.standings[row.playerId].history.push({trnId:def.id,trnName:def.name,pos:'MC',pts:0,prize:0,toPar:row.toPar,strokes:row.strokes,season:STATE.seasonNumber,fieldRelToPar:row.toPar-fieldAvgToPar});
  });
  updateWorldRanking(defId,lb);
  generateTournamentNews(defId,lb,inst);
  if(STATE.activeTournamentId===defId)STATE.activeTournamentId=null;
  saveState();return true;
}

function recordHoleScore(defId,roundIdx,playerId,holeIdx,strokes){
  const inst=getInstance(defId);if(!inst)return;
  inst.rounds[roundIdx].scores[playerId][holeIdx]=strokes;saveState();
}

function resolvePlayoffHoleIfComplete(defId){
  const inst=getInstance(defId);
  const ph=inst.playoffHole;if(!ph||ph.done)return false;
  const holeNum=ph.currentHole;
  const allDone=ph.remainingPids.every(pid=>(ph.scores[pid]||[]).length>=holeNum);
  if(!allDone)return false;

  const holeScores=ph.remainingPids.map(pid=>({pid,s:ph.scores[pid][holeNum-1]}));
  const minScore=Math.min(...holeScores.map(h=>h.s));
  const survivors=holeScores.filter(h=>h.s===minScore).map(h=>h.pid);
  const eliminated=holeScores.filter(h=>h.s>minScore).map(h=>h.pid);
  ph.eliminated.push(...eliminated);

  if(survivors.length>1){
    // Still tied — another hole
    ph.remainingPids=survivors;
    ph.currentHole++;
    saveState();return false;
  }

  // ── Winner found — award everything exactly once ──
  ph.done=true;ph.winnerId=survivors[0];
  const winnerId=survivors[0];

  const def=getDef(defId);
  const lb=inst.leaderboardCache||computeLeaderboard(defId);
  const finishers=lb.filter(r=>!r.cut);
  const fieldAvgToPar=inst._fieldAvgToPar??
    (finishers.length?finishers.reduce((s,r)=>s+r.toPar,0)/finishers.length:0);

  inst.winnerId=winnerId;
  inst.deathHoleTied=true;
  inst.deathHoleWinner=winnerId;
  inst.deathHoleHolesPlayed=holeNum;
  inst.status='complete';inst.completedAt=Date.now();

  // Determine correct positions after the playoff:
  // • Playoff winner → position 1 (sole winner, gets win credit)
  // • All other tied players who were also T1 in regulation → position 2
  // • Everyone else keeps their regular leaderboard position
  const tiedPids=new Set(inst.tiedPids||[]);

  finishers.forEach(row=>{
    const isTied=tiedPids.has(row.playerId);
    const isWinner=row.playerId===winnerId;
    // Final position: winner=1, other tied players=2, rest unchanged
    const finalPos=isWinner?1:(isTied?2:row.position);

    const pts=pointsForPosition(finalPos,def.major);
    const prize=prizeForPosition(finalPos,def.purseM,finishers.length);

    if(!STATE.standings[row.playerId])STATE.standings[row.playerId]={points:0,earnings:0,wins:0,events:0,history:[]};
    const st=STATE.standings[row.playerId];

    if(def.playoff){
      if(!STATE.fedexStandings[row.playerId])STATE.fedexStandings[row.playerId]={points:0,earnings:0};
      STATE.fedexStandings[row.playerId].points+=pts;
      STATE.fedexStandings[row.playerId].earnings+=prize;
    } else {
      st.points+=pts;
    }
    st.earnings+=prize;
    st.events++;
    if(isWinner)st.wins++; // ONLY the playoff winner gets a win
    st.history.push({
      trnId:def.id,trnName:def.name,pos:finalPos,
      pts:def.playoff?0:pts,prize,
      toPar:row.toPar,strokes:row.strokes,
      season:STATE.seasonNumber,
      fieldRelToPar:row.toPar-fieldAvgToPar,
      fedex:!!def.playoff,
      playoffWin:isWinner,
    });
  });

  // Major champion — only the playoff winner
  if(def.major){
    const winRow=finishers.find(r=>r.playerId===winnerId);
    if(winRow){
      if(!STATE.majorChampions[def.id])STATE.majorChampions[def.id]=[];
      STATE.majorChampions[def.id].push({season:STATE.seasonNumber,playerId:winnerId,toPar:winRow.toPar,strokes:winRow.strokes});
    }
  }

  // MC players — event credit only (no points, no wins)
  lb.filter(r=>r.cut).forEach(row=>{
    if(!STATE.standings[row.playerId])STATE.standings[row.playerId]={points:0,earnings:0,wins:0,events:0,history:[]};
    STATE.standings[row.playerId].events++;
    STATE.standings[row.playerId].history.push({trnId:def.id,trnName:def.name,pos:'MC',pts:0,prize:0,toPar:row.toPar,strokes:row.strokes,season:STATE.seasonNumber,fieldRelToPar:row.toPar-fieldAvgToPar});
  });

  updateWorldRanking(defId,lb);
  generateTournamentNews(defId,lb,inst);
  if(STATE.activeTournamentId===defId)STATE.activeTournamentId=null;
  saveState();return true;
}

/* ===== SIMULATE HOLE FOR ALL / SELECTED PLAYERS ===== */
function simulateHoleForPlayers(defId,roundIdx,holeIdx,playerIds){
  const inst=getInstance(defId);const def=getDef(defId);
  playerIds.forEach(pid=>{
    if(inst.rounds[roundIdx].scores[pid][holeIdx]!=null)return; // already played
    const p=getPlayer(pid);if(!p)return;
    const hs=simulateFullHole(def.holes[holeIdx],effectiveAttrs(p));
    inst.rounds[roundIdx].scores[pid][holeIdx]=hs.strokes;
  });
  saveState();
}

function simulateRoundForPlayers(defId,roundIdx,playerIds){
  const inst=getInstance(defId);const def=getDef(defId);
  for(let h=0;h<18;h++){
    playerIds.forEach(pid=>{
      if(inst.rounds[roundIdx].scores[pid][h]!=null)return;
      const p=getPlayer(pid);if(!p)return;
      const hs=simulateFullHole(def.holes[h],effectiveAttrs(p));
      inst.rounds[roundIdx].scores[pid][h]=hs.strokes;
    });
  }
  saveState();
}

    });

  document.getElementById('player-modal-overlay').addEventListener('click',e=>{if(e.target.id==='player-modal-overlay')closeModal();});
  document.getElementById('pm-save').addEventListener('click',()=>{
    const name=document.getElementById('pm-name').value.trim();if(!name){showToast('Give the player a name.',true);return;}
    const country=document.getElementById('pm-country').value;const attrs={};

    else STATE.players.push({id:uid('plyr'),name,country,attrs,overall:overallOf(attrs),career:{points:0,earnings:0,wins:0,events:0,seasons:0,history:[]}});
    saveState();closeModal();renderRoster();refreshTopbar();
    showToast(editing?`${name} updated.`:`${name} added to the roster.`);
  });
}

function closeModal(){document.getElementById('modal-root').innerHTML='';}

function isSeasonComplete(){
  return STATE.schedule.length>0 && STATE.schedule.every(s=>s.status==='complete');
}

// Folds this season's standings into each player's permanent career record
// before the season standings get wiped, so wins/points/earnings/history
// are never lost going into the next season.
function foldStandingsIntoCareer(){
  STATE.players.forEach(p=>{
    const st=STATE.standings[p.id];if(!st)return;
    if(!p.career)p.career={points:0,earnings:0,wins:0,events:0,seasons:0,history:[]};
    p.career.points+=st.points||0;p.career.earnings+=st.earnings||0;
    p.career.wins+=st.wins||0;p.career.events+=st.events||0;p.career.seasons+=1;
    p.career.history=(p.career.history||[]).concat(st.history||[]);
  });
}

// Destructive full reset: wipes roster, career totals, everything. Used when
// the person explicitly wants to start over from scratch.
function restartSeason(){
  const hasProgress=STATE.schedule.some(s=>s.status!=='scheduled')||Object.keys(STATE.standings).length>0;
  if(hasProgress)STATE.history.push({seasonNumber:STATE.seasonNumber,standings:STATE.standings,schedule:STATE.schedule,archivedAt:Date.now()});
  STATE.players=[];STATE.seasonNumber=1;STATE.schedule=STATE.tournamentDefs.map(def=>makeTournamentInstance(def));
  STATE.standings={};STATE.activeTournamentId=null;STATE.history=[];STATE.fedexStandings={};STATE.news=[];STATE.awards=[];STATE.rydercup=null;STATE.worldRanking={};STATE.rydercupHistory=[];
  saveState();
}

// Salary cap per player, recalculated at season end based on rating + performance
// Base cap: overall * $50K. Top-10 finishes add $200K each. Wins add $500K.
// Minimum $1M, maximum $10M.
function updateSalaryCaps(){
  STATE.players.forEach(p=>{
    const st=STATE.standings[p.id]||{points:0,earnings:0,wins:0,events:0,history:[]};
    const top10=((st.history||[]).filter(h=>typeof h.pos==='number'&&h.pos<=10)).length;
    let cap=p.overall*50000; // base: OVR * $50K
    cap+=top10*200000;       // +$200K per top-10 finish this season
    cap+=(st.wins||0)*500000;// +$500K per win
    cap=Math.max(1000000,Math.min(10000000,Math.round(cap/100000)*100000));
    p.salaryCap=cap;
  });
}

/* ===== WORLD RANKING ENGINE =====
   Separate from PGA Tour season points. Never resets.
   Points awarded per finish, weighted by event type.
   Rolling: each result decays 15% per season it ages.
   Ranking is recomputed live from the history on demand.
   ================================================== */

// World ranking points per finish position (independent scale, more granular than tour pts)
const WR_BASE=[1000,600,400,300,250,210,180,155,135,120,108,96,86,77,69,62,56,51,46,42,38,35,32,29,27,25,23,21,19,17,15,14,13,12,11,10,9,8,7,6];
const WR_MAJOR_MULT=2.0;
const WR_PLAYOFF_MULT=1.5;
const WR_DECAY=0.85; // per season elapsed

function wrPointsForFinish(pos,isMajor,isPlayoff){
  const idx=pos-1;
  let base=idx<WR_BASE.length?WR_BASE[idx]:Math.max(1,6-(idx-WR_BASE.length));
  if(isMajor)base=Math.round(base*WR_MAJOR_MULT);
  else if(isPlayoff)base=Math.round(base*WR_PLAYOFF_MULT);
  return base;
}

// Called after every tournament completes (including playoff resolve).
// Adds the result to each player's WR history and recomputes their live WR points.
function updateWorldRanking(defId,lb){
  if(!STATE.worldRanking)STATE.worldRanking={};
  const def=getDef(defId);
  if(def.rydercup)return; // Ryder Cup doesn't count for world ranking
  const finishers=lb.filter(r=>!r.cut&&r.position);
  const currentSeason=STATE.seasonNumber;

  finishers.forEach(row=>{
    if(!row.position)return;
    const pts=wrPointsForFinish(row.position,!!def.major,!!def.playoff);
    if(!STATE.worldRanking[row.playerId])STATE.worldRanking[row.playerId]={pts:0,history:[]};
    // Avoid double-counting: remove any previous entry for this trnId+season
    STATE.worldRanking[row.playerId].history=STATE.worldRanking[row.playerId].history.filter(h=>!(h.trnId===def.id&&h.season===currentSeason));
    STATE.worldRanking[row.playerId].history.push({trnId:def.id,trnName:def.name,pos:row.position,pts,season:currentSeason,major:!!def.major,playoff:!!def.playoff});
  });

  // Give a small credit for MC (shows activity on tour)
  lb.filter(r=>r.cut).forEach(row=>{
    if(!STATE.worldRanking[row.playerId])STATE.worldRanking[row.playerId]={pts:0,history:[]};
    STATE.worldRanking[row.playerId].history=STATE.worldRanking[row.playerId].history.filter(h=>!(h.trnId===def.id&&h.season===currentSeason));
    STATE.worldRanking[row.playerId].history.push({trnId:def.id,trnName:def.name,pos:'MC',pts:0,season:currentSeason,major:!!def.major,playoff:!!def.playoff});
  });

  recomputeAllWRPoints();
}

// Recompute live WR points for all players from their history, applying decay
function recomputeAllWRPoints(){
  const curSeason=STATE.seasonNumber;
  STATE.players.forEach(p=>{
    const wr=STATE.worldRanking[p.id];if(!wr)return;
    let total=0;
    wr.history.forEach(h=>{
      const age=curSeason-h.season; // 0 = current season, 1 = last season, etc.
      const decay=Math.pow(WR_DECAY,age);
      total+=Math.round((h.pts||0)*decay);
    });
    wr.pts=total;
  });
}

// Returns sorted array [{playerId,player,pts,rank,trend}] — trend = rank change vs last week
function getWorldRankings(){
  recomputeAllWRPoints();
  const rows=STATE.players.map(p=>{
    const wr=STATE.worldRanking[p.id]||{pts:0,history:[]};
    return{playerId:p.id,player:p,pts:wr.pts,history:wr.history};
  }).sort((a,b)=>b.pts-a.pts);
  rows.forEach((r,i)=>r.rank=i+1);
  return rows;
}

// Returns a player's current world rank (1-indexed), or null
function playerWorldRank(pid){
  const rows=getWorldRankings();
  const r=rows.find(r=>r.playerId===pid);
  return r?r.rank:null;
}

/* ===== NEWS & STORYLINE ENGINE ===== */
function newsId(){return'news_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function pushNews(item){
  if(!STATE.news)STATE.news=[];
  STATE.news.unshift({id:newsId(),season:STATE.seasonNumber,ts:Date.now(),...item});
  // Cap feed at 200 items
  if(STATE.news.length>200)STATE.news.length=200;
}

// Called after finishTournamentIfDone — generates all tournament storylines + clutch moments
function generateTournamentNews(defId,lb,inst){
  const def=getDef(defId);
  const finishers=lb.filter(r=>!r.cut&&r.holesPlayed>0);
  if(!finishers.length)return;

  const winner=getPlayer(inst.winnerId);
  if(!winner)return;

  const winnerSt=STATE.standings[inst.winnerId]||{};
  const winnerRow=finishers[0];
  const toParTxt=v=>v===0?'even par':v>0?`+${v}`:String(v);
  const prize1=prizeForPosition(1,def.purseM,finishers.length);

  // --- CLUTCH MOMENTS (individual hole feats logged as sub-items) ---
  const clutchItems=[];

  // Eagles
  finishers.forEach(row=>{
    const p=getPlayer(row.playerId);if(!p)return;
    let eagles=0;
    inst.rounds.forEach(rd=>{
      const sc=rd.scores[row.playerId]||[];
      sc.forEach((s,hi)=>{if(s!=null&&s-def.holes[hi].par<=-2)eagles++;});
    });
    if(eagles>0)clutchItems.push({icon:'🦅',text:`${p.name} made ${eagles===1?'an eagle':''+eagles+' eagles'} at ${def.name}`});
  });

  // Chip-ins (approximate: score of 1 on a par 3, or 2 on a par 4 from off-green — we detect score 2 under par)
  finishers.forEach(row=>{
    const p=getPlayer(row.playerId);if(!p)return;
    let chipin=0;
    inst.rounds.forEach(rd=>{
      const sc=rd.scores[row.playerId]||[];
      sc.forEach((s,hi)=>{if(s!=null&&s-def.holes[hi].par<=-2&&def.holes[hi].par===3)chipin++;});
    });
    if(chipin>0)clutchItems.push({icon:'🎯',text:`${p.name} chipped in ${chipin===1?'once':''+chipin+' times'} during ${def.name}`});
  });

  // Comeback: winner was outside top-5 after round 1 in a 4-round event
  if(def.rounds===4&&inst.rounds[0]){
    const r1lb=finishers.slice().sort((a,b)=>{
      const sA=Object.values(inst.rounds[0].scores[a.playerId]||{}).reduce((s,v)=>s+(v||0),0);
      const sB=Object.values(inst.rounds[0].scores[b.playerId]||{}).reduce((s,v)=>s+(v||0),0);
      return sA-sB;
    });
    const winnerR1pos=r1lb.findIndex(r=>r.playerId===inst.winnerId);
    if(winnerR1pos>=5)clutchItems.push({icon:'⚡',text:`${winner.name} came from outside the top-${winnerR1pos+1} after Round 1 to win ${def.name}`});
  }

  // Sudden death
  if(inst.deathHoleTied){
    clutchItems.push({icon:'💀',text:`${winner.name} won ${def.name} in a sudden-death playoff hole`});
  }

  // Wire-to-wire (led after every round — simplified: same winner as round 1 top)
  if(def.rounds>=2&&inst.rounds[0]){
    const r1scores={};finishers.forEach(row=>{r1scores[row.playerId]=Object.values(inst.rounds[0].scores[row.playerId]||{}).reduce((s,v)=>s+(v||0),0);});
    const r1leader=Object.entries(r1scores).sort((a,b)=>a[1]-b[1])[0];
    if(r1leader&&r1leader[0]===inst.winnerId)clutchItems.push({icon:'🔝',text:`${winner.name} led wire-to-wire at ${def.name}`});
  }

  // Record low score (best toPar we've seen in history)
  const allPrevBest=STATE.news.filter(n=>n.type==='record').map(n=>n._toPar||999);
  const prevBest=allPrevBest.length?Math.min(...allPrevBest):999;
  if(winnerRow.toPar<prevBest){
    clutchItems.push({icon:'📉',text:`${winner.name} set a new tour scoring record at ${toParTxt(winnerRow.toPar)} (${winnerRow.strokes} strokes) at ${def.name}`});
    // Tag on the news item below
  }

  // --- MAIN HEADLINE STORY ---
  const winnerCareer=getPlayer(inst.winnerId)?.career||{wins:0};
  const totalWins=(winnerCareer.wins||0)+(winnerSt.wins||0);
  const prevWins=totalWins-1; // before this win was counted
  let headline,body,type='result',icon='📰';

  if(def.major){
    icon='🏆';type='major';
    if(prevWins===0){
      headline=`${winner.name} claims first Major title at ${def.name}`;
      body=`In a career-defining performance, ${winner.name} finished at ${toParTxt(winnerRow.toPar)} to lift the trophy at ${def.course}. The victory also marks their first tour win.`;
    } else {
      const majCount=(STATE.majorChampions[def.id]||[]).filter(c=>c.playerId===inst.winnerId).length;
      headline=`${winner.name} wins ${def.name}${majCount>1?` for the ${['second','third','fourth','fifth'][majCount-2]||majCount+'th'} time`:''}`;
      body=`${winner.name} shot ${toParTxt(winnerRow.toPar)} at ${def.course} to collect the ${formatMoney(prize1)} winner's cheque and add another Major to an impressive CV.`;
    }
  } else if(def.playoff){
    icon='⛳';type='playoff';
    headline=`${winner.name} takes ${def.name} FedEx Cup event`;
    body=`${winner.name} finished at ${toParTxt(winnerRow.toPar)} at ${def.course} to top the field and bank ${formatMoney(prize1)} in FedEx Cup earnings. Points go to the separate FedEx standings.`;
  } else if(def.teamEvent){
    icon='🤝';type='team';
    headline=`Team event thriller: ${winner.name} leads squad to ${def.name} victory`;
    body=`${winner.name} was the star individual at ${def.course}, helping their fantasy team clinch the team event honours at ${def.name}.`;
  } else if(totalWins===1&&(winnerCareer.wins||0)===0){
    icon='🌟';type='firstwin';
    const careerEventsBeforeWin=(winnerCareer.events||0)+(winnerSt.events||1)-1;
    headline=`FIRST WIN: ${winner.name} breaks through at ${def.name}`;
    body=`After ${careerEventsBeforeWin} events without a victory, ${winner.name} finally got the job done at ${def.course}, posting ${toParTxt(winnerRow.toPar)} to claim the title and ${formatMoney(prize1)}.`;
  } else {
    const careerWinner=STATE.players.find(p=>p.id===inst.winnerId);
    const allWinnerHistory=[...((careerWinner?.career?.history)||[]),...(winnerSt.history||[])];
    const streakCheck=allWinnerHistory;
    const recentResults=streakCheck.slice(-4);
    const recentWins=recentResults.filter(h=>h.pos===1).length;
    if(recentWins>=2){
      icon='🔥';type='hotstreak';
      headline=`${winner.name} on fire — ${recentWins} wins in last ${recentResults.length} events`;
      body=`${winner.name} is the form player on tour right now. Another dominant display at ${def.name} (${toParTxt(winnerRow.toPar)}) shows no signs of slowing down.`;
    } else {
      headline=`${winner.name} wins ${def.name} with ${toParTxt(winnerRow.toPar)}`;
      body=`${winner.name} held firm at ${def.course} to take the ${formatMoney(prize1)} top prize, their ${totalWins===2?'second':totalWins===3?'third':totalWins+'th'} tour victory.`;
    }
  }

  // Runner-up
  const runner=finishers[1];const runnerP=runner?getPlayer(runner.playerId):null;
  if(runnerP&&!inst.deathHoleTied)body+=` ${runnerP.name} was runner-up at ${toParTxt(runner.toPar)}.`;

  pushNews({type,icon,headline,body,trnId:defId,trnName:def.name,_toPar:winnerRow.toPar,
    winnerId:inst.winnerId,clutchItems:clutchItems.slice(0,4)});

  // Winless drought story (anyone who has played 8+ events with no win and finished top 5 here)
  finishers.filter(r=>r.position>=2&&r.position<=5).forEach(row=>{
    const p=getPlayer(row.playerId);if(!p)return;
    const pSt=STATE.standings[row.playerId]||{};
    const careerTotalWins=(pSt.wins||0)+(p.career?.wins||0);
    const careerTotalEvents=(pSt.events||0)+(p.career?.events||0);
    if(careerTotalEvents>=8&&careerTotalWins===0){
      pushNews({type:'drought',icon:'😤',trnId:defId,trnName:def.name,
        headline:`${p.name} agonisingly close — still searching for first win`,
        body:`A T${row.position} finish at ${def.name} is another near-miss for ${p.name}, who is still chasing that elusive first tour victory after ${careerTotalEvents} career starts.`});
    }
  });
}

// Called at season end — computes Player of Year, FedEx winner, Most Improved
function computeSeasonAwards(){
  if(STATE.players.length<2)return;
  const season=STATE.seasonNumber;

  // Player of the Year = leader in tour standings
  const standingsSorted=STATE.players
    .map(p=>({p,pts:(STATE.standings[p.id]||{}).points||0}))
    .sort((a,b)=>b.pts-a.pts);
  const poy=standingsSorted[0]?.pts>0?standingsSorted[0].p:null;

  // FedEx Cup winner = leader in fedexStandings
  const fedexSorted=STATE.players
    .map(p=>({p,pts:(STATE.fedexStandings[p.id]||{}).points||0}))
    .sort((a,b)=>b.pts-a.pts);
  const fedexWinner=fedexSorted[0]?.pts>0?fedexSorted[0].p:null;

  // Most Improved: compare this season points to PREVIOUS season points
  // Previous season points live in STATE.history (the last archive entry for this player)
  let mostImproved=null,bestDelta=-Infinity;
  if(STATE.history.length>=1){
    const prevArchive=STATE.history[STATE.history.length-1]; // most recent archived season
    STATE.players.forEach(p=>{
      const curPts=(STATE.standings[p.id]||{}).points||0;
      const prevPts=(prevArchive.standings?.[p.id]?.points)||0;
      // Only consider players who actually played this season
      if((STATE.standings[p.id]||{}).events<1)return;
      const delta=curPts-prevPts;
      if(delta>bestDelta){bestDelta=delta;mostImproved=p;}
    });
    if(bestDelta<=0)mostImproved=null; // no one genuinely improved
  }
  // Season 1 → no Most Improved (no prior season to compare)

  // World Ranking #1 at season end
  const wrRows=getWorldRankings();
  const wrNo1=wrRows.length&&wrRows[0].pts>0?wrRows[0].player:null;

  const award={season,playerOfYear:poy?.id||null,fedexWinner:fedexWinner?.id||null,mostImproved:mostImproved?.id||null,mostImprovedDelta:bestDelta>0?bestDelta:0,worldNo1:wrNo1?.id||null};
  STATE.awards.push(award);

  // Generate a news story for the awards
  const lines=[];
  if(poy)lines.push(`🏅 **Player of the Year:** ${poy.name} (${(STATE.standings[poy.id]||{}).points||0} pts)`);
  if(fedexWinner)lines.push(`⛳ **FedEx Cup Winner:** ${fedexWinner.name} (${(STATE.fedexStandings[fedexWinner.id]||{}).points||0} FedEx pts)`);
  if(wrNo1)lines.push(`🌍 **World No. 1:** ${wrNo1.name} (${(STATE.worldRanking[wrNo1.id]||{}).pts||0} WR pts)`);
  if(mostImproved)lines.push(`📈 **Most Improved:** ${mostImproved.name} (+${bestDelta} pts vs last season)`);
  else if(STATE.history.length===0)lines.push(`📈 **Most Improved:** Not awarded in Season 1`);

  if(lines.length){
    pushNews({type:'awards',icon:'🎖️',trnId:null,trnName:null,
      headline:`Season ${season} Awards — End of Year Honours`,
      body:lines.join(' · '),
      awardData:award});
  }
}

// Non-destructive season rollover: roster and career totals carry forward,
// only the season-scoped standings/schedule reset.
function startNextSeason(){
  foldStandingsIntoCareer();
  updateSalaryCaps(); // update caps before standings wipe
  computeSeasonAwards(); // compute awards before standings wipe
  STATE.history.push({seasonNumber:STATE.seasonNumber,standings:STATE.standings,schedule:STATE.schedule,archivedAt:Date.now()});
  STATE.seasonNumber+=1;STATE.schedule=STATE.tournamentDefs.map(def=>makeTournamentInstance(def));
  STATE.standings={};STATE.activeTournamentId=null;STATE.fedexStandings={};
  STATE.rydercup=null; // reset ryder cup state each season (new one is auto-triggered every 2 seasons)
  saveState();
}

/* ===== RYDER CUP ENGINE (USA vs EUROPE — every 2 seasons) ===== */
const RC_WINNER_PURSE=100000000; // $100M
const RC_RUNNER_PURSE=25000000;  // $25M

// Returns true if this season should have a Ryder Cup (seasons 1,3,5,7...)
function isRyderCupSeason(seasonNum){ return seasonNum%2===1; }

// Identify which players are USA and which are Europe
const USA_COUNTRIES=['US','CA','MX'];
const EUROPE_COUNTRIES=['ENG','SCO','IE','ES','SE','DE','FR','IT','NO','BE','CH','AT','PT','DK','FI','NL','PL','CZ','ZA','NZ'];

function playerTeam(player){
  if(USA_COUNTRIES.includes(player.country))return'USA';
  if(EUROPE_COUNTRIES.includes(player.country))return'Europe';
  return null; // e.g. KR, JP, AU, AR — not eligible
}

// Select 6 players per side:
//   - Top 4 by world ranking from that side
//   - + 2 by best PGA Tour finish (points) that season from remaining players
function selectRyderCupTeam(side){
  const eligible=STATE.players.filter(p=>playerTeam(p)===side);
  if(eligible.length===0)return[];
  const wrRows=getWorldRankings();
  // Sort by WR points
  const byWR=eligible.slice().sort((a,b)=>{
    const wa=wrRows.find(r=>r.playerId===a.id)?.pts||0;
    const wb=wrRows.find(r=>r.playerId===b.id)?.pts||0;
    return wb-wa;
  });
  const top4=byWR.slice(0,4);
  const top4Ids=new Set(top4.map(p=>p.id));
  // Remaining: sort by this season PGA points
  const remaining=eligible.filter(p=>!top4Ids.has(p.id)).sort((a,b)=>{
    const pa=(STATE.standings[a.id]||{}).points||0;
    const pb=(STATE.standings[b.id]||{}).points||0;
    return pb-pa;
  });
  const picks2=remaining.slice(0,2);
  return [...top4,...picks2].map(p=>p.id);
}

function rcInit(defId){
  if(!isRyderCupSeason(STATE.seasonNumber)){
    showToast('The Ryder Cup only happens in odd-numbered seasons (1,3,5...).',true);return;
  }
  const usaPlayers=selectRyderCupTeam('USA');
  const europePlayers=selectRyderCupTeam('Europe');
  if(usaPlayers.length<2||europePlayers.length<2){
    showToast('Need at least 2 eligible USA and 2 eligible Europe players on the roster. Add players from those countries.',true);return;
  }
  STATE.rydercup={
    defId,
    season:STATE.seasonNumber,
    phase:'in_progress', // 'in_progress' | 'complete'
    usaPlayers,
    europePlayers,
    // Day 1: Foursomes (pairs, alternate shot) — 3 matches
    // Day 2: Fourball (pairs, best ball) — 3 matches  
    // Day 3: Singles — 6 matches (one per player each side, 6 players per side)
    sessions:[
      {name:'Day 1 — Foursomes',type:'foursomes',matches:rcBuildPairMatches(usaPlayers,europePlayers,'foursomes'),done:false,ptsUSA:0,ptsEurope:0},
      {name:'Day 2 — Four-Ball',type:'fourball',matches:rcBuildPairMatches(usaPlayers,europePlayers,'fourball'),done:false,ptsUSA:0,ptsEurope:0},
      {name:'Day 3 — Singles',type:'singles',matches:rcBuildSinglesMatches(usaPlayers,europePlayers),done:false,ptsUSA:0,ptsEurope:0},
    ],
    totalUSA:0,totalEurope:0,
    winner:null, // 'USA' | 'Europe'
    selectionInfo:{usa:rcSelectionInfo('USA'),europe:rcSelectionInfo('Europe')},
  };
  const inst=getInstance(defId);
  inst.status='in_progress';inst.rydercupActive=true;
  STATE.activeTournamentId=defId;
  saveState();
  switchView('tournament');
}

function rcSelectionInfo(side){
  const eligible=STATE.players.filter(p=>playerTeam(p)===side);
  const wrRows=getWorldRankings();
  const byWR=eligible.slice().sort((a,b)=>{
    const wa=wrRows.find(r=>r.playerId===a.id)?.pts||0;
    const wb=wrRows.find(r=>r.playerId===b.id)?.pts||0;
    return wb-wa;
  });
  const top4=byWR.slice(0,4).map(p=>p.id);
  const top4Ids=new Set(top4);
  const remaining=eligible.filter(p=>!top4Ids.has(p.id)).sort((a,b)=>{
    return ((STATE.standings[b.id]||{}).points||0)-((STATE.standings[a.id]||{}).points||0);
  });
  const picks2=remaining.slice(0,2).map(p=>p.id);
  return{top4,picks2};
}

function rcBuildPairMatches(usaPlayers,europePlayers,type){
  // 3 matches of pairs
  const matches=[];
  for(let i=0;i<3;i++){
    const usaPair=[usaPlayers[i*2]||usaPlayers[0],usaPlayers[i*2+1]||usaPlayers[1]];
    const eurPair=[europePlayers[i*2]||europePlayers[0],europePlayers[i*2+1]||europePlayers[1]];
    matches.push({type,status:'pending',lineupUSA:usaPair,lineupEurope:eurPair,result:null,holesA:0,holesB:0});
  }
  return matches;
}

function rcBuildSinglesMatches(usaPlayers,europePlayers){
  const matches=[];
  for(let i=0;i<6;i++){
    const usaP=usaPlayers[i]||usaPlayers[usaPlayers.length-1];
    const eurP=europePlayers[i]||europePlayers[europePlayers.length-1];
    matches.push({type:'singles',status:'pending',lineupUSA:[usaP],lineupEurope:[eurP],result:null,holesA:0,holesB:0});
  }
  return matches;
}

function rcTallySession(sessionIdx){
  const rc=STATE.rydercup;
  const session=rc.sessions[sessionIdx];
  let ptsUSA=0,ptsEurope=0;
  session.matches.forEach(m=>{
    if(m.result==='USA')ptsUSA+=1;
    else if(m.result==='Europe')ptsEurope+=1;
    else if(m.result==='H'){ptsUSA+=0.5;ptsEurope+=0.5;}
  });
  session.ptsUSA=ptsUSA;session.ptsEurope=ptsEurope;session.done=true;
  rc.totalUSA=(rc.totalUSA||0)+ptsUSA;
  rc.totalEurope=(rc.totalEurope||0)+ptsEurope;
}

function rcAllSessionsDone(){
  return STATE.rydercup.sessions.every(s=>s.done);
}

function rcCheckComplete(){
  const rc=STATE.rydercup;
  if(!rcAllSessionsDone())return false;
  const winner=rc.totalUSA>rc.totalEurope?'USA':rc.totalEurope>rc.totalUSA?'Europe':'USA'; // USA retain on tie
  rc.winner=winner;rc.phase='complete';
  const winShare=Math.round(RC_WINNER_PURSE/6),runShare=Math.round(RC_RUNNER_PURSE/6);
  const winPlayers=winner==='USA'?rc.usaPlayers:rc.europePlayers;
  const runPlayers=winner==='USA'?rc.europePlayers:rc.usaPlayers;
  winPlayers.forEach(pid=>{
    if(!STATE.standings[pid])STATE.standings[pid]={points:0,earnings:0,wins:0,events:0,history:[]};
    STATE.standings[pid].earnings+=winShare;
  });
  runPlayers.forEach(pid=>{
    if(!STATE.standings[pid])STATE.standings[pid]={points:0,earnings:0,wins:0,events:0,history:[]};
    STATE.standings[pid].earnings+=runShare;
  });
  const inst=getInstance(rc.defId);if(inst){inst.status='complete';inst.completedAt=Date.now();inst.winnerId=winner;}
  if(STATE.activeTournamentId===rc.defId)STATE.activeTournamentId=null;
  // Archive result
  if(!STATE.rydercupHistory)STATE.rydercupHistory=[];
  STATE.rydercupHistory.push({season:rc.season,winner,usaScore:rc.totalUSA,europeScore:rc.totalEurope,usaPlayers:rc.usaPlayers,europePlayers:rc.europePlayers});
  pushNews({type:'rydercup',icon:'🏆',trnId:rc.defId,trnName:'Ryder Cup',
    headline:`🏆 RYDER CUP S${rc.season}: ${winner} wins ${rc.totalUSA}–${rc.totalEurope}!`,
    body:`${winner==='USA'?'Team USA 🇺🇸':'Team Europe 🇪🇺'} claimed the Ryder Cup in Season ${rc.season} by a score of ${rc.totalUSA} to ${rc.totalEurope}. The winning team shares $100M in prize money among 6 players.${rc.totalUSA===rc.totalEurope?' (USA retain on tie.)':''}`
  });
  saveState();return true;
}

function avgAttrs(attrsList){
  const out={};ATTRS.forEach(a=>{out[a.key]=Math.round(attrsList.reduce((s,at)=>s+(at[a.key]||70),0)/attrsList.length);});return out;
}

// Simulate a single match play match (foursomes/fourball/singles)
// Returns result: 'USA', 'Europe', or 'H' (halved)
function rcSimulateMatch(match,numHoles){
  const holes=[];for(let h=0;h<numHoles;h++){holes.push({hole:h+1,par:4,yards:430});}
  let scoreUSA=0,scoreEurope=0;
  const{lineupUSA,lineupEurope,type}=match;
  for(let h=0;h<numHoles;h++){
    const holesRemaining=numHoles-h;
    if(Math.abs(scoreUSA-scoreEurope)>holesRemaining)break;
    let strokeUSA,strokeEurope;
    if(type==='foursomes'){
      const pA1=getPlayer(lineupUSA[0]),pA2=getPlayer(lineupUSA[1]||lineupUSA[0]);
      const pB1=getPlayer(lineupEurope[0]),pB2=getPlayer(lineupEurope[1]||lineupEurope[0]);
      const attrsA=avgAttrs([effectiveAttrs(pA1),effectiveAttrs(pA2)]);
      const attrsB=avgAttrs([effectiveAttrs(pB1),effectiveAttrs(pB2)]);
      strokeUSA=simulateFullHole(holes[h],attrsA).strokes;
      strokeEurope=simulateFullHole(holes[h],attrsB).strokes;
    } else if(type==='fourball'){
      const scoresA=(lineupUSA.slice(0,2)).map(pid=>{const p=getPlayer(pid);return p?simulateFullHole(holes[h],effectiveAttrs(p)).strokes:99;});
      const scoresB=(lineupEurope.slice(0,2)).map(pid=>{const p=getPlayer(pid);return p?simulateFullHole(holes[h],effectiveAttrs(p)).strokes:99;});
      strokeUSA=Math.min(...scoresA);strokeEurope=Math.min(...scoresB);
    } else {
      const pA=getPlayer(lineupUSA[0]),pB=getPlayer(lineupEurope[0]);
      strokeUSA=pA?simulateFullHole(holes[h],effectiveAttrs(pA)).strokes:5;
      strokeEurope=pB?simulateFullHole(holes[h],effectiveAttrs(pB)).strokes:5;
    }
    if(strokeUSA<strokeEurope)scoreUSA++;else if(strokeEurope<strokeUSA)scoreEurope++;
  }
  if(scoreUSA>scoreEurope)return'USA';if(scoreEurope>scoreUSA)return'Europe';return'H';
}

function renderTournament(){
  const el=document.getElementById('view-tournament');
  const defId=STATE.activeTournamentId||PLAY_UI.defId;
  if(!defId){
    // Check if there's a ryder cup in progress even without activeTournamentId
    if(STATE.rydercup&&(STATE.rydercup.phase==='in_progress'||STATE.rydercup.phase==='complete')&&STATE.activeTournamentId===STATE.rydercup.defId){
      renderRyderCupView(el);return;

/* ===== PLAY PANEL ===== */
function activePlayersForRound(inst,roundIdx){
  return inst.field.filter(pid=>{
    if(inst.cutPlayers&&!inst.cutPlayers.has(pid)&&roundIdx>=inst.cutAppliedAfterRound)return false;
    return inst.rounds[roundIdx].scores[pid].some(v=>v==null);
  });
}
function nextOpenHoleIdx(inst,roundIdx,pid){const arr=inst.rounds[roundIdx].scores[pid];for(let i=0;i<18;i++)if(arr[i]==null)return i;return -1;}

function renderPlayPanel(defId,roundIdx,lb){
  const inst=getInstance(defId);const def=getDef(defId);const panel=document.getElementById('play-panel');
  const pending=activePlayersForRound(inst,roundIdx);
  if(pending.length===0){
    panel.innerHTML=`<div class="card" style="padding:24px;text-align:center;"><h3>Round ${roundIdx+1} complete</h3><p style="font-size:13px;color:var(--ink-500);margin-top:6px;">All players done. Move to the next round.</p><button class="btn amber" id="advance-round-btn" style="margin-top:14px;">Continue to Round ${roundIdx+2}</button></div>`;
    document.getElementById('advance-round-btn')?.addEventListener('click',renderTournament);return;
  }
  if(!pending.includes(PLAY_UI.selectedPlayerId)){PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;}

  // Build bulk simulate controls
  const currentHoleIdx=PLAY_UI.selectedPlayerId?PLAY_UI.holeIdx:null;
  panel.innerHTML=`<div class="card" style="padding:16px;margin-bottom:14px;">
    <div class="eyebrow" style="margin-bottom:8px;">Round ${roundIdx+1} · ${pending.length} players still on course</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
      ${pending.map(pid=>{
        const p=getPlayer(pid);const holeIdx=nextOpenHoleIdx(inst,roundIdx,pid);const active=pid===PLAY_UI.selectedPlayerId;
        return`<button class="player-chip" data-select-player="${pid}" style="display:flex;align-items:center;gap:6px;padding:6px 10px 6px 6px;border-radius:20px;border:1px solid ${active?'var(--turf-700)':'var(--line)'};background:${active?'var(--turf-700)':'#fff'};color:${active?'#fff':'var(--ink-900)'};font-size:12px;transition:background .15s;">
          <span style="width:20px;height:20px;border-radius:50%;background:${avatarColor(p.name)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;">${initialsOf(p.name)}</span>
          ${escapeHTML(p.name)} <span style="opacity:0.7;">· H${holeIdx+1}</span>
        </button>`;}).join('')}
    </div>
    <div style="border-top:1px solid var(--line);padding-top:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
      <span style="font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;color:var(--ink-500);">Simulate:</span>
      <button class="btn ghost btn-sm" id="sim-all-hole-btn" title="Simulate current hole for all pending players">All players · next hole</button>
      <button class="btn ghost btn-sm" id="sim-selected-hole-btn" ${!PLAY_UI.selectedPlayerId?'disabled':''} title="Simulate next hole for selected player only">Selected player · hole</button>
      <button class="btn ghost btn-sm" id="sim-all-round-btn" style="border-color:var(--board-amber);color:#7a5a0a;">All players · full round</button>
      <button class="btn ghost btn-sm" id="sim-selected-btn" ${!PLAY_UI.selectedPlayerId?'disabled':''} style="border-color:var(--board-amber);color:#7a5a0a;">Selected · full round</button>
    </div>
  </div>
  <div id="hole-control"></div>`;

  panel.querySelectorAll('[data-select-player]').forEach(btn=>{
    btn.addEventListener('click',()=>selectPlayerForPlay(defId,roundIdx,btn.dataset.selectPlayer));
  });

  // Bulk sim: next hole for all pending players
  document.getElementById('sim-all-hole-btn').addEventListener('click',()=>{
    const pendingNow=activePlayersForRound(inst,roundIdx);
    // find the next unplayed hole — use the minimum open hole across all pending players
    const holes=pendingNow.map(pid=>nextOpenHoleIdx(inst,roundIdx,pid)).filter(h=>h>=0);
    const minHole=Math.min(...holes);
    const toSim=pendingNow.filter(pid=>nextOpenHoleIdx(inst,roundIdx,pid)===minHole);
    simulateHoleForPlayers(defId,roundIdx,minHole,toSim);
    showToast(`Simulated hole ${minHole+1} for ${toSim.length} players.`);
    if(PLAY_UI.selectedPlayerId&&inst.rounds[roundIdx].scores[PLAY_UI.selectedPlayerId][PLAY_UI.holeIdx]!=null){
      const next=nextOpenHoleIdx(inst,roundIdx,PLAY_UI.selectedPlayerId);
      if(next===-1){PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;}
      else{PLAY_UI.holeIdx=next;PLAY_UI.holeState=newHoleState(def.holes[next]);}
    }
    renderTournament();
  });

  // Sim: next hole for selected player only
  document.getElementById('sim-selected-hole-btn').addEventListener('click',()=>{
    if(!PLAY_UI.selectedPlayerId)return;
    const pid=PLAY_UI.selectedPlayerId;const hIdx=nextOpenHoleIdx(inst,roundIdx,pid);
    if(hIdx===-1)return;
    simulateHoleForPlayers(defId,roundIdx,hIdx,[pid]);
    const next=nextOpenHoleIdx(inst,roundIdx,pid);
    if(next===-1){PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;}
    else{PLAY_UI.holeIdx=next;PLAY_UI.holeState=newHoleState(def.holes[next]);}
    showToast(`Simulated hole ${hIdx+1} for ${getPlayer(pid).name}.`);
    renderTournament();
  });

  // Sim: full round for all
  document.getElementById('sim-all-round-btn').addEventListener('click',()=>{

    simulateRoundForPlayers(defId,roundIdx,pendingNow);

    showToast(`Simulated full round ${roundIdx+1} for all ${pendingNow.length} players.`);

      <div>

      </div>
      <div style="text-align:right;">
        <div class="eyebrow">Thru ${holeIdx}</div>
        <div class="num" style="font-size:20px;color:${toParSoFar<0?'var(--flag-red)':'var(--ink-900)'};">${holeIdx===0?'—':(toParSoFar===0?'E':toParSoFar>0?'+'+toParSoFar:toParSoFar)}</div>
      </div>
    </div>
    <div style="margin-top:16px;display:flex;align-items:center;gap:18px;background:var(--sand-200);border-radius:4px;padding:14px 18px;">
      <div style="flex:1;"><div class="eyebrow" style="margin-bottom:3px;">Lie</div><div style="font-family:'Oswald',sans-serif;font-size:17px;color:${lieColor(hs.lie)};">${lieLabel(hs.lie)}</div></div>
      <div style="flex:1;text-align:center;"><div class="eyebrow" style="margin-bottom:3px;">${hs.lie==='green'?'To Hole':'To Pin'}</div><div class="num" style="font-size:22px;">${hs.lie==='green'?(hs.puttDistanceFt+' ft'):(Math.round(hs.remaining)+' y')}</div></div>
      <div style="flex:1;text-align:right;"><div class="eyebrow" style="margin-bottom:3px;">Strokes</div><div class="num" style="font-size:22px;">${hs.strokes}</div></div>
    </div>
    <div id="shot-log" style="margin-top:14px;max-height:130px;overflow-y:auto;display:flex;flex-direction:column-reverse;gap:6px;" class="scrollbar-thin">
      ${hs.log.slice().reverse().map((l,i)=>`<div style="font-size:13px;padding:7px 10px;background:${i===0?'rgba(63,122,77,0.1)':'transparent'};border-radius:3px;border-left:3px solid ${i===0?'var(--turf-600)':'var(--line)'};">${escapeHTML(l)}</div>`).join('')}
    </div>
    <div style="margin-top:16px;display:flex;gap:10px;">
      <button class="btn amber" id="hit-shot-btn" style="flex:1;padding:14px;font-size:15px;" ${hs.holedOut?'disabled':''}>

      </button>
    </div>
    ${hs.holedOut?`<button class="btn" id="confirm-hole-btn" style="width:100%;margin-top:10px;padding:13px;">Confirm ${hs.strokes} · ${holeResultWord(hs.strokes,holeDef.par)} — Next</button>`:''}
  </div>
  <div class="card" style="margin-top:14px;padding:14px;">
    <div class="eyebrow" style="margin-bottom:8px;">${escapeHTML(player.name)}'s Scorecard · Round ${roundIdx+1}</div>

  </div>`;

function holeResultWord(strokes,par){const d=strokes-par;if(d<=-3)return'Albatross+';if(d===-2)return'Eagle';if(d===-1)return'Birdie';if(d===0)return'Par';if(d===1)return'Bogey';if(d===2)return'Double Bogey';return`+${d}`;}
function advanceAfterHole(defId,roundIdx,pid){
  const inst=getInstance(defId);const next=nextOpenHoleIdx(inst,roundIdx,pid);
  if(next===-1){PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;showToast(`${getPlayer(pid).name} signs for their round.`);}
  else{PLAY_UI.holeIdx=next;PLAY_UI.holeState=newHoleState(getDef(defId).holes[next]);}
  renderTournament();
}

/* ===== SUDDEN DEATH PLAYOFF HOLE VIEW ===== */
let PH_PLAY={pid:null,holeState:null}; // which tied player is currently hitting

function renderPlayoffHoleView(el,defId){
  const inst=getInstance(defId);const def=getDef(defId);
  const ph=inst.playoffHole;
  const tiedPlayers=ph.remainingPids.map(pid=>getPlayer(pid)).filter(Boolean);
  const holeNum=ph.currentHole;
  const holeDef={hole:`P${holeNum}`,par:4,yards:430};

  // Find who still needs to play this hole
  const needToPlay=ph.remainingPids.filter(pid=>(ph.scores[pid]||[]).length<holeNum);
  const donePlaying=ph.remainingPids.filter(pid=>(ph.scores[pid]||[]).length>=holeNum);

  el.innerHTML=`<div class="section-head">
    <div><span class="eyebrow" style="color:var(--flag-red);">⚡ SUDDEN DEATH PLAYOFF</span><h2>${def.name}</h2></div>
    <div class="eyebrow">Par 4 · 430 yards · Playoff Hole ${holeNum}</div>
  </div>
  <div class="play-grid-2col" style="display:grid;grid-template-columns:1.15fr 1fr;gap:20px;align-items:flex-start;">
    <div id="ph-play-panel">
      ${PH_PLAY.pid&&PH_PLAY.holeState?'':'<div class="empty-state" style="padding:24px;"><p>Select a player below to play their playoff hole.</p></div>'}
    </div>
    <div>
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="background:var(--flag-red);color:#fff;padding:10px 16px;font-family:\'Oswald\',sans-serif;font-size:13px;letter-spacing:0.05em;">PLAYOFF STANDINGS · HOLE ${holeNum}</div>
        <div style="padding:12px;">
          ${tiedPlayers.map(p=>{
            const hScores=ph.scores[p.id]||[];
            const played=hScores.length>=holeNum;
            const thisScore=played?hScores[holeNum-1]:null;
            const isActive=PH_PLAY.pid===p.id;
            return`<div style="display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--line);${isActive?'background:rgba(217,161,59,0.12);':''}">
              <span style="width:28px;height:28px;border-radius:50%;background:${avatarColor(p.name)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:\'Barlow Condensed\',sans-serif;">${initialsOf(p.name)}</span>
              <span style="flex:1;font-size:13px;">${escapeHTML(p.name)}</span>
              ${played?`<span class="num" style="font-size:16px;color:${thisScore<4?'var(--turf-700)':thisScore>4?'var(--flag-red)':'var(--ink-900)'};">${thisScore}</span><span style="font-size:10px;font-family:\'Barlow Condensed\',sans-serif;color:var(--ink-500);margin-left:4px;">${holeResultWord(thisScore,4)}</span>`
              :`<button class="btn amber btn-sm" data-ph-select="${p.id}">Play Hole</button>`}
              <button class="btn ghost btn-sm" data-ph-simulate="${p.id}" style="border-color:var(--board-amber);color:#7a5a0a;"${played?'disabled':''}>Simulate</button>
            </div>`;
          }).join('')}
          ${needToPlay.length===0?`<div style="padding:12px;"><button class="btn amber" id="ph-resolve-btn" style="width:100%;">Resolve Playoff — All Played</button></div>`:''}
        </div>
      </div>
    </div>
  </div>`;

  if(PH_PLAY.pid&&PH_PLAY.holeState){
    renderPHHoleControl(defId,holeNum,PH_PLAY.pid,holeDef);
  }

  el.querySelectorAll('[data-ph-select]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      PH_PLAY.pid=btn.dataset.phSelect;
      PH_PLAY.holeState=newHoleState(holeDef);
      renderPlayoffHoleView(el,defId);
    });
  });

  el.querySelectorAll('[data-ph-simulate]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pid=btn.dataset.phSimulate;
      const p=getPlayer(pid);if(!p)return;
      const hs=simulateFullHole(holeDef,effectiveAttrs(p));
      if(!inst.playoffHole.scores[pid])inst.playoffHole.scores[pid]=[];
      while(inst.playoffHole.scores[pid].length<holeNum-1)inst.playoffHole.scores[pid].push(4);
      inst.playoffHole.scores[pid][holeNum-1]=hs.strokes;
      if(PH_PLAY.pid===pid){PH_PLAY.pid=null;PH_PLAY.holeState=null;}
      saveState();showToast(`${p.name} scores ${hs.strokes} on the playoff hole.`);
      renderPlayoffHoleView(el,defId);
    });
  });

  document.getElementById('ph-resolve-btn')?.addEventListener('click',()=>{
    const resolved=resolvePlayoffHoleIfComplete(defId);
    PH_PLAY.pid=null;PH_PLAY.holeState=null;
    if(resolved){
      const inst2=getInstance(defId);const winner=getPlayer(inst2.winnerId);
      showToast(`${winner?.name||'A player'} wins in sudden death!`);
      switchView('tournament');
    } else {
      showToast(`Still tied! Onto playoff hole ${inst.playoffHole.currentHole}.`);
      renderPlayoffHoleView(el,defId);
    }
  });
}

          </div>`:''}

  </div>
  ${rcAllSessionsDone()&&!rc.winner?`<div style="margin-top:16px;text-align:center;"><button class="btn amber" id="rc-finalize-btn" style="padding:12px 28px;font-size:15px;">Finalize Ryder Cup Result</button></div>`:''}`;

  el.querySelectorAll('[data-rc-sim]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const sIdx=+btn.dataset.rcSim,mIdx=+btn.dataset.rcMi;
      const m=rc.sessions[sIdx].matches[mIdx];

      saveState();renderRyderCupView(el);
