function isSeasonComplete(){
  if(STATE.schedule.length===0)return false;
  return STATE.schedule.every(s=>{
    const def=getDef(s.defId);
    // The Ryder Cup only happens in odd seasons — in an "off" season it can never be
    // started, so it shouldn't block the season from being considered complete.
    if(def&&def.rydercup&&!isRyderCupSeason(STATE.seasonNumber))return true;
    return s.status==='complete';
  });
}

// Folds this season's standings into each player's permanent career record
// before the season standings get wiped. Rather than keeping every single
// event finish forever (which is what was bloating the database), we only
// keep what's actually needed permanently:
//   - running totals (points/earnings/wins/events/seasons)
//   - winsList: a compact record of every tour/major win (name, season, score, prize)
//   - majorBests: best-ever finish at each major
//   - topTens: lifetime count of top-10 finishes
// Everything else (each event's exact position/score for non-notable results) is
// dropped once the season ends — it's still visible in-app for the CURRENT
// season via st.history right up until "Start Next Season" is clicked.
function foldStandingsIntoCareer(){
  const majorIds=new Set(STATE.tournamentDefs.filter(d=>d.major).map(d=>d.id));
  STATE.players.forEach(p=>{
    const st=STATE.standings[p.id];if(!st)return;
    if(!p.career)p.career={points:0,earnings:0,wins:0,events:0,seasons:0,winsList:[],majorBests:{},topTens:0};
    if(!p.career.winsList)p.career.winsList=[];
    if(!p.career.majorBests)p.career.majorBests={};
    if(typeof p.career.topTens!=='number')p.career.topTens=0;
    p.career.points+=st.points||0;p.career.earnings+=st.earnings||0;
    p.career.wins+=st.wins||0;p.career.events+=st.events||0;p.career.seasons+=1;
    (st.history||[]).forEach(h=>{
      if(h.pos===1){
        p.career.winsList.push({trnId:h.trnId,trnName:h.trnName,season:h.season,toPar:h.toPar,strokes:h.strokes,prize:h.prize,major:majorIds.has(h.trnId)});
      }
      if(typeof h.pos==='number'&&h.pos<=10)p.career.topTens+=1;
      if(majorIds.has(h.trnId)&&h.pos!=='MC'){
        const cur=p.career.majorBests[h.trnId];
        if(!cur||h.pos<cur.pos)p.career.majorBests[h.trnId]={pos:h.pos,toPar:h.toPar,season:h.season,trnName:h.trnName};
      }
    });
    // this season's points become the baseline "last season" comparison for
    // next year's Most Improved award (see computeSeasonAwards)
    p.career.lastSeasonPoints=st.points||0;
  });
}

// Destructive full reset: wipes roster, career totals, everything. Used when
// the person explicitly wants to start over from scratch.
function restartSeason(){
  STATE.players=[];STATE.seasonNumber=1;STATE.tournamentDefs=buildTournamentDefs(1);STATE.schedule=STATE.tournamentDefs.map(def=>makeTournamentInstance(def));
  STATE.standings={};STATE.activeTournamentId=null;STATE.history=[];STATE.news=[];STATE.awards=[];STATE.rydercup=null;STATE.worldRanking={};STATE.rydercupHistory=[];
  saveState();
}

// Salary cap per player, recalculated at season end based on rating + performance
// Base cap: overall * $50K. Top-10 finishes add $200K each. Wins add $500K.
// Minimum $1M, maximum $10M.
function updateSalaryCaps(){
  STATE.players.forEach(p=>{
    const st=STATE.standings[p.id]||{points:0,earnings:0,wins:0,events:0,history:[]};
    const top10=((st.history||[]).filter(h=>typeof h.pos==='number'&&h.pos<=10)).length;
    let cap=p.overall*50000; // base: OVR * $50K
    cap+=top10*200000;       // +$200K per top-10 finish this season
    cap+=(st.wins||0)*500000;// +$500K per win
    cap=Math.max(1000000,Math.min(10000000,Math.round(cap/100000)*100000));
    p.salaryCap=cap;
  });
}

/* ===== WORLD RANKING ENGINE =====
   Separate from PGA Tour season points. Never resets.
   Points awarded per finish, weighted by event type.
   Rolling: each result decays 15% per season it ages.
   Ranking is recomputed live from the history on demand.
   ================================================== */

// World ranking points per finish position (independent scale, more granular than tour pts)
const WR_BASE=[1000,600,400,300,250,210,180,155,135,120,108,96,86,77,69,62,56,51,46,42,38,35,32,29,27,25,23,21,19,17,15,14,13,12,11,10,9,8,7,6];
const WR_MAJOR_MULT=2.0;
const WR_PLAYOFF_MULT=1.5;
const WR_DECAY=0.85; // per season elapsed

function wrPointsForFinish(pos,isMajor,isPlayoff){
  const idx=pos-1;
  let base=idx<WR_BASE.length?WR_BASE[idx]:Math.max(1,6-(idx-WR_BASE.length));
  if(isMajor)base=Math.round(base*WR_MAJOR_MULT);
  else if(isPlayoff)base=Math.round(base*WR_PLAYOFF_MULT);
  return base;
}

// Called after every tournament completes (including playoff resolve).
// Adds the result to each player's WR history and recomputes their live WR points.
function updateWorldRanking(defId,lb){
  if(!STATE.worldRanking)STATE.worldRanking={};
  const def=getDef(defId);
  if(def.rydercup)return; // Ryder Cup doesn't count for world ranking
  const finishers=lb.filter(r=>!r.cut&&r.position);
  const currentSeason=STATE.seasonNumber;

  finishers.forEach(row=>{
    if(!row.position)return;
    const pts=wrPointsForFinish(row.position,!!def.major,!!def.playoff);
    if(!STATE.worldRanking[row.playerId])STATE.worldRanking[row.playerId]={pts:0,history:[]};
    // Avoid double-counting: remove any previous entry for this trnId+season
    STATE.worldRanking[row.playerId].history=STATE.worldRanking[row.playerId].history.filter(h=>!(h.trnId===def.id&&h.season===currentSeason));
    STATE.worldRanking[row.playerId].history.push({trnId:def.id,trnName:def.name,pos:row.position,pts,season:currentSeason,major:!!def.major,playoff:!!def.playoff});
  });

  // Give a small credit for MC (shows activity on tour)
  lb.filter(r=>r.cut).forEach(row=>{
    if(!STATE.worldRanking[row.playerId])STATE.worldRanking[row.playerId]={pts:0,history:[]};
    STATE.worldRanking[row.playerId].history=STATE.worldRanking[row.playerId].history.filter(h=>!(h.trnId===def.id&&h.season===currentSeason));
    STATE.worldRanking[row.playerId].history.push({trnId:def.id,trnName:def.name,pos:'MC',pts:0,season:currentSeason,major:!!def.major,playoff:!!def.playoff});
  });

  recomputeAllWRPoints();
}

// Recompute live WR points for all players from their history, applying decay
function recomputeAllWRPoints(){
  const curSeason=STATE.seasonNumber;
  STATE.players.forEach(p=>{
    const wr=STATE.worldRanking[p.id];if(!wr)return;
    let total=0;
    wr.history.forEach(h=>{
      const age=curSeason-h.season; // 0 = current season, 1 = last season, etc.
      const decay=Math.pow(WR_DECAY,age);
      total+=Math.round((h.pts||0)*decay);
    });
    wr.pts=total;
  });
}

// Returns sorted array [{playerId,player,pts,rank,trend}] — trend = rank change vs last week
function getWorldRankings(){
  recomputeAllWRPoints();
  const rows=STATE.players.map(p=>{
    const wr=STATE.worldRanking[p.id]||{pts:0,history:[]};
    return{playerId:p.id,player:p,pts:wr.pts,history:wr.history};
  }).sort((a,b)=>b.pts-a.pts);
  rows.forEach((r,i)=>r.rank=i+1);
  return rows;
}

// Returns a player's current world rank (1-indexed), or null
function playerWorldRank(pid){
  const rows=getWorldRankings();
  const r=rows.find(r=>r.playerId===pid);
  return r?r.rank:null;
}

/* ===== NEWS & STORYLINE ENGINE ===== */
function newsId(){return'news_'+Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function pushNews(item){
  if(!STATE.news)STATE.news=[];
  STATE.news.unshift({id:newsId(),season:STATE.seasonNumber,ts:Date.now(),major:false,...item});
  // Cap feed at 200 items
  if(STATE.news.length>200)STATE.news.length=200;
}

// Called after finishTournamentIfDone — generates all tournament storylines + clutch moments
function generateTournamentNews(defId,lb,inst){
  const def=getDef(defId);
  const finishers=lb.filter(r=>!r.cut&&r.holesPlayed>0);
  if(!finishers.length)return;

  const winner=getPlayer(inst.winnerId);
  if(!winner)return;

  const winnerSt=STATE.standings[inst.winnerId]||{};
  const winnerRow=finishers[0];
  const toParTxt=v=>v===0?'even par':v>0?`+${v}`:String(v);
  const prize1=prizeForPosition(1,def.purseM,finishers.length);

  // --- CLUTCH MOMENTS (individual hole feats logged as sub-items) ---
  const clutchItems=[];

  // Eagles
  finishers.forEach(row=>{
    const p=getPlayer(row.playerId);if(!p)return;
    let eagles=0;
    inst.rounds.forEach(rd=>{
      const sc=rd.scores[row.playerId]||[];
      sc.forEach((s,hi)=>{if(s!=null&&s-def.holes[hi].par<=-2)eagles++;});
    });
    if(eagles>0)clutchItems.push({icon:'🦅',text:`${p.name} made ${eagles===1?'an eagle':''+eagles+' eagles'} at ${def.name}`});
  });

  // Chip-ins (approximate: score of 1 on a par 3, or 2 on a par 4 from off-green — we detect score 2 under par)
  finishers.forEach(row=>{
    const p=getPlayer(row.playerId);if(!p)return;
    let chipin=0;
    inst.rounds.forEach(rd=>{
      const sc=rd.scores[row.playerId]||[];
      sc.forEach((s,hi)=>{if(s!=null&&s-def.holes[hi].par<=-2&&def.holes[hi].par===3)chipin++;});
    });
    if(chipin>0)clutchItems.push({icon:'🎯',text:`${p.name} chipped in ${chipin===1?'once':''+chipin+' times'} during ${def.name}`});
  });

  // Comeback: winner was outside top-5 after round 1 in a 4-round event
  if(def.rounds===4&&inst.rounds[0]){
    const r1lb=finishers.slice().sort((a,b)=>{
      const sA=Object.values(inst.rounds[0].scores[a.playerId]||{}).reduce((s,v)=>s+(v||0),0);
      const sB=Object.values(inst.rounds[0].scores[b.playerId]||{}).reduce((s,v)=>s+(v||0),0);
      return sA-sB;
    });
    const winnerR1pos=r1lb.findIndex(r=>r.playerId===inst.winnerId);
    if(winnerR1pos>=5)clutchItems.push({icon:'⚡',text:`${winner.name} came from outside the top-${winnerR1pos+1} after Round 1 to win ${def.name}`});
  }

  // Sudden death
  if(inst.deathHoleTied){
    clutchItems.push({icon:'💀',text:`${winner.name} won ${def.name} in a sudden-death playoff hole`});
  }

  // Wire-to-wire (led after every round — simplified: same winner as round 1 top)
  if(def.rounds>=2&&inst.rounds[0]){
    const r1scores={};finishers.forEach(row=>{r1scores[row.playerId]=Object.values(inst.rounds[0].scores[row.playerId]||{}).reduce((s,v)=>s+(v||0),0);});
    const r1leader=Object.entries(r1scores).sort((a,b)=>a[1]-b[1])[0];
    if(r1leader&&r1leader[0]===inst.winnerId)clutchItems.push({icon:'🔝',text:`${winner.name} led wire-to-wire at ${def.name}`});
  }

  // Record low score (best toPar we've seen in history)
  const allPrevBest=STATE.news.filter(n=>n.type==='record').map(n=>n._toPar||999);
  const prevBest=allPrevBest.length?Math.min(...allPrevBest):999;
  if(winnerRow.toPar<prevBest){
    clutchItems.push({icon:'📉',text:`${winner.name} set a new tour scoring record at ${toParTxt(winnerRow.toPar)} (${winnerRow.strokes} strokes) at ${def.name}`});
    // Tag on the news item below
  }

  // --- MAIN HEADLINE STORY ---
  const winnerCareer=getPlayer(inst.winnerId)?.career||{wins:0};
  const totalWins=(winnerCareer.wins||0)+(winnerSt.wins||0);
  const prevWins=totalWins-1; // before this win was counted
  let headline,body,type='result',icon='📰';

  if(def.major){
    icon='🏆';type='major';
    if(prevWins===0){
      headline=`${winner.name} claims first Major title at ${def.name}`;
      body=`In a career-defining performance, ${winner.name} finished at ${toParTxt(winnerRow.toPar)} to lift the trophy at ${def.course}. The victory also marks their first tour win.`;
    } else {
      const majCount=(STATE.majorChampions[def.id]||[]).filter(c=>c.playerId===inst.winnerId).length;
      headline=`${winner.name} wins ${def.name}${majCount>1?` for the ${['second','third','fourth','fifth'][majCount-2]||majCount+'th'} time`:''}`;
      body=`${winner.name} shot ${toParTxt(winnerRow.toPar)} at ${def.course} to collect the ${formatMoney(prize1)} winner's cheque and add another Major to an impressive CV.`;
    }
  } else if(def.playoff){
    icon='⛳';type='playoff';
    if(def.tourChampionship){
      headline=`${winner.name} wins the Tour Championship — 2026 FedExCup Champion`;
      body=`${winner.name} finished at ${toParTxt(winnerRow.toPar)} at East Lake to win the Tour Championship outright and be crowned FedExCup Champion.`;
    }else{
      headline=`${winner.name} takes ${def.name} FedExCup event`;
      body=`${winner.name} finished at ${toParTxt(winnerRow.toPar)} at ${def.course} to top the field, bank ${formatMoney(prize1)}, and add major-tier points to the FedExCup standings.`;
    }
  } else if(def.teamEvent){
    icon='🤝';type='team';
    headline=`Team event thriller: ${winner.name} leads squad to ${def.name} victory`;
    body=`${winner.name} was the star individual at ${def.course}, helping their fantasy team clinch the team event honours at ${def.name}.`;
  } else if(totalWins===1&&(winnerCareer.wins||0)===0){
    icon='🌟';type='firstwin';
    const careerEventsBeforeWin=(winnerCareer.events||0)+(winnerSt.events||1)-1;
    headline=`FIRST WIN: ${winner.name} breaks through at ${def.name}`;
    body=`After ${careerEventsBeforeWin} events without a victory, ${winner.name} finally got the job done at ${def.course}, posting ${toParTxt(winnerRow.toPar)} to claim the title and ${formatMoney(prize1)}.`;
  } else {
    const careerWinner=STATE.players.find(p=>p.id===inst.winnerId);
    const allWinnerHistory=[...((careerWinner?.career?.history)||[]),...(winnerSt.history||[])];
    const streakCheck=allWinnerHistory;
    const recentResults=streakCheck.slice(-4);
    const recentWins=recentResults.filter(h=>h.pos===1).length;
    if(recentWins>=2){
      icon='🔥';type='hotstreak';
      headline=`${winner.name} on fire — ${recentWins} wins in last ${recentResults.length} events`;
      body=`${winner.name} is the form player on tour right now. Another dominant display at ${def.name} (${toParTxt(winnerRow.toPar)}) shows no signs of slowing down.`;
    } else {
      headline=`${winner.name} wins ${def.name} with ${toParTxt(winnerRow.toPar)}`;
      body=`${winner.name} held firm at ${def.course} to take the ${formatMoney(prize1)} top prize, their ${totalWins===2?'second':totalWins===3?'third':totalWins+'th'} tour victory.`;
    }
  }

  // Runner-up
  const runner=finishers[1];const runnerP=runner?getPlayer(runner.playerId):null;
  if(runnerP&&!inst.deathHoleTied)body+=` ${runnerP.name} was runner-up at ${toParTxt(runner.toPar)}.`;

  pushNews({type,icon,headline,body,trnId:defId,trnName:def.name,_toPar:winnerRow.toPar,
    winnerId:inst.winnerId,clutchItems:clutchItems.slice(0,4),major:!!def.major});

  // Winless drought story (anyone who has played 8+ events with no win and finished top 5 here)
  finishers.filter(r=>r.position>=2&&r.position<=5).forEach(row=>{
    const p=getPlayer(row.playerId);if(!p)return;
    const pSt=STATE.standings[row.playerId]||{};
    const careerTotalWins=(pSt.wins||0)+(p.career?.wins||0);
    const careerTotalEvents=(pSt.events||0)+(p.career?.events||0);
    if(careerTotalEvents>=8&&careerTotalWins===0){
      pushNews({type:'drought',icon:'😤',trnId:defId,trnName:def.name,
        headline:`${p.name} agonisingly close — still searching for first win`,
        body:`A T${row.position} finish at ${def.name} is another near-miss for ${p.name}, who is still chasing that elusive first tour victory after ${careerTotalEvents} career starts.`});
    }
  });
}

// Called at season end — computes Player of Year, FedEx winner, Most Improved
function computeSeasonAwards(){
  if(STATE.players.length<2)return;
  const season=STATE.seasonNumber;

  // Player of the Year = leader in tour standings
  const standingsSorted=STATE.players
    .map(p=>({p,pts:(STATE.standings[p.id]||{}).points||0}))
    .sort((a,b)=>b.pts-a.pts);
  const poy=standingsSorted[0]?.pts>0?standingsSorted[0].p:null;

  // FedEx Cup winner = whoever actually won the Tour Championship this season
  // (real format: the TC winner IS the Champion outright, not a separate points race)
  const fedexChampEntry=(STATE.fedexCupChampions||[]).find(f=>f.season===season);
  const fedexWinner=fedexChampEntry?getPlayer(fedexChampEntry.playerId):null;

  // Most Improved: compare this season's points to last season's points, which we
  // keep as a tiny per-player field (p.career.lastSeasonPoints) instead of keeping
  // the entire previous season's standings blob around just for this comparison.
  const hasPriorSeason=STATE.players.some(p=>p.career&&p.career.seasons>0);
  let mostImproved=null,bestDelta=-Infinity;
  if(hasPriorSeason){
    STATE.players.forEach(p=>{
      const stp=STATE.standings[p.id]||{};
      if((stp.events||0)<1)return; // only consider players who actually played this season
      if(!p.career||!p.career.seasons)return; // needs a prior season to compare against
      const curPts=stp.points||0;
      const prevPts=p.career.lastSeasonPoints||0;
      const delta=curPts-prevPts;
      if(delta>bestDelta){bestDelta=delta;mostImproved=p;}
    });
    if(bestDelta<=0)mostImproved=null; // no one genuinely improved
  }

  // World Ranking #1 at season end
  const wrRows=getWorldRankings();
  const wrNo1=wrRows.length&&wrRows[0].pts>0?wrRows[0].player:null;

  const award={season,playerOfYear:poy?.id||null,fedexWinner:fedexWinner?.id||null,mostImproved:mostImproved?.id||null,mostImprovedDelta:bestDelta>0?bestDelta:0,worldNo1:wrNo1?.id||null,
    // stash the point totals directly on the award so the honours board never needs
    // to dig back through a season-history archive to display them.
    poyPoints:poy?(STATE.standings[poy.id]||{}).points||0:0,
    fedexToPar:fedexChampEntry?fedexChampEntry.toPar:null,
    wrPoints:wrNo1?(STATE.worldRanking[wrNo1.id]||{}).pts||0:0};
  STATE.awards.push(award);

  // Generate a news story for the awards
  const lines=[];
  if(poy)lines.push(`🏅 **Player of the Year:** ${poy.name} (${award.poyPoints} pts)`);
  if(fedexWinner)lines.push(`⛳ **FedEx Cup Winner:** ${fedexWinner.name}${award.fedexToPar!=null?` (Tour Championship ${award.fedexToPar===0?'E':award.fedexToPar>0?'+'+award.fedexToPar:award.fedexToPar})`:''}`);
  if(wrNo1)lines.push(`🌍 **World No. 1:** ${wrNo1.name} (${award.wrPoints} WR pts)`);
  if(mostImproved)lines.push(`📈 **Most Improved:** ${mostImproved.name} (+${bestDelta} pts vs last season)`);
  else if(!hasPriorSeason)lines.push(`📈 **Most Improved:** Not awarded in Season 1`);

  if(lines.length){
    pushNews({type:'awards',icon:'🎖️',trnId:null,trnName:null,
      headline:`Season ${season} Awards — End of Year Honours`,
      body:lines.join(' · '),
      awardData:award});
  }
}

// Season rollover: roster and permanent career totals (points/earnings/wins/majors/
// best finishes) carry forward forever. But the heavy, ever-growing stuff — every
// player's blow-by-blow finish at every event this season — is NOT kept once the
// season is over. It stays visible in each player's profile for the whole current
// season (via STATE.standings[id].history), and the moment you click "Start Next
// Season" it gets folded into the compact career summary (foldStandingsIntoCareer)
// and then discarded. Major wins live forever in STATE.majorChampions; the
// leaderboard-topper snapshot below (top5) is tiny and safe to keep indefinitely.
function startNextSeason(){
  computeSeasonAwards(); // compute BEFORE folding, so "last season" comparisons are correct
  foldStandingsIntoCareer(); // permanent summaries saved, then the season's detailed data is left behind
  updateSalaryCaps();
  const top5=STATE.players
    .map(p=>({playerId:p.id,points:(STATE.standings[p.id]||{}).points||0}))
    .sort((a,b)=>b.points-a.points).slice(0,5);
  STATE.history.push({seasonNumber:STATE.seasonNumber,archivedAt:Date.now(),top5});
  STATE.seasonNumber+=1;STATE.tournamentDefs=buildTournamentDefs(STATE.seasonNumber);STATE.schedule=STATE.tournamentDefs.map(def=>makeTournamentInstance(def));
  STATE.standings={};STATE.activeTournamentId=null;
  STATE.rydercup=null; // reset ryder cup state each season (new one is auto-triggered every 2 seasons)
  saveState();
}

/* ===== RYDER CUP ENGINE (USA vs EUROPE — every 2 seasons) =====
   Format: 18 total matches across 4 sessions, first to 9.5 points wins.
     Day 1 — Foursomes, 9 holes  (3 matches)
     Day 2 — Singles,   9 holes  (6 matches)
     Day 3 — Foursomes, 18 holes (3 matches)
     Day 4 — Singles,   18 holes (6 matches)
   If the match finishes 9–9, the captains' top pick from each side plays a
   sudden-death decider hole (440y showcase hole) until someone wins a hole.
   ================================================================= */
const RC_WINNER_PURSE=100000000; // $100M
const RC_RUNNER_PURSE=25000000;  // $25M
const RC_TOTAL_MATCHES=18;
const RC_WIN_THRESHOLD=9.5;

// Returns true if this season should have a Ryder Cup (seasons 1,3,5,7...)
function isRyderCupSeason(seasonNum){ return seasonNum%2===1; }

// Venues alternate US → UK → US → Scotland → repeat, one per odd season.
const RC_VENUES=[
  {host:'USA',name:'Whistling Straits',location:'Kohler, Wisconsin, USA',flag:'🇺🇸'},
  {host:'Europe',name:'The Belfry',location:'Sutton Coldfield, England, UK',flag:'🇬🇧'},
  {host:'USA',name:'Bethpage Black',location:'Farmingdale, New York, USA',flag:'🇺🇸'},
  {host:'Europe',name:'Gleneagles',location:'Auchterarder, Scotland',flag:'🏴󠁧󠁢󠁳󠁣󠁴󠁿'},
];
// Season 1 is the 1st Ryder Cup, season 3 the 2nd, season 5 the 3rd, etc.
function rcVenueForSeason(seasonNum){
  const cupNumber=Math.floor((seasonNum-1)/2); // 0-indexed: season1->0, season3->1, season5->2...
  return RC_VENUES[cupNumber%RC_VENUES.length];
}

// Identify which players are USA and which are Europe
const USA_COUNTRIES=['US','CA','MX'];
// Ryder Cup Team Europe eligibility = golfers from European nations (incl. Great Britain
// & Ireland). NIR (Northern Ireland — e.g. Rory McIlroy) was previously missing, which
// wrongly locked him (and any other NIR-flagged player) out of Team Europe. ZA (South
// Africa) and NZ (New Zealand) were previously included but no real-world Ryder Cup
// Team Europe player has ever come from those countries — removed.
const EUROPE_COUNTRIES=['ENG','SCO','IE','NIR','WAL','ES','SE','DE','FR','IT','NO','BE','CH','AT','PT','DK','FI','NL','PL','CZ'];

function playerTeam(player){
  if(USA_COUNTRIES.includes(player.country))return'USA';
  if(EUROPE_COUNTRIES.includes(player.country))return'Europe';
  return null; // e.g. KR, JP, AU, AR — not eligible
}

// Select 6 players per side:
//   - Top 4 by world ranking from that side
//   - + 2 by best PGA Tour finish (points) that season from remaining players
function selectRyderCupTeam(side){
  const eligible=STATE.players.filter(p=>playerTeam(p)===side);
  if(eligible.length===0)return[];
  const wrRows=getWorldRankings();
  // Sort by WR points
  const byWR=eligible.slice().sort((a,b)=>{
    const wa=wrRows.find(r=>r.playerId===a.id)?.pts||0;
    const wb=wrRows.find(r=>r.playerId===b.id)?.pts||0;
    return wb-wa;
  });
  const top4=byWR.slice(0,4);
  const top4Ids=new Set(top4.map(p=>p.id));
  // Remaining: sort by this season PGA points
  const remaining=eligible.filter(p=>!top4Ids.has(p.id)).sort((a,b)=>{
    const pa=(STATE.standings[a.id]||{}).points||0;
    const pb=(STATE.standings[b.id]||{}).points||0;
    return pb-pa;
  });
  const picks2=remaining.slice(0,2);
  return [...top4,...picks2].map(p=>p.id);
}

function rcInit(defId){
  if(!isRyderCupSeason(STATE.seasonNumber)){
    showToast('The Ryder Cup only happens in odd-numbered seasons (1,3,5...).',true);return;
  }
  const usaPlayers=selectRyderCupTeam('USA');
  const europePlayers=selectRyderCupTeam('Europe');
  if(usaPlayers.length<2||europePlayers.length<2){
    showToast('Need at least 2 eligible USA and 2 eligible Europe players on the roster. Add players from those countries.',true);return;
  }
  const venue=rcVenueForSeason(STATE.seasonNumber);
  STATE.rydercup={
    defId,
    season:STATE.seasonNumber,
    venue,
    phase:'in_progress', // 'in_progress' | 'decider' | 'complete'
    usaPlayers,
    europePlayers,
    // 4 sessions, 18 matches total, first to 9.5 wins
    sessions:[
      {name:'Day 1 — Foursomes',shortName:'Foursomes (9)',type:'foursomes',holes:9,matches:rcBuildPairMatches(usaPlayers,europePlayers,'foursomes',9),done:false,ptsUSA:0,ptsEurope:0},
      {name:'Day 2 — Singles',shortName:'Singles (9)',type:'singles',holes:9,matches:rcBuildSinglesMatches(usaPlayers,europePlayers,9),done:false,ptsUSA:0,ptsEurope:0},
      {name:'Day 3 — Foursomes',shortName:'Foursomes (18)',type:'foursomes',holes:18,matches:rcBuildPairMatches(usaPlayers,europePlayers,'foursomes',18),done:false,ptsUSA:0,ptsEurope:0},
      {name:'Day 4 — Singles',shortName:'Singles (18)',type:'singles',holes:18,matches:rcBuildSinglesMatches(usaPlayers,europePlayers,18),done:false,ptsUSA:0,ptsEurope:0},
    ],
    totalUSA:0,totalEurope:0,
    winner:null, // 'USA' | 'Europe'
    decider:null, // sudden-death decider state if score ends 9-9
    selectionInfo:{usa:rcSelectionInfo('USA'),europe:rcSelectionInfo('Europe')},
  };
  const inst=getInstance(defId);
  inst.status='in_progress';inst.rydercupActive=true;
  STATE.activeTournamentId=defId;
  saveState();
  switchView('tournament');
}

function rcSelectionInfo(side){
  const eligible=STATE.players.filter(p=>playerTeam(p)===side);
  const wrRows=getWorldRankings();
  const byWR=eligible.slice().sort((a,b)=>{
    const wa=wrRows.find(r=>r.playerId===a.id)?.pts||0;
    const wb=wrRows.find(r=>r.playerId===b.id)?.pts||0;
    return wb-wa;
  });
  const top4=byWR.slice(0,4).map(p=>p.id);
  const top4Ids=new Set(top4);
  const remaining=eligible.filter(p=>!top4Ids.has(p.id)).sort((a,b)=>{
    return ((STATE.standings[b.id]||{}).points||0)-((STATE.standings[a.id]||{}).points||0);
  });
  const picks2=remaining.slice(0,2).map(p=>p.id);
  return{top4,picks2};
}

function rcBuildPairMatches(usaPlayers,europePlayers,type,holes){
  // 3 matches of pairs
  const matches=[];
  for(let i=0;i<3;i++){
    const usaPair=[usaPlayers[i*2]||usaPlayers[0],usaPlayers[i*2+1]||usaPlayers[1]];
    const eurPair=[europePlayers[i*2]||europePlayers[0],europePlayers[i*2+1]||europePlayers[1]];
    matches.push({type,holes:holes||9,status:'pending',lineupUSA:usaPair,lineupEurope:eurPair,result:null,holesA:0,holesB:0});
  }
  return matches;
}

function rcBuildSinglesMatches(usaPlayers,europePlayers,holes){
  const matches=[];
  for(let i=0;i<6;i++){
    const usaP=usaPlayers[i]||usaPlayers[usaPlayers.length-1];
    const eurP=europePlayers[i]||europePlayers[europePlayers.length-1];
    matches.push({type:'singles',holes:holes||9,status:'pending',lineupUSA:[usaP],lineupEurope:[eurP],result:null,holesA:0,holesB:0});
  }
  return matches;
}

function rcTallySession(sessionIdx){
  const rc=STATE.rydercup;
  const session=rc.sessions[sessionIdx];
  let ptsUSA=0,ptsEurope=0;
  session.matches.forEach(m=>{
    if(m.result==='USA')ptsUSA+=1;
    else if(m.result==='Europe')ptsEurope+=1;
    else if(m.result==='H'){ptsUSA+=0.5;ptsEurope+=0.5;}
  });
  session.ptsUSA=ptsUSA;session.ptsEurope=ptsEurope;session.done=true;
  rc.totalUSA=(rc.totalUSA||0)+ptsUSA;
  rc.totalEurope=(rc.totalEurope||0)+ptsEurope;
}

function rcAllSessionsDone(){
  return STATE.rydercup.sessions.every(s=>s.done);
}

// Picks the lead player from each side's captain's-pick top-4 (i.e. the #1 WR seed)
// to play the sudden-death decider when the cup finishes tied 9-9.
function rcDeciderPlayers(){
  const rc=STATE.rydercup;
  const usaLead=(rc.selectionInfo?.usa?.top4||rc.usaPlayers)[0]||rc.usaPlayers[0];
  const eurLead=(rc.selectionInfo?.europe?.top4||rc.europePlayers)[0]||rc.europePlayers[0];
  return{usa:usaLead,europe:eurLead};
}

function rcCheckComplete(){
  const rc=STATE.rydercup;
  if(!rcAllSessionsDone())return false;
  if(rc.totalUSA>=RC_WIN_THRESHOLD||rc.totalEurope>=RC_WIN_THRESHOLD){
    rcFinalizeResult(rc.totalUSA>rc.totalEurope?'USA':'Europe');
    return true;
  }
  // 9-9 tie — kick off the sudden-death decider between each side's #1 seed
  if(!rc.decider){
    const leads=rcDeciderPlayers();
    rc.phase='decider';
    rc.decider={usaPlayer:leads.usa,europePlayer:leads.europe,holeNum:1,hsUSA:null,hsEurope:null,done:false,winner:null,holeLog:[]};
    saveState();
  }
  return false;
}

// Resolves the sudden-death decider once a hole has a clear winner (no halves allowed —
// keeps going hole after hole until someone is strictly ahead, per "till one guy gets a up").
function rcResolveDeciderHole(){
  const rc=STATE.rydercup;const dec=rc.decider;if(!dec||dec.done)return false;
  if(!dec.hsUSA?.holedOut||!dec.hsEurope?.holedOut)return false;
  const usaStrokes=dec.hsUSA.strokes,eurStrokes=dec.hsEurope.strokes;
  dec.holeLog.push({hole:dec.holeNum,usaStrokes,eurStrokes});
  if(usaStrokes===eurStrokes){
    // halved — another decider hole
    dec.holeNum++;dec.hsUSA=null;dec.hsEurope=null;
    saveState();return false;
  }
  dec.done=true;dec.winner=usaStrokes<eurStrokes?'USA':'Europe';
  rcFinalizeResult(dec.winner);
  return true;
}

function rcFinalizeResult(winner){
  const rc=STATE.rydercup;
  rc.winner=winner;rc.phase='complete';
  const winShare=Math.round(RC_WINNER_PURSE/6),runShare=Math.round(RC_RUNNER_PURSE/6);
  const winPlayers=winner==='USA'?rc.usaPlayers:rc.europePlayers;
  const runPlayers=winner==='USA'?rc.europePlayers:rc.usaPlayers;
  winPlayers.forEach(pid=>{
    if(!STATE.standings[pid])STATE.standings[pid]={points:0,earnings:0,wins:0,events:0,history:[]};
    STATE.standings[pid].earnings+=winShare;
  });
  runPlayers.forEach(pid=>{
    if(!STATE.standings[pid])STATE.standings[pid]={points:0,earnings:0,wins:0,events:0,history:[]};
    STATE.standings[pid].earnings+=runShare;
  });
  const inst=getInstance(rc.defId);if(inst){inst.status='complete';inst.completedAt=Date.now();inst.winnerId=winner;}
  if(STATE.activeTournamentId===rc.defId)STATE.activeTournamentId=null;
  if(!STATE.rydercupHistory)STATE.rydercupHistory=[];
  const deciderUsed=!!rc.decider;
  STATE.rydercupHistory.push({season:rc.season,winner,usaScore:rc.totalUSA,europeScore:rc.totalEurope,usaPlayers:rc.usaPlayers,europePlayers:rc.europePlayers,venue:rc.venue,decider:deciderUsed});
  const venueTxt=rc.venue?` at ${rc.venue.name}, ${rc.venue.location}`:'';
  pushNews({type:'rydercup',icon:'🏆',trnId:rc.defId,trnName:'Ryder Cup',
    headline:`🏆 RYDER CUP S${rc.season}: ${winner} wins${deciderUsed?' in sudden death':` ${rc.totalUSA}–${rc.totalEurope}`}!`,
    body:`${winner==='USA'?'Team USA 🇺🇸':'Team Europe 🇪🇺'} claimed the Ryder Cup${venueTxt} in Season ${rc.season}${deciderUsed?`, after the 18-match format finished locked at 9–9 and a sudden-death decider hole settled it`:` by a score of ${rc.totalUSA} to ${rc.totalEurope}`}. The winning team shares $100M in prize money among 6 players.`
  });
  saveState();
}

function avgAttrs(attrsList){
  const out={};ATTRS.forEach(a=>{out[a.key]=Math.round(attrsList.reduce((s,at)=>s+(at[a.key]||70),0)/attrsList.length);});return out;
}

// Simulate a single match play match (foursomes/fourball/singles)
// Returns result: 'USA', 'Europe', or 'H' (halved)
function rcSimulateMatch(match,numHoles){
  const holes=[];for(let h=0;h<numHoles;h++){holes.push({hole:h+1,par:4,yards:430});}
  let scoreUSA=0,scoreEurope=0;
  const{lineupUSA,lineupEurope,type}=match;
  for(let h=0;h<numHoles;h++){
    const holesRemaining=numHoles-h;
    if(Math.abs(scoreUSA-scoreEurope)>holesRemaining)break;
    let strokeUSA,strokeEurope;
    if(type==='foursomes'){
      const pA1=getPlayer(lineupUSA[0]),pA2=getPlayer(lineupUSA[1]||lineupUSA[0]);
      const pB1=getPlayer(lineupEurope[0]),pB2=getPlayer(lineupEurope[1]||lineupEurope[0]);
      const attrsA=avgAttrs([effectiveAttrs(pA1),effectiveAttrs(pA2)]);
      const attrsB=avgAttrs([effectiveAttrs(pB1),effectiveAttrs(pB2)]);
      strokeUSA=simulateFullHole(holes[h],attrsA).strokes;
      strokeEurope=simulateFullHole(holes[h],attrsB).strokes;
    } else if(type==='fourball'){
      const scoresA=(lineupUSA.slice(0,2)).map(pid=>{const p=getPlayer(pid);return p?simulateFullHole(holes[h],effectiveAttrs(p)).strokes:99;});
      const scoresB=(lineupEurope.slice(0,2)).map(pid=>{const p=getPlayer(pid);return p?simulateFullHole(holes[h],effectiveAttrs(p)).strokes:99;});
      strokeUSA=Math.min(...scoresA);strokeEurope=Math.min(...scoresB);
    } else {
      const pA=getPlayer(lineupUSA[0]),pB=getPlayer(lineupEurope[0]);
      strokeUSA=pA?simulateFullHole(holes[h],effectiveAttrs(pA)).strokes:5;
      strokeEurope=pB?simulateFullHole(holes[h],effectiveAttrs(pB)).strokes:5;
    }
    if(strokeUSA<strokeEurope)scoreUSA++;else if(strokeEurope<strokeUSA)scoreEurope++;
  }
  if(scoreUSA>scoreEurope)return'USA';if(scoreEurope>scoreUSA)return'Europe';return'H';
}

function activePlayersForRound(inst,roundIdx){
  return inst.field.filter(pid=>{
    if(inst.cutPlayers&&!inst.cutPlayers.has(pid)&&roundIdx>=inst.cutAppliedAfterRound)return false;
    return inst.rounds[roundIdx].scores[pid].some(v=>v==null);
  });
}
function nextOpenHoleIdx(inst,roundIdx,pid){const arr=inst.rounds[roundIdx].scores[pid];for(let i=0;i<18;i++)if(arr[i]==null)return i;return -1;}

/* ===== TEE TIME GROUPS =====
   Splits the field into small tee groups (like real tee sheets) so the UI
   never has to list every player in the event at once.
   Round 1 & 2: grouped in field order (as the field was set).
   Round 3 onward: regrouped by current standings — trailing players go out
   first, the leaders' group tees off last, same as a real broadcast round. */
const TEE_GROUP_SIZE=4;
function ensureTeeGroups(inst,def,defId,roundIdx){
  const rd=inst.rounds[roundIdx];
  if(rd.teeGroups&&rd.teeGroups.length)return rd.teeGroups;
  const eligible=inst.field.filter(pid=>!(inst.cutPlayers&&!inst.cutPlayers.has(pid)&&roundIdx>=inst.cutAppliedAfterRound));
  const rankingBased=roundIdx>=2;
  let order;
  if(rankingBased){
    const lb=computeLeaderboard(defId);
    const rankMap={};lb.forEach((row,i)=>{rankMap[row.playerId]=i;});
    order=eligible.slice().sort((a,b)=>(rankMap[a]??999)-(rankMap[b]??999));
  }else{
    order=eligible.slice();
  }
  const groups=[];
  for(let i=0;i<order.length;i+=TEE_GROUP_SIZE)groups.push(order.slice(i,i+TEE_GROUP_SIZE));
  if(rankingBased)groups.reverse(); // weakest group off first, leaders' group off last
  rd.teeGroups=groups;
  saveState();
  return groups;
}

function renderPlayPanel(defId,roundIdx,lb){
  const inst=getInstance(defId);const def=getDef(defId);const panel=document.getElementById('play-panel');
  const pending=activePlayersForRound(inst,roundIdx);
  if(pending.length===0){
    panel.innerHTML=`<div class="card" style="padding:24px;text-align:center;"><h3>Round ${roundIdx+1} complete</h3><p style="font-size:13px;color:var(--ink-500);margin-top:6px;">All players done. Move to the next round.</p><button class="btn amber" id="advance-round-btn" style="margin-top:14px;">Continue to Round ${roundIdx+2}</button></div>`;
    document.getElementById('advance-round-btn')?.addEventListener('click',renderTournament);return;
  }
  if(!pending.includes(PLAY_UI.selectedPlayerId)){PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;}

  const groups=ensureTeeGroups(inst,def,defId,roundIdx);
  const rankingBased=roundIdx>=2;
  // Keep the group selector in sync with whichever player is active
  if(PLAY_UI.selectedPlayerId){
    const gi=groups.findIndex(g=>g.includes(PLAY_UI.selectedPlayerId));
    if(gi!==-1)PLAY_UI.selectedGroupIdx=gi;
  }

      ${groupPids.map(pid=>{

          <span style="width:20px;height:20px;border-radius:50%;background:${avatarColor(p.name)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;">${initialsOf(p.name)}</span>

      <button class="btn ghost btn-sm" id="sim-selected-btn" ${!PLAY_UI.selectedPlayerId?'disabled':''} style="border-color:var(--board-amber);color:#7a5a0a;">Selected · full round</button>
    </div>
    <div class="sim-controls-row" style="margin-top:10px;">
      <span class="row-label">Checked groups${PLAY_UI.multiGroupIdxs&&PLAY_UI.multiGroupIdxs.size?` (${PLAY_UI.multiGroupIdxs.size})`:''}:</span>
      <button class="btn ghost btn-sm" id="sim-multi-group-hole-btn" title="Simulate current hole for every checked group (tick boxes above; defaults to the active group if none checked)">Checked · next hole</button>
      <button class="btn ghost btn-sm" id="sim-multi-group-round-btn" style="border-color:var(--board-amber);color:#7a5a0a;" title="Simulate the rest of the round for every checked group">Checked · full round</button>
    </div>
    <div class="sim-controls-row" style="margin-top:10px;">
      <span class="row-label">Whole field:</span>
      <button class="btn ghost btn-sm" id="sim-all-hole-btn" title="Simulate current hole for all pending players">All · next hole</button>
      <button class="btn ghost btn-sm" id="sim-all-round-btn" style="border-color:var(--board-amber);color:#7a5a0a;">All · full round</button>
    </div>
  </div>
  <div id="hole-control"></div>`;

  panel.querySelectorAll('[data-select-group]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      PLAY_UI.selectedGroupIdx=parseInt(btn.dataset.selectGroup,10);
      if(PLAY_UI.selectedPlayerId&&!groups[PLAY_UI.selectedGroupIdx].includes(PLAY_UI.selectedPlayerId)){PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;}
      renderTournament();
    });
  });

  panel.querySelectorAll('[data-select-player]').forEach(btn=>{
    btn.addEventListener('click',()=>selectPlayerForPlay(defId,roundIdx,btn.dataset.selectPlayer));
  });

  // Multi-select groups for bulk sim (checkboxes, separate from the single
  // "active" group used for hole-by-hole play above)
  panel.querySelectorAll('[data-multi-group]').forEach(cb=>{
    cb.addEventListener('change',()=>{
      const gi=parseInt(cb.dataset.multiGroup,10);
      if(!PLAY_UI.multiGroupIdxs)PLAY_UI.multiGroupIdxs=new Set();
      if(cb.checked)PLAY_UI.multiGroupIdxs.add(gi);else PLAY_UI.multiGroupIdxs.delete(gi);
      renderTournament();
    });
  });

  // Sim: next hole for this group only
  document.getElementById('sim-group-hole-btn')?.addEventListener('click',()=>{
    const gp=groupPids.filter(pid=>activePlayersForRound(inst,roundIdx).includes(pid));
    if(gp.length===0)return;
    const holes=gp.map(pid=>nextOpenHoleIdx(inst,roundIdx,pid)).filter(h=>h>=0);
    const minHole=Math.min(...holes);
    const toSim=gp.filter(pid=>nextOpenHoleIdx(inst,roundIdx,pid)===minHole);
    simulateHoleForPlayers(defId,roundIdx,minHole,toSim);
    showToast(`Simulated hole ${minHole+1} for Group ${activeGroupIdx+1} (${toSim.length} players).`);
    if(PLAY_UI.selectedPlayerId&&inst.rounds[roundIdx].scores[PLAY_UI.selectedPlayerId][PLAY_UI.holeIdx]!=null){
      const next=nextOpenHoleIdx(inst,roundIdx,PLAY_UI.selectedPlayerId);
      if(next===-1){PLAY_UI.selectedPlayerId=null;setPlayHoleState(PLAY_UI.selectedPlayerId,null);}
      else{PLAY_UI.holeIdx=next;const st=newHoleState(def.holes[next]);st._forHoleIdx=next;setPlayHoleState(PLAY_UI.selectedPlayerId,st);}
    }
    renderTournament();
  });

  // Sim: full round for this group only
  document.getElementById('sim-group-round-btn')?.addEventListener('click',()=>{
    const gp=groupPids.filter(pid=>activePlayersForRound(inst,roundIdx).includes(pid));
    if(gp.length===0)return;
    simulateRoundForPlayers(defId,roundIdx,gp);
    PLAY_UI.selectedPlayerId=null;setPlayHoleState(null,null);
    showToast(`Simulated full round ${roundIdx+1} for Group ${activeGroupIdx+1} (${gp.length} players).`);
    renderTournament();
  });

  // Sim: next hole for MULTIPLE selected groups at once
  document.getElementById('sim-multi-group-hole-btn')?.addEventListener('click',()=>{
    const idxs=PLAY_UI.multiGroupIdxs&&PLAY_UI.multiGroupIdxs.size?[...PLAY_UI.multiGroupIdxs]:[activeGroupIdx];
    const pids=idxs.flatMap(gi=>(groups[gi]||[])).filter(pid=>activePlayersForRound(inst,roundIdx).includes(pid));
    if(pids.length===0)return;
    const holes=pids.map(pid=>nextOpenHoleIdx(inst,roundIdx,pid)).filter(h=>h>=0);
    const minHole=Math.min(...holes);
    const toSim=pids.filter(pid=>nextOpenHoleIdx(inst,roundIdx,pid)===minHole);
    simulateHoleForPlayers(defId,roundIdx,minHole,toSim);
    showToast(`Simulated hole ${minHole+1} for ${idxs.length} group(s) (${toSim.length} players).`);
    if(PLAY_UI.selectedPlayerId&&inst.rounds[roundIdx].scores[PLAY_UI.selectedPlayerId][PLAY_UI.holeIdx]!=null){
      const next=nextOpenHoleIdx(inst,roundIdx,PLAY_UI.selectedPlayerId);
      if(next===-1){PLAY_UI.selectedPlayerId=null;setPlayHoleState(PLAY_UI.selectedPlayerId,null);}
      else{PLAY_UI.holeIdx=next;const st=newHoleState(def.holes[next]);st._forHoleIdx=next;setPlayHoleState(PLAY_UI.selectedPlayerId,st);}
    }
    renderTournament();
  });

  // Sim: full round for MULTIPLE selected groups at once
  document.getElementById('sim-multi-group-round-btn')?.addEventListener('click',()=>{
    const idxs=PLAY_UI.multiGroupIdxs&&PLAY_UI.multiGroupIdxs.size?[...PLAY_UI.multiGroupIdxs]:[activeGroupIdx];
    const pids=idxs.flatMap(gi=>(groups[gi]||[])).filter(pid=>activePlayersForRound(inst,roundIdx).includes(pid));
    if(pids.length===0)return;
    simulateRoundForPlayers(defId,roundIdx,pids);
    PLAY_UI.selectedPlayerId=null;setPlayHoleState(null,null);
    showToast(`Simulated full round ${roundIdx+1} for ${idxs.length} group(s) (${pids.length} players).`);
    renderTournament();
  });

  // Bulk sim: next hole for all pending players
  document.getElementById('sim-all-hole-btn').addEventListener('click',()=>{
    const pendingNow=activePlayersForRound(inst,roundIdx);
    // find the next unplayed hole — use the minimum open hole across all pending players
    const holes=pendingNow.map(pid=>nextOpenHoleIdx(inst,roundIdx,pid)).filter(h=>h>=0);
    const minHole=Math.min(...holes);
    const toSim=pendingNow.filter(pid=>nextOpenHoleIdx(inst,roundIdx,pid)===minHole);
    simulateHoleForPlayers(defId,roundIdx,minHole,toSim);
    showToast(`Simulated hole ${minHole+1} for ${toSim.length} players.`);
    if(PLAY_UI.selectedPlayerId&&inst.rounds[roundIdx].scores[PLAY_UI.selectedPlayerId][PLAY_UI.holeIdx]!=null){
      const next=nextOpenHoleIdx(inst,roundIdx,PLAY_UI.selectedPlayerId);
      if(next===-1){PLAY_UI.selectedPlayerId=null;setPlayHoleState(PLAY_UI.selectedPlayerId,null);}
      else{PLAY_UI.holeIdx=next;const st=newHoleState(def.holes[next]);st._forHoleIdx=next;setPlayHoleState(PLAY_UI.selectedPlayerId,st);}
    }
    renderTournament();
  });

  // Sim: next hole for selected player only
  document.getElementById('sim-selected-hole-btn').addEventListener('click',()=>{
    if(!PLAY_UI.selectedPlayerId)return;
    const pid=PLAY_UI.selectedPlayerId;const hIdx=nextOpenHoleIdx(inst,roundIdx,pid);
    if(hIdx===-1)return;
    simulateHoleForPlayers(defId,roundIdx,hIdx,[pid]);
    const next=nextOpenHoleIdx(inst,roundIdx,pid);
    if(next===-1){PLAY_UI.selectedPlayerId=null;setPlayHoleState(pid,null);}
    else{PLAY_UI.holeIdx=next;const st=newHoleState(def.holes[next]);st._forHoleIdx=next;setPlayHoleState(pid,st);}
    showToast(`Simulated hole ${hIdx+1} for ${getPlayer(pid).name}.`);
    renderTournament();
  });

  // Sim: full round for all
  document.getElementById('sim-all-round-btn').addEventListener('click',()=>{
    const pendingNow=activePlayersForRound(inst,roundIdx);
    simulateRoundForPlayers(defId,roundIdx,pendingNow);
    PLAY_UI.selectedPlayerId=null;setPlayHoleState(null,null);
    showToast(`Simulated full round ${roundIdx+1} for all ${pendingNow.length} players.`);

  });

  // Sim: full round for selected
  document.getElementById('sim-selected-btn').addEventListener('click',()=>{
    if(!PLAY_UI.selectedPlayerId)return;
    const pid=PLAY_UI.selectedPlayerId;
    simulateRoundForPlayers(defId,roundIdx,[pid]);
    showToast(`Simulated full round for ${getPlayer(pid).name}.`);
    PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;
    renderTournament();
  });

  if(PLAY_UI.selectedPlayerId)renderHoleControl(defId,roundIdx,PLAY_UI.selectedPlayerId);
  else document.getElementById('hole-control').innerHTML=`<div class="empty-state" style="padding:30px 20px;"><p>Pick a player above to step up to the tee — or use simulate buttons for quick results.</p></div>`;
}

function selectPlayerForPlay(defId,roundIdx,pid){
  const inst=getInstance(defId);const holeIdx=nextOpenHoleIdx(inst,roundIdx,pid);
  PLAY_UI.selectedPlayerId=pid;PLAY_UI.holeIdx=holeIdx;
  // Resume this player's in-progress shots for the current hole if we have
  // them cached (they were mid-hole when we tabbed away to another player
  // in the group) — otherwise this is a fresh hole for them, start clean.
  const cached=PLAY_UI.holeStates[pid];
  const state=(cached&&cached._forHoleIdx===holeIdx)?cached:newHoleState(getDef(defId).holes[holeIdx]);
  state._forHoleIdx=holeIdx;
  setPlayHoleState(pid,state);
  renderTournament();
}

function renderHoleControl(defId,roundIdx,pid){
  const inst=getInstance(defId);const def=getDef(defId);const player=getPlayer(pid);
  const holeIdx=PLAY_UI.holeIdx;const holeDef=def.holes[holeIdx];const hs=PLAY_UI.holeState;
  const wrap=document.getElementById('hole-control');
  const scoreSoFar=inst.rounds[roundIdx].scores[pid];
  const roundParSoFar=def.holes.slice(0,holeIdx).reduce((s,h)=>s+h.par,0);
  const strokesSoFar=scoreSoFar.slice(0,holeIdx).reduce((s,v)=>s+(v||0),0);
  const toParSoFar=strokesSoFar-roundParSoFar;
  wrap.innerHTML=`<div class="card" style="padding:18px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
      <div>
        <div class="eyebrow">${escapeHTML(player.name)} · ${lieLabel(hs.lie)!=='Holed'?lieLabel(hs.lie)+' · ':''}Shot ${hs.strokes+1}</div>
        <h3 style="font-size:20px;">Hole ${holeIdx+1} · Par ${holeDef.par} · ${holeDef.yards}y</h3>
      </div>
      <div style="text-align:right;">
        <div class="eyebrow">Thru ${holeIdx}</div>
        <div class="num" style="font-size:20px;color:${toParSoFar<0?'var(--flag-red)':'var(--ink-900)'};">${holeIdx===0?'—':(toParSoFar===0?'E':toParSoFar>0?'+'+toParSoFar:toParSoFar)}</div>
      </div>
    </div>
    <div style="margin-top:16px;display:flex;align-items:center;gap:18px;background:var(--sand-200);border-radius:4px;padding:14px 18px;">
      <div style="flex:1;"><div class="eyebrow" style="margin-bottom:3px;">Lie</div><div style="font-family:'Oswald',sans-serif;font-size:17px;color:${lieColor(hs.lie)};">${lieLabel(hs.lie)}</div></div>
      <div style="flex:1;text-align:center;"><div class="eyebrow" style="margin-bottom:3px;">${hs.lie==='green'?'To Hole':'To Pin'}</div><div class="num" style="font-size:22px;">${hs.lie==='green'?(hs.puttDistanceFt+' ft'):(Math.round(hs.remaining)+' y')}</div></div>
      <div style="flex:1;text-align:right;"><div class="eyebrow" style="margin-bottom:3px;">Strokes</div><div class="num" style="font-size:22px;">${hs.strokes}</div></div>
    </div>
    <div id="shot-log" style="margin-top:14px;max-height:130px;overflow-y:auto;display:flex;flex-direction:column-reverse;gap:6px;" class="scrollbar-thin">
      ${hs.log.slice().reverse().map((l,i)=>`<div style="font-size:13px;padding:7px 10px;background:${i===0?'rgba(63,122,77,0.1)':'transparent'};border-radius:3px;border-left:3px solid ${i===0?'var(--turf-600)':'var(--line)'};">${escapeHTML(l)}</div>`).join('')}
    </div>
    <div style="margin-top:16px;display:flex;gap:10px;">
      <button class="btn amber" id="hit-shot-btn" style="flex:1;padding:14px;font-size:15px;" ${hs.holedOut?'disabled':''}>
        ${hs.strokes===0?(hs.lie==='tee'?'Tee Off':'Hit Shot'):'Hit Next Shot'}
      </button>
    </div>
    ${hs.holedOut?`<button class="btn" id="confirm-hole-btn" style="width:100%;margin-top:10px;padding:13px;">Confirm ${hs.strokes} · ${holeResultWord(hs.strokes,holeDef.par)} — Next</button>`:''}
  </div>
  <div class="card" style="margin-top:14px;padding:14px;">
    <div class="eyebrow" style="margin-bottom:8px;">${escapeHTML(player.name)}'s Scorecard · Round ${roundIdx+1}</div>
    ${scorecardHTML(def,scoreSoFar,holeIdx)}
  </div>`;
  document.getElementById('hit-shot-btn')?.addEventListener('click',()=>{playShot(hs,effectiveAttrs(player),def.difficulty);renderHoleControl(defId,roundIdx,pid);});
  document.getElementById('confirm-hole-btn')?.addEventListener('click',()=>{recordHoleScore(defId,roundIdx,pid,holeIdx,hs.strokes);advanceAfterHole(defId,roundIdx,pid);});
}

function holeResultWord(strokes,par){const d=strokes-par;if(d<=-3)return'Albatross+';if(d===-2)return'Eagle';if(d===-1)return'Birdie';if(d===0)return'Par';if(d===1)return'Bogey';if(d===2)return'Double Bogey';return`+${d}`;}
function advanceAfterHole(defId,roundIdx,pid){
  const inst=getInstance(defId);const next=nextOpenHoleIdx(inst,roundIdx,pid);
  if(next===-1){PLAY_UI.selectedPlayerId=null;setPlayHoleState(pid,null);showToast(`${getPlayer(pid).name} signs for their round.`);}
  else{
    PLAY_UI.holeIdx=next;
    const state=newHoleState(getDef(defId).holes[next]);
    state._forHoleIdx=next;
    setPlayHoleState(pid,state);
  }
  renderTournament();
}

/* ===== SUDDEN DEATH PLAYOFF HOLE VIEW ===== */
let PH_PLAY={pid:null,holeState:null}; // which tied player is currently hitting

function renderPlayoffHoleView(el,defId){
  const inst=getInstance(defId);const def=getDef(defId);
  const ph=inst.playoffHole;
  const tiedPlayers=ph.remainingPids.map(pid=>getPlayer(pid)).filter(Boolean);
  const holeNum=ph.currentHole;
  const holeDef={hole:`P${holeNum}`,par:4,yards:430};

  // Find who still needs to play this hole
  const needToPlay=ph.remainingPids.filter(pid=>(ph.scores[pid]||[]).length<holeNum);
  const donePlaying=ph.remainingPids.filter(pid=>(ph.scores[pid]||[]).length>=holeNum);

  el.innerHTML=`<div class="section-head">
    <div><span class="eyebrow" style="color:var(--flag-red);">⚡ SUDDEN DEATH PLAYOFF</span><h2>${def.name}</h2></div>
    <div class="eyebrow">Par 4 · 430 yards · Playoff Hole ${holeNum}</div>
  </div>
  <div class="play-grid-2col" style="display:grid;grid-template-columns:1.15fr 1fr;gap:20px;align-items:flex-start;">
    <div id="ph-play-panel">
      ${PH_PLAY.pid&&PH_PLAY.holeState?'':'<div class="empty-state" style="padding:24px;"><p>Select a player below to play their playoff hole.</p></div>'}
    </div>
    <div>
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="background:var(--flag-red);color:#fff;padding:10px 16px;font-family:\'Oswald\',sans-serif;font-size:13px;letter-spacing:0.05em;">PLAYOFF STANDINGS · HOLE ${holeNum}</div>
        <div style="padding:12px;">
          ${tiedPlayers.map(p=>{
            const hScores=ph.scores[p.id]||[];
            const played=hScores.length>=holeNum;
            const thisScore=played?hScores[holeNum-1]:null;
            const isActive=PH_PLAY.pid===p.id;
            return`<div style="display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--line);${isActive?'background:rgba(217,161,59,0.12);':''}">
              <span style="width:28px;height:28px;border-radius:50%;background:${avatarColor(p.name)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:\'Barlow Condensed\',sans-serif;">${initialsOf(p.name)}</span>
              <span style="flex:1;font-size:13px;">${escapeHTML(p.name)}</span>
              ${played?`<span class="num" style="font-size:16px;color:${thisScore<4?'var(--turf-700)':thisScore>4?'var(--flag-red)':'var(--ink-900)'};">${thisScore}</span><span style="font-size:10px;font-family:\'Barlow Condensed\',sans-serif;color:var(--ink-500);margin-left:4px;">${holeResultWord(thisScore,4)}</span>`
              :`<button class="btn amber btn-sm" data-ph-select="${p.id}">Play Hole</button>`}
              <button class="btn ghost btn-sm" data-ph-simulate="${p.id}" style="border-color:var(--board-amber);color:#7a5a0a;"${played?'disabled':''}>Simulate</button>
            </div>`;
          }).join('')}
          ${needToPlay.length===0?`<div style="padding:12px;"><button class="btn amber" id="ph-resolve-btn" style="width:100%;">Resolve Playoff — All Played</button></div>`:''}
        </div>
      </div>
    </div>
  </div>`;

  if(PH_PLAY.pid&&PH_PLAY.holeState){
    renderPHHoleControl(defId,holeNum,PH_PLAY.pid,holeDef);
  }

  el.querySelectorAll('[data-ph-select]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      PH_PLAY.pid=btn.dataset.phSelect;
      PH_PLAY.holeState=newHoleState(holeDef);
      renderPlayoffHoleView(el,defId);
    });
  });

  el.querySelectorAll('[data-ph-simulate]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const pid=btn.dataset.phSimulate;
      const p=getPlayer(pid);if(!p)return;
      const hs=simulateFullHole(holeDef,effectiveAttrs(p));
      if(!inst.playoffHole.scores[pid])inst.playoffHole.scores[pid]=[];
      while(inst.playoffHole.scores[pid].length<holeNum-1)inst.playoffHole.scores[pid].push(4);
      inst.playoffHole.scores[pid][holeNum-1]=hs.strokes;
      if(PH_PLAY.pid===pid){PH_PLAY.pid=null;PH_PLAY.holeState=null;}
      saveState();showToast(`${p.name} scores ${hs.strokes} on the playoff hole.`);
      renderPlayoffHoleView(el,defId);
    });
  });

  document.getElementById('ph-resolve-btn')?.addEventListener('click',()=>{
    const resolved=resolvePlayoffHoleIfComplete(defId);
    PH_PLAY.pid=null;PH_PLAY.holeState=null;
    if(resolved){
      const inst2=getInstance(defId);const winner=getPlayer(inst2.winnerId);
      showToast(`${winner?.name||'A player'} wins in sudden death!`);
      switchView('tournament');
    } else {
      showToast(`Still tied! Onto playoff hole ${inst.playoffHole.currentHole}.`);
      renderPlayoffHoleView(el,defId);
    }
  });
}

      <div style="flex:1;text-align:right;"><div class="eyebrow" style="margin-bottom:2px;">Strokes</div><div class="num" style="font-size:20px;">${hs.strokes}</div></div>

function renderRyderCupView(el){
  const rc=STATE.rydercup;if(!rc){el.innerHTML=`<div class="empty-state"><h3>No Ryder Cup active</h3></div>`;return;}
  if(rc.phase==='complete'){renderRyderCupComplete(el,rc);return;}

}

/* ===== SUDDEN-DEATH DECIDER (9-9 tie) =====
   Each captain's #1 WR seed plays a decider hole, head to head, hole after hole,
   until one of them is strictly fewer strokes — no halves carry the cup. */
function renderRyderCupDecider(el,rc){
  const dec=rc.decider;if(!dec)return;
  const venue=rc.venue||{flag:'🌍',name:'Various',location:'International'};
  const usaP=getPlayer(dec.usaPlayer);const eurP=getPlayer(dec.europePlayer);
  if(!dec.hsUSA)dec.hsUSA=newHoleState({hole:dec.holeNum,par:4,yards:445});
  if(!dec.hsEurope)dec.hsEurope=newHoleState({hole:dec.holeNum,par:4,yards:445});

  el.innerHTML=`<div class="section-head">
    <div><span class="eyebrow" style="color:var(--flag-red);">⚡ SUDDEN DEATH · Locked 9–9</span><h2>${venue.flag} ${escapeHTML(venue.name)} · Decider Hole ${dec.holeNum}</h2></div>
  </div>
  <div class="card" style="padding:14px 18px;margin-bottom:18px;background:rgba(168,54,42,0.06);border:1px solid rgba(168,54,42,0.2);">
    <p style="font-size:13px;color:var(--ink-700);margin:0;">The Ryder Cup finished level after all 18 matches. Each captain's #1 seed plays this hole head to head — first to win a hole takes the cup. Ties replay another hole.</p>
  </div>
  <div class="play-grid-2col" style="display:grid;grid-template-columns:1.15fr 1fr;gap:20px;align-items:flex-start;">
    <div id="rc-dec-play-col"></div>
    <div id="rc-dec-status-col"></div>
  </div>`;

  const statusCol=document.getElementById('rc-dec-status-col');
  statusCol.innerHTML=`<div class="card" style="padding:0;overflow:hidden;">
    <div style="background:var(--board-black);color:var(--paper-50);padding:12px 16px;text-align:center;">
      <div style="font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:var(--sand-300);">Decider Hole ${dec.holeNum} · Par 4 · 445y</div>
      <div style="font-size:13px;color:var(--sand-200);font-family:'Barlow Condensed',sans-serif;font-weight:700;margin-top:4px;">Whoever wins this hole wins the Ryder Cup</div>
    </div>
    <div style="padding:12px;">${dec.holeLog.length===0?`<div style="font-size:12px;color:var(--ink-500);text-align:center;padding:8px;">No decider holes played yet</div>`:`
      <div style="display:flex;flex-direction:column;gap:5px;">
        ${dec.holeLog.slice().reverse().map(h=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 8px;background:var(--sand-200);border-radius:3px;">
          <span class="num" style="width:30px;color:var(--ink-500);">D${h.hole}</span>
          <span style="flex:1;color:var(--ink-700);">USA ${h.usaStrokes} – ${h.eurStrokes} Europe</span>
          <span style="font-size:11px;color:var(--ink-500);">${h.usaStrokes===h.eurStrokes?'Halved — replay':'Decided'}</span>
        </div>`).join('')}
      </div>`}
    </div>
  </div>`;

  const playCol=document.getElementById('rc-dec-play-col');
  const usaTurn=dec.turn!=='Europe'&&!dec.hsUSA.holedOut;
  const eurTurn=dec.turn==='Europe'&&!dec.hsEurope.holedOut;
  playCol.innerHTML=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;">
    ${rcSideCardHTML('USA',dec.hsUSA,usaP,usaTurn)}
    ${rcSideCardHTML('Europe',dec.hsEurope,eurP,eurTurn)}
  </div>
  <div class="card" style="padding:14px;display:flex;flex-direction:column;gap:8px;">
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      ${!dec.hsUSA.holedOut||!dec.hsEurope.holedOut?`<button class="btn ghost btn-sm" id="rc-dec-sim" style="border-color:var(--board-amber);color:#7a5a0a;">Simulate Rest of Hole (Both Sides)</button>`:''}
      ${dec.hsUSA.holedOut&&dec.hsEurope.holedOut?`<button class="btn amber" id="rc-dec-confirm" style="flex:1;">Confirm Hole Result →</button>`:''}
    </div>
  </div>`;

  playCol.querySelectorAll('[data-rc-hit]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const side=btn.dataset.rcHit;
      const hs=side==='USA'?dec.hsUSA:dec.hsEurope;
      const eff=side==='USA'?effectiveAttrs(usaP):effectiveAttrs(eurP);
      playShot(hs,eff);
      dec.turn=side;saveState();
      renderRyderCupDecider(el,rc);
    });
  });
  document.getElementById('rc-dec-sim')?.addEventListener('click',()=>{
    while(!dec.hsUSA.holedOut)playShot(dec.hsUSA,effectiveAttrs(usaP));
    while(!dec.hsEurope.holedOut)playShot(dec.hsEurope,effectiveAttrs(eurP));
    saveState();renderRyderCupDecider(el,rc);
  });
  document.getElementById('rc-dec-confirm')?.addEventListener('click',()=>{
    const resolved=rcResolveDeciderHole();
    if(resolved){
      showToast(`${getPlayer(rc.winner==='USA'?dec.usaPlayer:dec.europePlayer)?.name||rc.winner} wins it in sudden death!`);
      renderRyderCupView(el);
    } else {
      showToast(`Halved — onto decider hole ${dec.holeNum}.`);
      renderRyderCupDecider(el,rc);
    }
  });
}

// Match-play UI for Ryder Cup foursomes/fourball/singles.
// Mirrors the regular hole-by-hole play screen (two-column layout, big lie/distance/strokes
// readout, scrollable shot log) but runs two sides side-by-side instead of one player.
// The person chooses which side to hit next — the app never silently switches control.
let RC_MATCH_PLAY={active:false,sIdx:null,mIdx:null,holeNum:1,totalHoles:9,scoreUSA:0,scoreEurope:0,hsUSA:null,hsEurope:null,holeLog:[],done:false,winner:null,turn:'USA'};

function openRCMatchPlayModalNew(viewEl,sIdx,mIdx){
  const rc=STATE.rydercup;const match=rc.sessions[sIdx].matches[mIdx];
  const totalHoles=match.holes||9;
  const holeDef={hole:1,par:4,yards:430};
  RC_MATCH_PLAY={active:true,sIdx,mIdx,holeNum:1,totalHoles,scoreUSA:0,scoreEurope:0,
    hsUSA:newHoleState(holeDef),hsEurope:newHoleState(holeDef),holeLog:[],done:false,winner:null,turn:'USA'};
  renderRCMatchPlayPanel(viewEl);
}

function rcMatchStatusText(diff,holesLeft){
  if(diff===0)return'All Square';
  const leader=diff>0?'USA':'Europe';
  const mag=Math.abs(diff);
  if(mag>holesLeft)return`${leader} wins`;
  if(mag===holesLeft)return`${leader} ${mag} UP · Dormie`;
  return`${leader} ${mag} UP`;
}

  const flag=isUSA?'🇺🇸':'🇪🇺';
  const name=nameOverride?escapeHTML(nameOverride):(player?escapeHTML(player.name):side);
  const ringStyle=isTurn?`box-shadow:0 0 0 2px ${col};`:'';
  return`<div style="flex:1;min-width:0;background:${bg};border:1px solid ${isUSA?'rgba(0,40,104,0.18)':'rgba(0,70,127,0.18)'};${ringStyle}border-radius:6px;padding:12px 14px;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px;">
      <span style="width:26px;height:26px;border-radius:50%;background:${avatarColor(player?.name||side)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;">${player?initialsOf(player.name):flag}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.07em;color:${col};">${flag} ${side}</div>
        <div style="font-family:'Oswald',sans-serif;font-size:14px;color:var(--ink-900);line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${name}</div>
      </div>
      ${isTurn&&!hs.holedOut?`<span style="font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;background:${col};color:#fff;padding:2px 7px;border-radius:10px;letter-spacing:0.04em;white-space:nowrap;">ON THE TEE</span>`:''}
      ${hs.holedOut?`<span style="font-size:9px;font-family:'Barlow Condensed',sans-serif;font-weight:700;background:rgba(63,122,77,0.15);color:var(--turf-700);padding:2px 7px;border-radius:10px;letter-spacing:0.04em;white-space:nowrap;">✓ IN</span>`:''}
    </div>
    <div style="display:flex;gap:8px;">
      <div style="flex:1;text-align:center;background:#fff;border-radius:4px;padding:6px 4px;">
        <div style="font-size:9px;color:var(--ink-500);text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;">Lie</div>
        <div style="font-family:'Oswald',sans-serif;font-size:13px;color:${lieColor(hs.lie)};">${lieLabel(hs.lie)}</div>
      </div>
      <div style="flex:1;text-align:center;background:#fff;border-radius:4px;padding:6px 4px;">
        <div style="font-size:9px;color:var(--ink-500);text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;">${hs.lie==='green'?'To Hole':'To Pin'}</div>
        <div class="num" style="font-size:14px;">${hs.lie==='green'?hs.puttDistanceFt+'ft':Math.round(hs.remaining)+'y'}</div>
      </div>
      <div style="flex:1;text-align:center;background:#fff;border-radius:4px;padding:6px 4px;">
        <div style="font-size:9px;color:var(--ink-500);text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;">Strokes</div>
        <div class="num" style="font-size:14px;">${hs.strokes}</div>
      </div>
    </div>
    ${hs.log.length?`<div style="font-size:11px;color:var(--ink-700);margin-top:8px;padding:6px 8px;background:#fff;border-radius:3px;border-left:3px solid ${col};">${escapeHTML(hs.log[hs.log.length-1])}</div>`:''}
    ${!hs.holedOut?`<button class="btn btn-sm" data-rc-hit="${side}" style="width:100%;margin-top:9px;background:${col};border-color:${col};">${hs.strokes===0?'Tee Off':'Hit Next Shot'}</button>`:''}

function renderRCMatchPlayPanel(viewEl){
  const rc=STATE.rydercup;const rcm=RC_MATCH_PLAY;
  const session=rc.sessions[rcm.sIdx];const match=session.matches[rcm.mIdx];
  const isFoursomes=match.type==='foursomes';
  const holesLeft=rcm.totalHoles-rcm.holeNum+1;
  const diff=rcm.scoreUSA-rcm.scoreEurope;
  const usaP=getPlayer(match.lineupUSA[0]);const eurP=getPlayer(match.lineupEurope[0]);
  // Foursomes is a pair playing alternate shot — average the team's effective attributes
  // instead of just using the first-listed player, so both partners actually matter.
  const usaEff=isFoursomes
    ?avgAttrs(match.lineupUSA.map(pid=>effectiveAttrs(getPlayer(pid))).filter(Boolean))
    :(usaP?effectiveAttrs(usaP):{});
  const eurEff=isFoursomes
    ?avgAttrs(match.lineupEurope.map(pid=>effectiveAttrs(getPlayer(pid))).filter(Boolean))
    :(eurP?effectiveAttrs(eurP):{});
  const usaLabel=isFoursomes?match.lineupUSA.map(pid=>getPlayer(pid)?.name||'?').join(' / '):(usaP?.name||'USA');
  const eurLabel=isFoursomes?match.lineupEurope.map(pid=>getPlayer(pid)?.name||'?').join(' / '):(eurP?.name||'Europe');

  viewEl.innerHTML=`<div class="section-head">
    <div><span class="eyebrow" style="color:var(--flag-red);">${session.name} · ${match.holes||9} Holes · Match Play</span><h2>🇺🇸 ${escapeHTML(usaLabel)} vs 🇪🇺 ${escapeHTML(eurLabel)}</h2></div>
    <button class="btn ghost btn-sm" id="rc-mp-back">← Back to Matches</button>
  </div>
  <div class="play-grid-2col" style="display:grid;grid-template-columns:1.15fr 1fr;gap:20px;align-items:flex-start;">
    <div id="rc-mp-play-col"></div>
    <div id="rc-mp-status-col"></div>
  </div>`;

  document.getElementById('rc-mp-back').addEventListener('click',()=>{
    RC_MATCH_PLAY.active=false;renderRyderCupView(viewEl);
  });

  /* ---- Status column: score header, both sides' cards, hole-by-hole match log ---- */
  const statusCol=document.getElementById('rc-mp-status-col');
  if(rcm.done){
    const resultText=rcm.winner==='H'?'Match Halved':rcm.winner==='USA'?'USA Win':'Europe Win';
    const col=rcm.winner==='USA'?'#002868':rcm.winner==='Europe'?'#00467f':'var(--ink-500)';
    statusCol.innerHTML=`<div class="card" style="padding:20px;text-align:center;border-top:4px solid ${col};">
      <div style="font-size:28px;margin-bottom:8px;">${rcm.winner==='H'?'🤝':'🏆'}</div>
      <div style="font-family:'Oswald',sans-serif;font-size:20px;color:${col};">${resultText}</div>
      <div class="num" style="font-size:18px;margin:8px 0;">USA ${rcm.scoreUSA} – ${rcm.scoreEurope} Europe</div>
      <button class="btn amber" id="rc-mp-confirm" style="margin-top:12px;width:100%;padding:10px;">Confirm Result &amp; Back to Matches</button>
    </div>`;
    document.getElementById('rc-mp-confirm').addEventListener('click',()=>{
      match.result=rcm.winner;match.status='complete';
      RC_MATCH_PLAY.active=false;saveState();renderRyderCupView(viewEl);
    });
  } else {
    statusCol.innerHTML=`<div class="card" style="padding:0;overflow:hidden;">
      <div style="background:var(--board-black);color:var(--paper-50);padding:12px 16px;text-align:center;">
        <div style="font-size:10px;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.08em;text-transform:uppercase;color:var(--sand-300);">Hole ${rcm.holeNum} of ${rcm.totalHoles} · Par 4</div>
        <div class="num" style="font-size:26px;margin:4px 0;"><span style="color:#7fa8e0;">${rcm.scoreUSA}</span> – <span style="color:#7fc4ea;">${rcm.scoreEurope}</span></div>
        <div style="font-size:12px;color:var(--sand-200);font-family:'Barlow Condensed',sans-serif;font-weight:700;">${rcMatchStatusText(diff,holesLeft)} · ${holesLeft} to play</div>
      </div>
      <div style="padding:12px;">${rcm.holeLog.length===0?`<div style="font-size:12px;color:var(--ink-500);text-align:center;padding:8px;">No holes completed yet</div>`:`
        <div style="display:flex;flex-direction:column;gap:5px;max-height:260px;overflow-y:auto;" class="scrollbar-thin">
          ${rcm.holeLog.slice().reverse().map(h=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;padding:6px 8px;background:var(--sand-200);border-radius:3px;">
            <span class="num" style="width:20px;color:var(--ink-500);">H${h.hole}</span>
            <span style="flex:1;color:${h.winner==='USA'?'#002868':h.winner==='Europe'?'#00467f':'var(--ink-700)'};font-weight:600;">${h.winner==='H'?'Halved':h.winner+' wins hole'}</span>
            <span style="font-size:11px;color:var(--ink-500);">USA ${h.usaStrokes} – ${h.eurStrokes} Eur</span>
          </div>`).join('')}
        </div>`}
      </div>
    </div>`;
  }

  /* ---- Play column: the two side-by-side player cards + whichever hit-shot controls apply ---- */
  const playCol=document.getElementById('rc-mp-play-col');
  if(!rcm.done){
    const usaTurn=rcm.turn==='USA'&&!rcm.hsUSA.holedOut;
    const eurTurn=rcm.turn==='Europe'&&!rcm.hsEurope.holedOut;
    playCol.innerHTML=`<div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:14px;">
      ${rcSideCardHTML('USA',rcm.hsUSA,usaP,usaTurn,isFoursomes?usaLabel:null)}
      ${rcSideCardHTML('Europe',rcm.hsEurope,eurP,eurTurn,isFoursomes?eurLabel:null)}
    </div>
    <div class="card" style="padding:14px;display:flex;flex-direction:column;gap:8px;">
      <div style="font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-500);">Quick Actions</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${!rcm.hsUSA.holedOut||!rcm.hsEurope.holedOut?`<button class="btn ghost btn-sm" id="rc-mp-sim-hole" style="border-color:var(--board-amber);color:#7a5a0a;">Simulate Rest of Hole (Both Sides)</button>`:''}
        ${rcm.hsUSA.holedOut&&rcm.hsEurope.holedOut?`<button class="btn amber" id="rc-mp-next-hole" style="flex:1;">Confirm Hole &amp; Continue →</button>`:''}
      </div>
      <p style="font-size:11px;color:var(--ink-500);margin:0;">Tap "Tee Off" / "Hit Next Shot" on either card — play USA and Europe in any order you like, hole by hole.</p>
    </div>`;

    playCol.querySelectorAll('[data-rc-hit]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const side=btn.dataset.rcHit;
        const hs=side==='USA'?rcm.hsUSA:rcm.hsEurope;
        const eff=side==='USA'?usaEff:eurEff;
        playShot(hs,eff);
        rcm.turn=side; // keep focus ring on the side just played
        renderRCMatchPlayPanel(viewEl);
      });
    });
    document.getElementById('rc-mp-sim-hole')?.addEventListener('click',()=>{
      while(!rcm.hsUSA.holedOut)playShot(rcm.hsUSA,usaEff);
      while(!rcm.hsEurope.holedOut)playShot(rcm.hsEurope,eurEff);
      renderRCMatchPlayPanel(viewEl);
    });
    document.getElementById('rc-mp-next-hole')?.addEventListener('click',()=>{
      const usaStrokes=rcm.hsUSA.strokes,eurStrokes=rcm.hsEurope.strokes;
      let holeWinner='H';
      if(usaStrokes<eurStrokes){rcm.scoreUSA++;holeWinner='USA';}
      else if(eurStrokes<usaStrokes){rcm.scoreEurope++;holeWinner='Europe';}
      rcm.holeLog.push({hole:rcm.holeNum,usaStrokes,eurStrokes,winner:holeWinner});
      const newHolesLeft=rcm.totalHoles-rcm.holeNum;
      const holeDiff=rcm.scoreUSA-rcm.scoreEurope;
      if(Math.abs(holeDiff)>newHolesLeft||rcm.holeNum>=rcm.totalHoles){
        rcm.done=true;rcm.winner=holeDiff>0?'USA':holeDiff<0?'Europe':'H';
      } else {
        rcm.holeNum++;
        const hd={hole:rcm.holeNum,par:4,yards:430};
        rcm.hsUSA=newHoleState(hd);rcm.hsEurope=newHoleState(hd);rcm.turn='USA';
      }
      renderRCMatchPlayPanel(viewEl);
    });
  }
}

function scorecardHTML(def,scoreArr,currentHoleIdx){
  const front=def.holes.slice(0,9),back=def.holes.slice(9,18);
  const scTd="padding:5px 3px;min-width:26px;border:1px solid var(--line);";
  const scTdLabel="padding:5px 6px;font-size:10px;text-transform:uppercase;color:var(--ink-500);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.04em;white-space:nowrap;";
  function rowFor(holes,offset){
    return`<tr><td style="${scTdLabel}">Hole</td>${holes.map((h,i)=>`<td style="${scTd}${offset+i===currentHoleIdx?'background:rgba(217,161,59,0.18);':''}">${h.hole}</td>`).join('')}<td style="${scTdLabel}">${offset===0?'OUT':'IN'}</td></tr>
    <tr><td style="${scTdLabel}">Par</td>${holes.map((h,i)=>`<td style="${scTd}color:var(--ink-500);${offset+i===currentHoleIdx?'background:rgba(217,161,59,0.1);':''}">${h.par}</td>`).join('')}<td style="${scTdLabel}">${holes.reduce((s,h)=>s+h.par,0)}</td></tr>
    <tr><td style="${scTdLabel}">Score</td>${holes.map((h,i)=>{
      const idx=offset+i;const v=scoreArr[idx];
      if(v==null)return`<td style="${scTd}${idx===currentHoleIdx?'background:rgba(217,161,59,0.18);font-weight:700;':''}">${idx===currentHoleIdx?'•':'-'}</td>`;
      const d=v-h.par;const shape=d<=-2?'eagle':d===-1?'birdie':d===0?'par':d===1?'bogey':'big';
      const styles={eagle:'background:var(--turf-700);color:#fff;border-radius:50%;',birdie:'border:1.5px solid var(--turf-700);border-radius:50%;color:var(--turf-700);',par:'',bogey:'border:1.5px solid var(--ink-500);',big:'background:var(--flag-red);color:#fff;'};
      return`<td style="${scTd}"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;font-weight:700;${styles[shape]}">${v}</span></td>`;
    }).join('')}<td style="${scTdLabel}" class="num">${holes.reduce((s,h,i)=>s+(scoreArr[offset+i]||0),0)||''}</td></tr>`;
  }
  return`<div style="overflow-x:auto;" class="scrollbar-thin">
    <table style="border-collapse:collapse;width:100%;font-size:12px;text-align:center;"><tbody>${rowFor(front,0)}</tbody></table>
    <table style="border-collapse:collapse;width:100%;font-size:12px;text-align:center;margin-top:6px;"><tbody>${rowFor(back,9)}</tbody></table>
  </div>`;
}

            </div>
            <div style="font-family:'Oswald',sans-serif;font-size:17px;color:var(--turf-900);line-height:1.2;margin-bottom:7px;">${escapeHTML(item.headline)}</div>
            <div style="font-size:13px;color:var(--ink-700);line-height:1.55;">${parseBold(escapeHTML(item.body))}</div>
            ${item.clutchItems&&item.clutchItems.length?`
            <div style="margin-top:12px;display:flex;flex-direction:column;gap:5px;">
              ${item.clutchItems.map(c=>`<div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-700);background:var(--sand-200);padding:5px 10px;border-radius:3px;">
                <span>${c.icon}</span><span>${escapeHTML(c.text)}</span>
              </div>`).join('')}
            </div>`:''}
          </div>
        </div>
      </div>
    </div>`;
  }

  // Filter controls
  const filterTypes=['all','major','firstwin','hotstreak','awards','playoff','drought'];
  const filterLabels={all:'All',major:'Majors',firstwin:'First Wins',hotstreak:'Hot Streaks',awards:'Awards',playoff:'Playoffs',drought:'Near Misses'};
  const activeFilter=renderNews._filter||'all';

  const filtered=activeFilter==='all'?news:news.filter(n=>n.type===activeFilter);

  el.innerHTML=`<div class="section-head">
    <div><span class="eyebrow">Your Tour · Season ${STATE.seasonNumber}</span><h2>Newsroom</h2></div>
    <span style="font-size:12px;color:var(--ink-500);">${news.length} stories</span>
  </div>
  ${awardCardHTML()}
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;">
    ${filterTypes.map(f=>`<button class="news-filter-btn" data-filter="${f}" style="padding:5px 12px;border-radius:14px;border:1px solid ${activeFilter===f?'var(--turf-800)':'var(--line)'};background:${activeFilter===f?'var(--turf-800)':'#fff'};color:${activeFilter===f?'#fff':'var(--ink-700)'};font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.04em;cursor:pointer;">${filterLabels[f]}</button>`).join('')}
  </div>
  ${filtered.length===0?`<div class="empty-state"><h3>${news.length===0?'No news yet':'Nothing in this category'}</h3><p>${news.length===0?'Stories appear automatically after each tournament finishes. Play some events to start the feed.':'Try a different filter.'}</p></div>`:`
  <div>${filtered.map(newsItemHTML).join('')}</div>`}`;

  el.querySelectorAll('.news-filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{renderNews._filter=btn.dataset.filter;renderNews();});
  });
  el.querySelectorAll('[data-view-profile]').forEach(b=>b.addEventListener('click',()=>openProfileModal(b.dataset.viewProfile)));
}

/* ===== NAV ===== */
const VIEWS=['schedule','roster','standings','rydercup','news','tournament'];
function switchView(view){
  VIEWS.forEach(v=>{document.getElementById('view-'+v).classList.toggle('active',v===view);});
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));
  renderCurrentView(view);
}
function renderCurrentView(view){
  if(view==='schedule')renderSchedule();
  else if(view==='roster')renderRoster();
  else if(view==='standings')renderStandings();
  else if(view==='rydercup')renderRyderCupTab();
  else if(view==='news')renderNews();
  else if(view==='tournament')renderTournament();
}
function refreshTopbar(){
  document.getElementById('season-label-top').textContent=`Season ${STATE.seasonNumber} · ${STATE.players.length} players`;
  document.getElementById('tab-tournament').style.display=(STATE.activeTournamentId||STATE.rydercup?.phase==='in_progress')?'':'none';
  const rows=STATE.players.map(p=>({name:p.name,pts:(STATE.standings[p.id]||{}).points||0})).sort((a,b)=>b.pts-a.pts);
  const wrRows=getWorldRankings();
  const wrNo1=wrRows.length&&wrRows[0].pts>0?wrRows[0].player:null;
  const tourLeader=rows.length&&rows[0].pts>0?`${rows[0].name} · ${rows[0].pts.toLocaleString()} pts`:'No points yet';
  document.getElementById('points-leader-pill').textContent=wrNo1?`🌍 ${wrNo1.name} WR#1`:tourLeader;
}
function wireNav(){
  document.querySelectorAll('.nav-tab').forEach(tab=>tab.addEventListener('click',()=>switchView(tab.dataset.view)));
  document.getElementById('restart-season-btn').addEventListener('click',openRestartConfirm);
}
function openRestartConfirm(){
  const root=document.getElementById('modal-root');
  root.innerHTML=`<div class="modal-overlay" id="restart-overlay">
    <div class="modal" style="max-width:460px;border-top-color:var(--flag-red);"><div class="modal-pad">
      <h3>Restart From Scratch?</h3>
      <div class="modal-sub">This wipes everything — roster, career stats, standings, and Ryder Cup history — and starts a brand new tour at Season 1. If you just want to move on to next season and keep your players, use <b>Start Next Season</b> from the Schedule tab instead.</div>
      <div class="modal-actions"><button class="btn ghost" id="restart-cancel">Cancel</button><button class="btn danger" id="restart-confirm">Wipe & Restart</button></div>
    </div></div>
  </div>`;
  document.getElementById('restart-cancel').addEventListener('click',closeModal);
  document.getElementById('restart-overlay').addEventListener('click',e=>{if(e.target.id==='restart-overlay')closeModal();});
  document.getElementById('restart-confirm').addEventListener('click',()=>{restartSeason();closeModal();refreshTopbar();switchView('schedule');showToast(`Fresh tour — Season 1.`);});
}
async function init(){
  document.getElementById('view-schedule').classList.add('active');
  document.getElementById('view-schedule').innerHTML=`<div class="empty-state"><h3>Loading your tour…</h3><p>Connecting to the save server.</p></div>`;
  STATE=await loadStateRemote();
  ensureScheduleForSeason();wireNav();refreshTopbar();switchView('schedule');
  if(USING_MEMORY_FALLBACK)showToast("Storage blocked in this browser — progress won't survive a reload.",true);
  else if(USING_LOCAL_FALLBACK)showToast("Couldn't reach the save server — playing locally in this browser instead.",true);
}
document.addEventListener('DOMContentLoaded',init);
})();
</script>
</body>
</html>
