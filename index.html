/* ===== PLAY PANEL ===== */
function activePlayersForRound(inst,roundIdx){
  return inst.field.filter(pid=>{
    if(inst.cutPlayers&&!inst.cutPlayers.has(pid)&&roundIdx>=inst.cutAppliedAfterRound)return false;
    return inst.rounds[roundIdx].scores[pid].some(v=>v==null);
  });
}
function nextOpenHoleIdx(inst,roundIdx,pid){const arr=inst.rounds[roundIdx].scores[pid];for(let i=0;i<18;i++)if(arr[i]==null)return i;return -1;}

function renderPlayPanel(defId,roundIdx,lb){
  const inst=getInstance(defId);const def=getDef(defId);const panel=document.getElementById('play-panel');
  const pending=activePlayersForRound(inst,roundIdx);
  if(pending.length===0){
    panel.innerHTML=`<div class="card" style="padding:24px;text-align:center;"><h3>Round ${roundIdx+1} complete</h3><p style="font-size:13px;color:var(--ink-500);margin-top:6px;">All players done. Move to the next round.</p><button class="btn amber" id="advance-round-btn" style="margin-top:14px;">Continue to Round ${roundIdx+2}</button></div>`;
    document.getElementById('advance-round-btn')?.addEventListener('click',renderTournament);return;
  }
  if(!pending.includes(PLAY_UI.selectedPlayerId)){PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;}

  // Build bulk simulate controls
  const currentHoleIdx=PLAY_UI.selectedPlayerId?PLAY_UI.holeIdx:null;
  panel.innerHTML=`<div class="card" style="padding:16px;margin-bottom:14px;">
    <div class="eyebrow" style="margin-bottom:8px;">Round ${roundIdx+1} · ${pending.length} players still on course</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;">
      ${pending.map(pid=>{
        const p=getPlayer(pid);const holeIdx=nextOpenHoleIdx(inst,roundIdx,pid);const active=pid===PLAY_UI.selectedPlayerId;
        return`<button class="player-chip" data-select-player="${pid}" style="display:flex;align-items:center;gap:6px;padding:6px 10px 6px 6px;border-radius:20px;border:1px solid ${active?'var(--turf-700)':'var(--line)'};background:${active?'var(--turf-700)':'#fff'};color:${active?'#fff':'var(--ink-900)'};font-size:12px;transition:background .15s;">
          <span style="width:20px;height:20px;border-radius:50%;background:${avatarColor(p.name)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;font-family:'Barlow Condensed',sans-serif;flex-shrink:0;">${initialsOf(p.name)}</span>
          ${escapeHTML(p.name)} <span style="opacity:0.7;">· H${holeIdx+1}</span>
        </button>`;}).join('')}
    </div>
    <div style="border-top:1px solid var(--line);padding-top:10px;display:flex;flex-wrap:wrap;gap:8px;align-items:center;">
      <span style="font-size:11px;font-family:'Barlow Condensed',sans-serif;font-weight:700;text-transform:uppercase;color:var(--ink-500);">Simulate:</span>
      <button class="btn ghost btn-sm" id="sim-all-hole-btn" title="Simulate current hole for all pending players">All players · next hole</button>
      <button class="btn ghost btn-sm" id="sim-selected-hole-btn" ${!PLAY_UI.selectedPlayerId?'disabled':''} title="Simulate next hole for selected player only">Selected player · hole</button>
      <button class="btn ghost btn-sm" id="sim-all-round-btn" style="border-color:var(--board-amber);color:#7a5a0a;">All players · full round</button>
      <button class="btn ghost btn-sm" id="sim-selected-btn" ${!PLAY_UI.selectedPlayerId?'disabled':''} style="border-color:var(--board-amber);color:#7a5a0a;">Selected · full round</button>
    </div>
  </div>
  <div id="hole-control"></div>`;

  panel.querySelectorAll('[data-select-player]').forEach(btn=>{
    btn.addEventListener('click',()=>selectPlayerForPlay(defId,roundIdx,btn.dataset.selectPlayer));
  });

  // Bulk sim: next hole for all pending players
  document.getElementById('sim-all-hole-btn').addEventListener('click',()=>{
    const pendingNow=activePlayersForRound(inst,roundIdx);
    // find the next unplayed hole — use the minimum open hole across all pending players
    const holes=pendingNow.map(pid=>nextOpenHoleIdx(inst,roundIdx,pid)).filter(h=>h>=0);
    const minHole=Math.min(...holes);
    const toSim=pendingNow.filter(pid=>nextOpenHoleIdx(inst,roundIdx,pid)===minHole);
    simulateHoleForPlayers(defId,roundIdx,minHole,toSim);
    showToast(`Simulated hole ${minHole+1} for ${toSim.length} players.`);
    if(PLAY_UI.selectedPlayerId&&inst.rounds[roundIdx].scores[PLAY_UI.selectedPlayerId][PLAY_UI.holeIdx]!=null){
      const next=nextOpenHoleIdx(inst,roundIdx,PLAY_UI.selectedPlayerId);
      if(next===-1){PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;}
      else{PLAY_UI.holeIdx=next;PLAY_UI.holeState=newHoleState(def.holes[next]);}
    }
    renderTournament();
  });

  // Sim: next hole for selected player only
  document.getElementById('sim-selected-hole-btn').addEventListener('click',()=>{
    if(!PLAY_UI.selectedPlayerId)return;
    const pid=PLAY_UI.selectedPlayerId;const hIdx=nextOpenHoleIdx(inst,roundIdx,pid);
    if(hIdx===-1)return;
    simulateHoleForPlayers(defId,roundIdx,hIdx,[pid]);
    const next=nextOpenHoleIdx(inst,roundIdx,pid);
    if(next===-1){PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;}
    else{PLAY_UI.holeIdx=next;PLAY_UI.holeState=newHoleState(def.holes[next]);}
    showToast(`Simulated hole ${hIdx+1} for ${getPlayer(pid).name}.`);
    renderTournament();
  });

  // Sim: full round for all
  document.getElementById('sim-all-round-btn').addEventListener('click',()=>{
    const pendingNow=activePlayersForRound(inst,roundIdx);
    simulateRoundForPlayers(defId,roundIdx,pendingNow);
    PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;
    showToast(`Simulated full round ${roundIdx+1} for all ${pendingNow.length} players.`);
    renderTournament();
  });

  // Sim: full round for selected
  document.getElementById('sim-selected-btn').addEventListener('click',()=>{
    if(!PLAY_UI.selectedPlayerId)return;
    const pid=PLAY_UI.selectedPlayerId;
    simulateRoundForPlayers(defId,roundIdx,[pid]);
    showToast(`Simulated full round for ${getPlayer(pid).name}.`);
    PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;
    renderTournament();
  });

  if(PLAY_UI.selectedPlayerId)renderHoleControl(defId,roundIdx,PLAY_UI.selectedPlayerId);
  else document.getElementById('hole-control').innerHTML=`<div class="empty-state" style="padding:30px 20px;"><p>Pick a player above to step up to the tee — or use simulate buttons for quick results.</p></div>`;
}

function selectPlayerForPlay(defId,roundIdx,pid){
  const inst=getInstance(defId);const holeIdx=nextOpenHoleIdx(inst,roundIdx,pid);
  PLAY_UI.selectedPlayerId=pid;PLAY_UI.holeIdx=holeIdx;
  PLAY_UI.holeState=newHoleState(getDef(defId).holes[holeIdx]);
  renderTournament();
}

function renderHoleControl(defId,roundIdx,pid){
  const inst=getInstance(defId);const def=getDef(defId);const player=getPlayer(pid);
  const holeIdx=PLAY_UI.holeIdx;const holeDef=def.holes[holeIdx];const hs=PLAY_UI.holeState;
  const wrap=document.getElementById('hole-control');
  const scoreSoFar=inst.rounds[roundIdx].scores[pid];
  const roundParSoFar=def.holes.slice(0,holeIdx).reduce((s,h)=>s+h.par,0);
  const strokesSoFar=scoreSoFar.slice(0,holeIdx).reduce((s,v)=>s+(v||0),0);
  const toParSoFar=strokesSoFar-roundParSoFar;
  wrap.innerHTML=`<div class="card" style="padding:18px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;">
      <div>
        <div class="eyebrow">${escapeHTML(player.name)} · ${lieLabel(hs.lie)!=='Holed'?lieLabel(hs.lie)+' · ':''}Shot ${hs.strokes+1}</div>
        <h3 style="font-size:20px;">Hole ${holeIdx+1} · Par ${holeDef.par} · ${holeDef.yards}y</h3>
      </div>
      <div style="text-align:right;">
        <div class="eyebrow">Thru ${holeIdx}</div>
        <div class="num" style="font-size:20px;color:${toParSoFar<0?'var(--flag-red)':'var(--ink-900)'};">${holeIdx===0?'—':(toParSoFar===0?'E':toParSoFar>0?'+'+toParSoFar:toParSoFar)}</div>
      </div>
    </div>
    <div style="margin-top:16px;display:flex;align-items:center;gap:18px;background:var(--sand-200);border-radius:4px;padding:14px 18px;">
      <div style="flex:1;"><div class="eyebrow" style="margin-bottom:3px;">Lie</div><div style="font-family:'Oswald',sans-serif;font-size:17px;color:${lieColor(hs.lie)};">${lieLabel(hs.lie)}</div></div>
      <div style="flex:1;text-align:center;"><div class="eyebrow" style="margin-bottom:3px;">${hs.lie==='green'?'To Hole':'To Pin'}</div><div class="num" style="font-size:22px;">${hs.lie==='green'?(hs.puttDistanceFt+' ft'):(Math.round(hs.remaining)+' y')}</div></div>
      <div style="flex:1;text-align:right;"><div class="eyebrow" style="margin-bottom:3px;">Strokes</div><div class="num" style="font-size:22px;">${hs.strokes}</div></div>
    </div>
    <div id="shot-log" style="margin-top:14px;max-height:130px;overflow-y:auto;display:flex;flex-direction:column-reverse;gap:6px;" class="scrollbar-thin">
      ${hs.log.slice().reverse().map((l,i)=>`<div style="font-size:13px;padding:7px 10px;background:${i===0?'rgba(63,122,77,0.1)':'transparent'};border-radius:3px;border-left:3px solid ${i===0?'var(--turf-600)':'var(--line)'};">${escapeHTML(l)}</div>`).join('')}
    </div>
    <div style="margin-top:16px;display:flex;gap:10px;">
      <button class="btn amber" id="hit-shot-btn" style="flex:1;padding:14px;font-size:15px;" ${hs.holedOut?'disabled':''}>
        ${hs.strokes===0?(hs.lie==='tee'?'Tee Off':'Hit Shot'):'Hit Next Shot'}
      </button>
    </div>
    ${hs.holedOut?`<button class="btn" id="confirm-hole-btn" style="width:100%;margin-top:10px;padding:13px;">Confirm ${hs.strokes} · ${holeResultWord(hs.strokes,holeDef.par)} — Next</button>`:''}
  </div>
  <div class="card" style="margin-top:14px;padding:14px;">
    <div class="eyebrow" style="margin-bottom:8px;">${escapeHTML(player.name)}'s Scorecard · Round ${roundIdx+1}</div>
    ${scorecardHTML(def,scoreSoFar,holeIdx)}
  </div>`;
  document.getElementById('hit-shot-btn')?.addEventListener('click',()=>{playShot(hs,effectiveAttrs(player));renderHoleControl(defId,roundIdx,pid);});
  document.getElementById('confirm-hole-btn')?.addEventListener('click',()=>{recordHoleScore(defId,roundIdx,pid,holeIdx,hs.strokes);advanceAfterHole(defId,roundIdx,pid);});
}

function holeResultWord(strokes,par){const d=strokes-par;if(d<=-3)return'Albatross+';if(d===-2)return'Eagle';if(d===-1)return'Birdie';if(d===0)return'Par';if(d===1)return'Bogey';if(d===2)return'Double Bogey';return`+${d}`;}
function advanceAfterHole(defId,roundIdx,pid){
  const inst=getInstance(defId);const next=nextOpenHoleIdx(inst,roundIdx,pid);
  if(next===-1){PLAY_UI.selectedPlayerId=null;PLAY_UI.holeState=null;showToast(`${getPlayer(pid).name} signs for their round.`);}
  else{PLAY_UI.holeIdx=next;PLAY_UI.holeState=newHoleState(getDef(defId).holes[next]);}
  renderTournament();
}

/* ===== SUDDEN DEATH PLAYOFF HOLE VIEW ===== */
let PH_PLAY={pid:null,holeState:null}; // which tied player is currently hitting

  const ph=inst.playoffHole;
  const tiedPlayers=ph.remainingPids.map(pid=>getPlayer(pid)).filter(Boolean);
  const holeNum=ph.currentHole;
  const holeDef={hole:`P${holeNum}`,par:4,yards:430};

  // Find who still needs to play this hole
  const needToPlay=ph.remainingPids.filter(pid=>(ph.scores[pid]||[]).length<holeNum);
  const donePlaying=ph.remainingPids.filter(pid=>(ph.scores[pid]||[]).length>=holeNum);

  el.innerHTML=`<div class="section-head">
    <div><span class="eyebrow" style="color:var(--flag-red);">⚡ SUDDEN DEATH PLAYOFF</span><h2>${def.name}</h2></div>
    <div class="eyebrow">Par 4 · 430 yards · Playoff Hole ${holeNum}</div>
  </div>
  <div class="play-grid-2col" style="display:grid;grid-template-columns:1.15fr 1fr;gap:20px;align-items:flex-start;">

    </div>
    <div>
      <div class="card" style="padding:0;overflow:hidden;">
        <div style="background:var(--flag-red);color:#fff;padding:10px 16px;font-family:\'Oswald\',sans-serif;font-size:13px;letter-spacing:0.05em;">PLAYOFF STANDINGS · HOLE ${holeNum}</div>
        <div style="padding:12px;">
          ${tiedPlayers.map(p=>{
            const hScores=ph.scores[p.id]||[];
            const played=hScores.length>=holeNum;
            const thisScore=played?hScores[holeNum-1]:null;
            const isActive=PH_PLAY.pid===p.id;
            return`<div style="display:flex;align-items:center;gap:10px;padding:8px 6px;border-bottom:1px solid var(--line);${isActive?'background:rgba(217,161,59,0.12);':''}">
              <span style="width:28px;height:28px;border-radius:50%;background:${avatarColor(p.name)};color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;font-family:\'Barlow Condensed\',sans-serif;">${initialsOf(p.name)}</span>
              <span style="flex:1;font-size:13px;">${escapeHTML(p.name)}</span>

          }).join('')}

        </div>
      </div>
    </div>

  if(PH_PLAY.pid&&PH_PLAY.holeState){

  }

  el.querySelectorAll('[data-ph-select]').forEach(btn=>{

    });
  });

    btn.addEventListener('click',()=>{
      const pid=btn.dataset.phSimulate;
      const p=getPlayer(pid);if(!p)return;
      const hs=simulateFullHole(holeDef,effectiveAttrs(p));
      if(!inst.playoffHole.scores[pid])inst.playoffHole.scores[pid]=[];
      while(inst.playoffHole.scores[pid].length<holeNum-1)inst.playoffHole.scores[pid].push(4);
      inst.playoffHole.scores[pid][holeNum-1]=hs.strokes;
      if(PH_PLAY.pid===pid){PH_PLAY.pid=null;PH_PLAY.holeState=null;}
      saveState();showToast(`${p.name} scores ${hs.strokes} on the playoff hole.`);
      renderPlayoffHoleView(el,defId);
    });
  });

  document.getElementById('ph-resolve-btn')?.addEventListener('click',()=>{
    const resolved=resolvePlayoffHoleIfComplete(defId);
    PH_PLAY.pid=null;PH_PLAY.holeState=null;

      switchView('tournament');
    } else {
      showToast(`Still tied! Onto playoff hole ${inst.playoffHole.currentHole}.`);
      renderPlayoffHoleView(el,defId);
    }
  });
}

let RC_UI={matchupId:null,matchIdx:null,isFinal:false,matchHoleState:null};

function renderRyderCupView(el){
  const rc=STATE.rydercup;if(!rc){el.innerHTML=`<div class="empty-state"><h3>No Ryder Cup active</h3></div>`;return;}
  const def=getDef(rc.defId);

  if(rc.phase==='complete'){
    renderRyderCupComplete(el,rc,def);return;
  }

  if(rc.phase==='final'&&rc.final){
    renderRyderCupFinal(el,rc,def);return;
  }

  // Group stage
  renderRyderCupGroup(el,rc,def);
}

function capOf(capId){return STATE.fantasy.captains.find(c=>c.id===capId);}
function teamOf(capId){return STATE.fantasy.teams[capId];}

function rcMatchStatusLabel(m){
  if(m.status==='pending')return'<span style="font-size:10px;font-family:\'Barlow Condensed\',sans-serif;background:rgba(0,0,0,0.06);padding:2px 7px;border-radius:3px;color:var(--ink-500);">NOT STARTED</span>';

    return`<span style="font-size:10px;font-family:\'Barlow Condensed\',sans-serif;background:rgba(0,0,0,0.06);padding:2px 7px;border-radius:3px;color:${col};font-weight:700;">${m.result==='H'?'HALVED':m.result==='A'?'WIN A':'WIN B'}</span>`;

/* ===== RYDER CUP MATCH PLAY MODAL ===== */
let RCM={muIdx:null,miIdx:null,isFinal:false,
  pA:[],pB:[],matchType:null,totalHoles:9,
  holeNum:1,matchScoreA:0,matchScoreB:0,
  // Per-hole states: foursomes=1 hs each side, fourball=2 each, singles=1 each
  hsA:null,hsB:null,hsA2:null,hsB2:null,
  phase:'A',  // whose turn: A|A2|B|B2 (fourball) or A|B (foursomes/singles)
  holesPlayed:[],done:false,winner:null,
  alternateShooterA:true, // foursomes: true=pA[0] hits, false=pA[1]
  alternateShooterB:true,
};

function openRCMatchPlayModal(viewEl,muIdx,miIdx,isFinal){
  const rc=STATE.rydercup;
  let mu,m,teamAId,teamBId;
  if(isFinal){m=rc.final.matches[miIdx];teamAId=rc.final.teamA;teamBId=rc.final.teamB;}
  else{mu=rc.groupMatchups[muIdx];m=mu.matches[miIdx];teamAId=mu.teamA;teamBId=mu.teamB;}

  const teamA=teamOf(teamAId),teamB=teamOf(teamBId);
  const usedA=isFinal
    ?new Set(rc.final.matches.filter((_,i)=>i<miIdx).flatMap(x=>x.lineupA))
    :new Set((mu.matches||[]).filter((_,i)=>i<miIdx).flatMap(x=>x.lineupA));
  const usedB=isFinal
    ?new Set(rc.final.matches.filter((_,i)=>i<miIdx).flatMap(x=>x.lineupB))
    :new Set((mu.matches||[]).filter((_,i)=>i<miIdx).flatMap(x=>x.lineupB));
  const availA=(teamA?.playerIds||[]).filter(p=>!usedA.has(p));
  const availB=(teamB?.playerIds||[]).filter(p=>!usedB.has(p));
  const need=m.type==='singles'?1:2;
  m.lineupA=availA.slice(0,need);m.lineupB=availB.slice(0,need);

  RCM={muIdx,miIdx,isFinal,pA:m.lineupA,pB:m.lineupB,matchType:m.type,
    totalHoles:isFinal?18:9,holeNum:1,matchScoreA:0,matchScoreB:0,
    hsA:newHoleState({hole:1,par:4,yards:430}),
    hsB:newHoleState({hole:1,par:4,yards:430}),
    hsA2:m.type==='fourball'?newHoleState({hole:1,par:4,yards:430}):null,
    hsB2:m.type==='fourball'?newHoleState({hole:1,par:4,yards:430}):null,
    phase:'A',holesPlayed:[],done:false,winner:null,
    alternateShooterA:true,alternateShooterB:true,
  };
  m.status='in_progress';saveState();
  renderRCMatchModal(viewEl);
}

  else{mu=rc.groupMatchups[rcm.muIdx];m=mu.matches[rcm.miIdx];teamAId=mu.teamA;teamBId=mu.teamB;}

    activePlayerA=getPlayer(rcm.pA[0]);activePlayerB=getPlayer(rcm.pB[0]);

    ${rcm.matchType==='fourball'?playerCard(getPlayer(rcm.pA[1]),rcm.pA[1]?effectiveAttrs(getPlayer(rcm.pA[1])):{},rcm.hsA2,'A2',`Team ${cA?.name} · Playing`):''}

    if(rcm.matchType==='foursomes'){

function rcTryResolveHole(viewEl,cA,cB){
  const rcm=RCM;
  // Check if all active players have confirmed
  const allConfirmed=(()=>{
    if(rcm.matchType==='foursomes')return rcm.hsA?._confirmed&&rcm.hsB?._confirmed;
    if(rcm.matchType==='fourball')return rcm.hsA?._confirmed&&rcm.hsA2?._confirmed&&rcm.hsB?._confirmed&&rcm.hsB2?._confirmed;
    return rcm.hsA?._confirmed&&rcm.hsB?._confirmed;
  })();
  if(!allConfirmed){renderRCMatchModal(viewEl);return;}

  // Calculate hole result
  let scoreA,scoreB;
  if(rcm.matchType==='fourball'){
    scoreA=Math.min(rcm.hsA?.strokes||99,rcm.hsA2?.strokes||99);
    scoreB=Math.min(rcm.hsB?.strokes||99,rcm.hsB2?.strokes||99);
  } else {
    scoreA=rcm.hsA?.strokes||99;scoreB=rcm.hsB?.strokes||99;
  }

  let holeWinner=null;
  if(scoreA<scoreB){rcm.matchScoreA++;holeWinner='A';}
  else if(scoreB<scoreA){rcm.matchScoreB++;holeWinner='B';}
  rcm.holesPlayed.push({holeNum:rcm.holeNum,winner:holeWinner,scoreA,scoreB});
  showToast(`Hole ${rcm.holeNum}: ${scoreA} vs ${scoreB} — ${holeWinner?('Team '+(holeWinner==='A'?cA?.name:cB?.name)+' wins'):'Halved'}`);
  rcAdvanceRCHole(viewEl);
}

function rcAdvanceRCHole(viewEl){
  const rcm=RCM;
  const holesLeft=rcm.totalHoles-rcm.holeNum;
  const diff=rcm.matchScoreA-rcm.matchScoreB;
  // Match over if someone leads by more than holes left
  if(Math.abs(diff)>holesLeft||rcm.holeNum>=rcm.totalHoles){
    rcm.done=true;
    rcm.winner=diff>0?'A':diff<0?'B':'H';
    renderRCMatchModal(viewEl);return;
  }
  rcm.holeNum++;
  const holeDef={hole:rcm.holeNum,par:4,yards:430};
  rcm.hsA=newHoleState(holeDef);rcm.hsB=newHoleState(holeDef);
  if(rcm.matchType==='fourball'){rcm.hsA2=newHoleState(holeDef);rcm.hsB2=newHoleState(holeDef);}
  // Foursomes: swap who starts (the person who finished last hole putts out then opponent starts)
  rcm.alternateShooterA=true;rcm.alternateShooterB=true;
  renderRCMatchModal(viewEl);
}
const scTd="padding:5px 3px;min-width:26px;border:1px solid var(--line);";
const scTdLabel="padding:5px 6px;font-size:10px;text-transform:uppercase;color:var(--ink-500);font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.04em;white-space:nowrap;";

function scorecardHTML(def,scoreArr,currentHoleIdx){
  const front=def.holes.slice(0,9),back=def.holes.slice(9,18);
  function rowFor(holes,offset){
    return`<tr><td style="${scTdLabel}">Hole</td>${holes.map((h,i)=>`<td style="${scTd}${offset+i===currentHoleIdx?'background:rgba(217,161,59,0.18);':''}">${h.hole}</td>`).join('')}<td style="${scTdLabel}">${offset===0?'OUT':'IN'}</td></tr>
    <tr><td style="${scTdLabel}">Par</td>${holes.map((h,i)=>`<td style="${scTd}color:var(--ink-500);${offset+i===currentHoleIdx?'background:rgba(217,161,59,0.1);':''}">${h.par}</td>`).join('')}<td style="${scTdLabel}">${holes.reduce((s,h)=>s+h.par,0)}</td></tr>
    <tr><td style="${scTdLabel}">Score</td>${holes.map((h,i)=>{
      const idx=offset+i;const v=scoreArr[idx];
      if(v==null)return`<td style="${scTd}${idx===currentHoleIdx?'background:rgba(217,161,59,0.18);font-weight:700;':''}">${idx===currentHoleIdx?'•':'-'}</td>`;
      const d=v-h.par;const shape=d<=-2?'eagle':d===-1?'birdie':d===0?'par':d===1?'bogey':'big';
      const styles={eagle:'background:var(--turf-700);color:#fff;border-radius:50%;',birdie:'border:1.5px solid var(--turf-700);border-radius:50%;color:var(--turf-700);',par:'',bogey:'border:1.5px solid var(--ink-500);',big:'background:var(--flag-red);color:#fff;'};
      return`<td style="${scTd}"><span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;font-weight:700;${styles[shape]}">${v}</span></td>`;
    }).join('')}<td style="${scTdLabel}" class="num">${holes.reduce((s,h,i)=>s+(scoreArr[offset+i]||0),0)||''}</td></tr>`;
  }
  return`<div style="overflow-x:auto;" class="scrollbar-thin">
    <table style="border-collapse:collapse;width:100%;font-size:12px;text-align:center;"><tbody>${rowFor(front,0)}</tbody></table>
    <table style="border-collapse:collapse;width:100%;font-size:12px;text-align:center;margin-top:6px;"><tbody>${rowFor(back,9)}</tbody></table>
  </div>`;
}

  ${awardCardHTML()}
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;">
    ${filterTypes.map(f=>`<button class="news-filter-btn" data-filter="${f}" style="padding:5px 12px;border-radius:14px;border:1px solid ${activeFilter===f?'var(--turf-800)':'var(--line)'};background:${activeFilter===f?'var(--turf-800)':'#fff'};color:${activeFilter===f?'#fff':'var(--ink-700)'};font-size:12px;font-family:'Barlow Condensed',sans-serif;font-weight:700;letter-spacing:0.04em;cursor:pointer;">${filterLabels[f]}</button>`).join('')}
  </div>
  ${filtered.length===0?`<div class="empty-state"><h3>${news.length===0?'No news yet':'Nothing in this category'}</h3><p>${news.length===0?'Stories appear automatically after each tournament finishes. Play some events to start the feed.':'Try a different filter.'}</p></div>`:`
  <div>${filtered.map(newsItemHTML).join('')}</div>`}`;

  el.querySelectorAll('.news-filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{renderNews._filter=btn.dataset.filter;renderNews();});
  });
  el.querySelectorAll('[data-view-profile]').forEach(b=>b.addEventListener('click',()=>openProfileModal(b.dataset.viewProfile)));
}

/* ===== NAV ===== */
const VIEWS=['schedule','roster','standings','fantasy','news','tournament'];
function switchView(view){
  VIEWS.forEach(v=>{document.getElementById('view-'+v).classList.toggle('active',v===view);});
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.toggle('active',t.dataset.view===view));
  renderCurrentView(view);
}
function renderCurrentView(view){
  if(view==='schedule')renderSchedule();
  else if(view==='roster')renderRoster();
  else if(view==='standings')renderStandings();
  else if(view==='fantasy')renderFantasy();
  else if(view==='news')renderNews();
  else if(view==='tournament')renderTournament();
}
function refreshTopbar(){
  document.getElementById('season-label-top').textContent=`Season ${STATE.seasonNumber} · ${STATE.players.length} players`;
  document.getElementById('tab-tournament').style.display=(STATE.activeTournamentId||STATE.rydercup?.phase==='group'||STATE.rydercup?.phase==='final')?'':'none';
  const rows=STATE.players.map(p=>({name:p.name,pts:(STATE.standings[p.id]||{}).points||0})).sort((a,b)=>b.pts-a.pts);
  const wrRows=getWorldRankings();
  const wrNo1=wrRows.length&&wrRows[0].pts>0?wrRows[0].player:null;
  const tourLeader=rows.length&&rows[0].pts>0?`${rows[0].name} · ${rows[0].pts.toLocaleString()} pts`:'No points yet';
  document.getElementById('points-leader-pill').textContent=wrNo1?`🌍 ${wrNo1.name} WR#1`:tourLeader;
}
function wireNav(){
  document.querySelectorAll('.nav-tab').forEach(tab=>tab.addEventListener('click',()=>switchView(tab.dataset.view)));
  document.getElementById('restart-season-btn').addEventListener('click',openRestartConfirm);
}
function openRestartConfirm(){
  const root=document.getElementById('modal-root');
  root.innerHTML=`<div class="modal-overlay" id="restart-overlay">
    <div class="modal" style="max-width:460px;border-top-color:var(--flag-red);"><div class="modal-pad">
      <h3>Restart From Scratch?</h3>
      <div class="modal-sub">This wipes everything — roster, career stats, standings, and fantasy teams — and starts a brand new tour at Season 1. If you just want to move on to next season and keep your players, use <b>Start Next Season</b> from the Schedule tab instead.</div>
      <div class="modal-actions"><button class="btn ghost" id="restart-cancel">Cancel</button><button class="btn danger" id="restart-confirm">Wipe & Restart</button></div>
    </div></div>
  </div>`;
  document.getElementById('restart-cancel').addEventListener('click',closeModal);
  document.getElementById('restart-overlay').addEventListener('click',e=>{if(e.target.id==='restart-overlay')closeModal();});
  document.getElementById('restart-confirm').addEventListener('click',()=>{restartSeason();closeModal();refreshTopbar();switchView('schedule');showToast(`Fresh tour — Season 1.`);});
}
async function init(){
  document.getElementById('view-schedule').classList.add('active');
  document.getElementById('view-schedule').innerHTML=`<div class="empty-state"><h3>Loading your tour…</h3><p>Connecting to the save server.</p></div>`;
  STATE=await loadStateRemote();
  ensureScheduleForSeason();wireNav();refreshTopbar();switchView('schedule');
  if(USING_MEMORY_FALLBACK)showToast("Storage blocked in this browser — progress won't survive a reload.",true);
  else if(USING_LOCAL_FALLBACK)showToast("Couldn't reach the save server — playing locally in this browser instead.",true);
}
document.addEventListener('DOMContentLoaded',init);
})();
</script>
</body>
</html>
